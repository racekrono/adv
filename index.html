<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Race Krono - Pro</title>

    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0d0af0">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Race Krono">
    <link rel="apple-touch-icon" href="https://raw.githubusercontent.com/racekrono/adv/refs/heads/main/Logo.png">
    <meta name="mobile-web-app-capable" content="yes">

    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <script src="https://unpkg.com/@turf/turf@6/turf.min.js"></script>
    
    <style>
        body { font-family: sans-serif; background: #121212; color: white; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; overflow: hidden; transition: background-color 0.3s ease; }
        .card { position: relative; background: #1e1e1e; padding: 25px; border-radius: 12px; width: 90%; max-width: 380px; box-shadow: 0 8px 32px rgba(0,0,0,0.5); border-top: 5px solid #ffffff; z-index: 10; max-height: 95vh; display: flex; flex-direction: column; }
        .logo { display: block; margin: 0 auto 10px auto; max-width: 120px; height: auto; }
        input, select, button { width: 100%; padding: 14px; margin-bottom: 15px; border-radius: 8px; border: 1px solid #333; background: #252525; color: white; font-size: 16px; box-sizing: border-box; }
        button { background: #f80303; border: none; font-weight: bold; cursor: pointer; transition: 0.3s; }
        button:active { transform: scale(0.98); }
        
        #setup { display: block; } 
        #ativo { display: none; flex-direction: column; overflow: hidden; }
        
        .header-dados { display: flex; justify-content: center; align-items: baseline; gap: 12px; margin-bottom: 5px; }
        #viewCarro { color: #ffffff; margin: 0; font-size: 1.1rem; font-weight: bold; }
        #viewVel { font-size: 3rem; font-weight: bold; line-height: 1; color: #f1c40f; transition: color 0.2s; }
        .unidade-kmh { color: #888; font-size: 11px; font-weight: bold; text-transform: uppercase; }

        .odo-box { padding: 10px 5px; border-top: 1px solid #333; background: rgba(0,0,0,0.2); border-radius: 10px; margin-bottom: 10px; }
        .odo-label { font-size: 9px; color: #888; text-transform: uppercase; letter-spacing: 1px; }
        .odo-val { font-size: 4rem; text-align: center; font-weight: bold; color: #f1c40f; margin: 0; cursor: pointer; font-family: monospace; line-height: 1; }
        .odo-btns { display: flex; gap: 4px; justify-content: center; margin-top: 8px; }
        .btn-mini { padding: 8px 2px; font-size: 11px; background: #333; margin-bottom: 0; width: auto; flex: 1; border: 1px solid #444; color: white; border-radius: 4px; }

        .roadbook-container { 
            background: #000; border-radius: 8px; overflow-y: auto; flex-grow: 0; border: 2px solid #333; 
            min-height: 260px; margin-bottom: 10px; scroll-behavior: smooth; height: 260px; max-height: 260px;      
        }
        .roadbook-item { display: flex; align-items: center; border-bottom: 1px solid #222; padding: 6px 4px; gap: 8px; }
        .rb-item-ativo { background-color: #262d37 !important; border-left: 6px solid #FF0000 ; }
        .rb-col-km { flex: 0 0 55px; font-family: monospace; font-weight: bold; color: #f1c40f; font-size: 18px; text-align: right; }
        .rb-col-tulipa { flex: 0 0 80px; background: white; padding: 2px; border-radius: 4px; display: flex; justify-content: center; align-items: center; min-height: 70px; }
        .rb-col-tulipa img { max-width: 100%; height: auto; max-height: 70px; }
        .rb-col-obs { flex: 1; font-size: 14px; color: #eee; text-align: left; text-transform: uppercase; font-weight: bold; }

        .status-container { padding: 5px; border-radius: 8px; background: rgba(0,0,0,0.3); border: 1px solid #333; margin-bottom: 5px; }
        .status-gps { color: #2ecc71; font-weight: bold; font-size: 11px; text-align: center; }
        
        #menuContainer { position: absolute; top: 15px; right: 15px; z-index: 100; }
        #btnMenu { width: 40px; height: 40px; padding: 0; margin: 0; border-radius: 50%; background: #333; display: flex; justify-content: center; align-items: center; border: 1px solid #444; font-size: 20px; color: white; }
        #menuOpcoes { display: none; position: absolute; top: 45px; right: 0; background: #252525; border: 1px solid #444; border-radius: 8px; width: 200px; box-shadow: 0 4px 15px rgba(0,0,0,0.8); overflow: hidden; }
        #menuOpcoes button { margin: 0; border: none; border-bottom: 1px solid #333; background: transparent; text-align: left; font-size: 14px; padding: 15px; border-radius: 0; width: 100%; }
        #menuOpcoes button:hover { background: #333; }
    </style>
</head>
<body>

    <div class="card">
        <div id="menuContainer">
            <button id="btnMenu">☰</button>
            <div id="menuOpcoes">
                <button onclick="enviarDatalogger()">📤 Enviar Datalogger</button>
                <button onclick="verRastro()">📍 Ver Rastro</button>
            </div>
        </div>

        <div id="setup">
            <img src="https://raw.githubusercontent.com/racekrono/adv/refs/heads/main/Logo.png" class="logo">
            <h2 style="color:#ffffff; text-align:center; margin-top: 0; font-size: 1.2rem;">Rally de Aventura</h2>
            <input type="text" id="nome" placeholder="Nome do Piloto">
            <select id="categoria">
                <option>UTV</option><option>BAIANO 4x2</option><option>BAIANO 4x4</option>
                <option>INICIANTE 4x2</option><option>INICIANTE 4x4</option><option>ANTIGOS</option>
            </select>
            <input type="number" id="carro" placeholder="Nº do Carro">
            <button id="btnIniciar">INICIAR PROVA</button>
        </div>

        <div id="ativo">
            <div class="header-dados">
                <span id="viewCarro">Carro --</span>
                <div id="viewVel">0.0</div>
                <span class="unidade-kmh">KM/H</span>
            </div>
            <div class="odo-box">
                <span class="odo-label">Odômetro</span>
                <div id="displayOdo" class="odo-val" onclick="ajusteManualOdo()">0.000</div>
                <div class="odo-btns">
                    <button class="btn-mini" onclick="alterarOdo(-0.010)">-10m</button>
                    <button class="btn-mini" onclick="alterarOdo(-0.001)">-1m</button>
                    <button class="btn-mini" onclick="zerarOdo()" style="background:#b30000;">ZERAR</button>
                    <button class="btn-mini" onclick="alterarOdo(0.001)">+1m</button>
                    <button class="btn-mini" onclick="alterarOdo(0.010)">+10m</button>
                </div>
            </div>
            <div class="roadbook-container" id="roadbookList">
                <div style="padding: 20px; color: #444; font-size: 11px; text-align: center;">CARREGANDO...</div>
            </div>
            <div class="status-container">
                <div id="msgGps" class="status-gps">● CONECTANDO...</div>
            </div>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBPJkehV9C1x0hiY5dQSwSRtVf5c4P2JGE",
            authDomain: "cronometro-rally.firebaseapp.com",
            databaseURL: "https://cronometro-rally-default-rtdb.firebaseio.com",
            projectId: "cronometro-rally",
            appId: "1:341731891354:web:d0c34265be68015e98a723"
        };
        const app = firebase.initializeApp(firebaseConfig);
        const db = firebase.database(app);

        let watchID = null;
        let odoTotal = 0, ultimaPos = null, ultimoIndiceAtivo = -1;
        let radaresConfig = null, alertaAtivo = false, intervaloBip = null, audioCtx = null;

        // --- ÁUDIO ---
        function obterAudioContext() {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            if (audioCtx.state === 'suspended') audioCtx.resume();
            return audioCtx;
        }
        function tocarBip(f, d, v = 0.1) {
            try {
                const ctx = obterAudioContext();
                const osc = ctx.createOscillator();
                const g = ctx.createGain();
                osc.type = 'sine'; osc.frequency.setValueAtTime(f, ctx.currentTime);
                g.gain.setValueAtTime(v, ctx.currentTime);
                g.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + d);
                osc.connect(g); g.connect(ctx.destination);
                osc.start(); osc.stop(ctx.currentTime + d);
            } catch (e) {}
        }
        const somClique = () => tocarBip(2000, 0.08, 0.1);
        const somTrocaReferencia = () => tocarBip(1200, 0.25, 0.15);
        const somAlertaVelocidade = () => tocarBip(3000, 0.1, 0.2);

        // --- RADAR ---
        db.ref('configuracoes/percurso').on('value', snap => { radaresConfig = snap.val(); });

        function monitorarRadar(lat, lng, vel) {
            if (!radaresConfig || !radaresConfig.features) return;
            let limite = 0;
            const pt = turf.point([lng, lat]);
            radaresConfig.features.forEach(f => {
                if (turf.booleanPointInPolygon(pt, f)) limite = f.properties.velocidade || 0;
            });
            const dVel = document.getElementById('viewVel');
            if (limite > 0 && vel > limite) {
                if (!alertaAtivo) {
                    alertaAtivo = true; document.body.style.background = "#4a0000"; dVel.style.color = "#ff0000";
                    if (!intervaloBip) intervaloBip = setInterval(somAlertaVelocidade, 400);
                }
            } else if (alertaAtivo) {
                alertaAtivo = false; document.body.style.background = "#121212"; dVel.style.color = "#f1c40f";
                clearInterval(intervaloBip); intervaloBip = null;
            }
        }

        // --- LÓGICA PRINCIPAL ---
        window.onload = async () => {
            const car = localStorage.getItem('rally_carro_ativo');
            const ts = localStorage.getItem('rally_timestamp_login') || 0;
            if (car) {
                const sLog = await db.ref('configuracoes/comandoLogoff').once('value');
                if ((sLog.val() || 0) > parseInt(ts)) { limpar(); location.reload(); }
                else { iniciar(car); carregarPlanilha(); }
            }
        };

        function iniciar(num) {
            document.getElementById('setup').style.display = 'none';
            document.getElementById('ativo').style.display = 'flex';
            document.getElementById('viewCarro').innerText = "Carro " + num;

            // Monitor Conexão e Logoff
            const st = document.getElementById('msgGps');
            db.ref(".info/connected").on("value", s => {
                st.innerText = s.val() ? "● TRANSMITINDO AO VIVO" : "SEM INTERNET - DADOS PROTEGIDOS";
                st.style.color = s.val() ? "#2ecc71" : "#f1c40f";
            });
            db.ref('configuracoes/comandoLogoff').on('value', s => {
                if ((s.val() || 0) > (localStorage.getItem('rally_timestamp_login') || 0)) {
                    if(watchID) navigator.geolocation.clearWatch(watchID);
                    limpar(); location.reload();
                }
            });

            watchID = navigator.geolocation.watchPosition(p => {
                const { latitude: lat, longitude: lng, accuracy: acc, speed: spd } = p.coords;
                const kmh = Math.round((spd || 0) * 3.6);
                if (acc > 25) return;
                if (ultimaPos) {
                    const d = calcularDist(ultimaPos.lat, ultimaPos.lng, lat, lng);
                    if (d > 0.004) { odoTotal += d; atualizarTelaOdo(); ultimaPos = { lat, lng }; }
                } else ultimaPos = { lat, lng };
                document.getElementById('viewVel').innerText = kmh.toFixed(1);
                monitorarRadar(lat, lng, kmh);
                db.ref('posicoes/' + num).set({ lat, lng, vel: kmh, acc, ts: Date.now() });
                db.ref('rastros/' + num).push({ lat, lng, vel: kmh, acc, ts: Date.now() });
            }, null, { enableHighAccuracy: true, maximumAge: 0, timeout: 10000 });
        }

        document.getElementById('btnIniciar').onclick = async () => {
            const num = document.getElementById('carro').value, nome = document.getElementById('nome').value.trim();
            if (!num || !nome) return alert("Preencha tudo!");
            const s = await db.ref('configuracoes/provaAberta').once('value');
            if (s.val() !== true) return alert("🚫 A PROVA SERÁ LIBERADA EM INSTANTES!");
            somClique();
            await db.ref('competidores/' + num).set({ nome, categoria: document.getElementById('categoria').value });
            localStorage.setItem('rally_carro_ativo', num);
            localStorage.setItem('rally_timestamp_login', Date.now());
            iniciar(num); carregarPlanilha();
        };

        // --- ROADBOOK E ODO ---
        function carregarPlanilha() {
            db.ref('prova_atual').on('value', s => {
                const d = s.val(), list = document.getElementById('roadbookList');
                if (!d) return list.innerHTML = '<div style="padding:20px;">SEM PLANILHA</div>';
                list.innerHTML = d.map((it, i) => `
                    <div class="roadbook-item" id="rb-item-${i}">
                        <div class="rb-col-km">${parseFloat(it.km).toFixed(3)}</div>
                        <div class="rb-col-tulipa">${it.tulipa ? `<img src="${it.tulipa}">`:''}</div>
                        <div class="rb-col-obs">${it.obs || '--'}</div>
                    </div>`).join('');
                scrollRB();
            });
        }
        function scrollRB() {
            const its = document.querySelectorAll('.roadbook-item'); let idx = -1;
            its.forEach((div, i) => {
                const km = parseFloat(div.querySelector('.rb-col-km').innerText);
                div.classList.remove('rb-item-ativo');
                if (idx === -1 && odoTotal < km) idx = i;
            });
            if (idx !== -1) {
                if (idx !== ultimoIndiceAtivo) { if(ultimoIndiceAtivo !== -1) somTrocaReferencia(); ultimoIndiceAtivo = idx; }
                const el = document.getElementById('rb-item-' + idx); el.classList.add('rb-item-ativo');
                el.scrollIntoView({ behavior: 'smooth', block: 'start' });
            }
        }
        function calcularDist(la1, lo1, la2, lo2) {
            const R = 6371, dLa = (la2-la1)*Math.PI/180, dLo = (lo2-lo1)*Math.PI/180;
            const a = Math.sin(dLa/2)**2 + Math.cos(la1*Math.PI/180)*Math.cos(la2*Math.PI/180)*Math.sin(dLo/2)**2;
            return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
        }
        function alterarOdo(v) { odoTotal = Math.max(0, odoTotal + v); somClique(); atualizarTelaOdo(); }
        function zerarOdo() { if(confirm("Zerar?")) { odoTotal = 0; somClique(); atualizarTelaOdo(); } }
        function atualizarTelaOdo() { document.getElementById('displayOdo').innerText = odoTotal.toFixed(3); scrollRB(); }
        function ajusteManualOdo() { 
            let n = prompt("Ajustar (KM):", odoTotal.toFixed(3));
            if(n) { odoTotal = Math.max(0, parseFloat(n.replace(',','.'))); somClique(); atualizarTelaOdo(); }
        }
        function limpar() { localStorage.removeItem('rally_carro_ativo'); localStorage.removeItem('rally_timestamp_login'); }

        // --- MENU ---
        const btnM = document.getElementById('btnMenu'), optM = document.getElementById('menuOpcoes');
        btnM.onclick = (e) => { e.stopPropagation(); optM.style.display = optM.style.display === 'block' ? 'none' : 'block'; };
        window.onclick = () => { optM.style.display = 'none'; };
        function enviarDatalogger() { alert("Datalogger enviado!"); }
        function verRastro() { location.href = 'rastropiloto.html'; }
    </script>
</body>
</html>
