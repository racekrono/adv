<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Race Krono - Offline First</title>

    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0d0af0">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Race Krono">
    <link rel="apple-touch-icon" href="https://raw.githubusercontent.com/racekrono/adv/refs/heads/main/Logo.png">
    <meta name="mobile-web-app-capable" content="yes">

    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <script src="https://unpkg.com/@turf/turf@6/turf.min.js"></script>
    <script src="https://unpkg.com/dexie@latest/dist/dexie.js"></script>
    
    <style>
        body { font-family: sans-serif; background: #121212; color: white; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; overflow: hidden; }
        .card { position: relative; background: #1e1e1e; padding: 25px; border-radius: 12px; width: 90%; max-width: 380px; box-shadow: 0 8px 32px rgba(0,0,0,0.5); border-top: 5px solid #ffffff; z-index: 10; max-height: 95vh; display: flex; flex-direction: column; }
        .logo { display: block; margin: 0 auto 10px auto; max-width: 120px; height: auto; }
        input, select, button { width: 100%; padding: 14px; margin-bottom: 15px; border-radius: 8px; border: 1px solid #333; background: #252525; color: white; font-size: 16px; box-sizing: border-box; }
        button { background: #f80303; border: none; font-weight: bold; cursor: pointer; transition: 0.3s; }
        
        #setup { display: block; } 
        #ativo { display: none; flex-direction: column; overflow: hidden; }
        
        .header-dados { display: flex; justify-content: center; align-items: baseline; gap: 12px; margin-bottom: 5px; }
        #viewCarro { color: #ffffff; margin: 0; font-size: 1.1rem; font-weight: bold; }
        #viewVel { font-size: 3rem; font-weight: bold; line-height: 1; color: #f1c40f; }
        .unidade-kmh { color: #888; font-size: 11px; font-weight: bold; text-transform: uppercase; }

        .odo-box { position: relative; padding: 10px 5px; border-top: 1px solid #333; background: rgba(0,0,0,0.2); border-radius: 10px; margin-bottom: 10px; }
        .odo-label { font-size: 9px; color: #888; text-transform: uppercase; letter-spacing: 1px; }
        .odo-val { font-size: 4rem; text-align: center; font-weight: bold; color: #f1c40f; margin: 0; cursor: pointer; font-family: monospace; line-height: 1; }
        
        #alertaRadar { display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255, 0, 0, 0.9); color: white; flex-direction: column; justify-content: center; align-items: center; z-index: 100; animation: flash 0.5s infinite alternate; border-radius: 10px; }
        @keyframes flash { from { opacity: 0.7; } to { opacity: 1; } }

        .roadbook-container { background: #000; border-radius: 8px; overflow-y: auto; flex-grow: 1; border: 2px solid #333; min-height: 200px; scroll-behavior: smooth; }
        .roadbook-item { display: flex; align-items: center; border-bottom: 1px solid #222; padding: 6px 4px; gap: 8px; }
        .rb-item-ativo { background-color: #262d37 !important; border-left: 6px solid #FF0000 ; }
        .rb-col-km { flex: 0 0 55px; font-family: monospace; font-weight: bold; color: #f1c40f; font-size: 18px; text-align: right; }
        .rb-col-tulipa { flex: 0 0 80px; background: white; padding: 2px; border-radius: 4px; display: flex; justify-content: center; align-items: center; min-height: 70px; }
        .rb-col-tulipa img { max-width: 100%; height: auto; max-height: 70px; }
        .rb-col-obs { flex: 1; font-size: 14px; color: #eee; text-transform: uppercase; font-weight: bold; }

        .status-gps { color: #2ecc71; font-weight: bold; font-size: 11px; text-align: center; margin-top: 5px; }
        .status-offline { color: #f1c40f !important; }
        
        #menuContainer { position: absolute; top: 15px; right: 15px; z-index: 100; }
        #btnMenu { width: 40px; height: 40px; border-radius: 50%; background: #333; color: white; border: 1px solid #444; font-size: 20px; }
        #menuOpcoes { display: none; position: absolute; top: 45px; right: 0; background: #252525; border: 1px solid #444; border-radius: 8px; width: 200px; box-shadow: 0 4px 15px rgba(0,0,0,0.8); }
        #menuOpcoes button { margin: 0; border: none; background: transparent; text-align: left; font-size: 14px; padding: 15px; border-bottom: 1px solid #333; }
    </style>
</head>
<body>

    <div class="card">
        <div id="menuContainer">
            <button id="btnMenu">☰</button>
            <div id="menuOpcoes">
                <button onclick="verRastro()">📍 Ver Rastro</button>
                <button onclick="encerrarSessao()">🔚 SAIR ❌</button>
            </div>
        </div>

        <div id="setup">
            <img src="https://raw.githubusercontent.com/racekrono/adv/refs/heads/main/Logo.png" class="logo">
            <h2 style="color:#ffffff; text-align:center; margin-top: 0; font-size: 1.2rem;">Race Krono</h2>
            <input type="text" id="nome" placeholder="Nome do Piloto">
            <select id="categoria">
                <option>UTV</option><option>BAIANO 4x2</option><option>BAIANO 4x4</option>
                <option>INICIANTE 4x2</option><option>INICIANTE 4x4</option><option>ANTIGOS</option>
            </select>
            <input type="number" id="carro" placeholder="Nº do Carro">
            <button id="btnIniciar">INICIAR PROVA</button>
        </div>

        <div id="ativo">
            <div class="header-dados">
                <span id="viewCarro">Carro --</span>
                <div id="viewVel">0.0</div>
                <span class="unidade-kmh">KM/H</span>
            </div>

            <div class="odo-box">
                <div id="alertaRadar">
                    <p style="font-weight:bold; font-size:24px; margin:0;">⚠️ REDUZA!</p>
                    <span id="txtLimite">LIMITE: 60 KM/H</span>
                </div>
                <span class="odo-label">Odômetro</span>
                <div id="displayOdo" class="odo-val" onclick="ajusteManualOdo()">0.000</div>
            </div>

            <div class="roadbook-container" id="roadbookList">
                <div style="padding: 20px; color: #444; font-size: 11px; text-align: center;">SINCRONIZANDO...</div>
            </div>
            
            <div id="msgGps" class="status-gps">● CONECTANDO...</div>
        </div>
    </div>

    <script>
        // CONFIGURAÇÃO FIREBASE
        const firebaseConfig = {
            apiKey: "AIzaSyBPJkehV9C1x0hiY5dQSwSRtVf5c4P2JGE",
            authDomain: "cronometro-rally.firebaseapp.com",
            databaseURL: "https://cronometro-rally-default-rtdb.firebaseio.com",
            projectId: "cronometro-rally",
            appId: "1:341731891354:web:d0c34265be68015e98a723"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // CONFIGURAÇÃO INDEXED-DB (DADOS LOCAIS)
        const localDB = new Dexie("RaceKronoDB");
        localDB.version(1).stores({
            estado: "id", // id, odoTotal, carro, nome, categoria
            planilha: "km", // km, tulipa, obs
            rastreio: "++id, ts", // id auto-increment, timestamp, lat, lng, vel
            config: "id" // radares/percurso
        });

        let watchID = null;
        let odoTotal = 0;
        let ultimaPos = null;
        let percursoRally = null;
        let somAlertaAtivo = false;

        // INICIALIZAÇÃO
        window.onload = async () => {
            const estado = await localDB.estado.get("sessao_atual");
            
            // Carregar Radares
            db.ref('configuracoes/percurso').on('value', async snap => {
                const data = snap.val();
                if(data) {
                    percursoRally = data;
                    await localDB.config.put({id: "percurso", data: data});
                }
            });

            if (estado) {
                odoTotal = estado.odoTotal || 0;
                iniciarInterfaceAtiva(estado.carro);
                restaurarPlanilhaLocal();
                carregarRoadbookFirebase();
            }
        };

        async function iniciarInterfaceAtiva(num) {
            document.getElementById('setup').style.display = 'none';
            document.getElementById('ativo').style.display = 'flex';
            document.getElementById('viewCarro').innerText = "Carro " + num;
            atualizarTelaOdo();
            iniciarGps(num);
        }

        // SALVAR ESTADO LOCAL CONSTANTEMENTE
        async function salvarEstadoLocal(num) {
            const nome = document.getElementById('nome').value;
            const cat = document.getElementById('categoria').value;
            await localDB.estado.put({
                id: "sessao_atual", 
                carro: num, 
                odoTotal: odoTotal,
                nome: nome,
                categoria: cat,
                ts: Date.now()
            });
        }

        async function carregarRoadbookFirebase() {
            db.ref('prova_atual').on('value', async (snap) => {
                const dados = snap.val();
                if (dados) {
                    await localDB.planilha.clear();
                    await localDB.planilha.bulkPut(dados);
                    renderizarRoadbook(dados);
                }
            });
        }

        async function restaurarPlanilhaLocal() {
            const dados = await localDB.planilha.toArray();
            if (dados.length > 0) renderizarRoadbook(dados);
        }

        function renderizarRoadbook(dados) {
            const rbList = document.getElementById('roadbookList');
            rbList.innerHTML = '';
            dados.forEach((item, index) => {
                const div = document.createElement('div');
                div.className = 'roadbook-item';
                div.id = 'rb-item-' + index;
                div.innerHTML = `
                    <div class="rb-col-km">${parseFloat(item.km).toFixed(3)}</div>
                    <div class="rb-col-tulipa"><img src="${item.tulipa || ''}"></div>
                    <div class="rb-col-obs">${item.obs || ''}</div>
                `;
                rbList.appendChild(div);
            });
            atualizarScrollRoadbook();
        }

        function iniciarGps(num) {
            watchID = navigator.geolocation.watchPosition(async position => {
                const { latitude: lat, longitude: lng, speed, accuracy } = position.coords;
                const kmh = Math.round((speed || 0) * 3.6);
                
                if (accuracy > 30) return;

                document.getElementById('viewVel').innerText = kmh;
                
                if (ultimaPos) {
                    const dist = calcularDistancia(ultimaPos.lat, ultimaPos.lng, lat, lng);
                    if (dist > 0.002) { // 2 metros
                        odoTotal += dist;
                        ultimaPos = { lat, lng };
                        atualizarTelaOdo();
                        salvarEstadoLocal(num);
                    }
                } else {
                    ultimaPos = { lat, lng };
                }

                // Salvar rastro no IndexDB (Segurança máxima)
                const ponto = { lat, lng, vel: kmh, ts: Date.now(), carro: num };
                await localDB.rastreio.add(ponto);

                // Tentar enviar ao Firebase
                db.ref('posicoes/' + num).set(ponto);
                db.ref('rastros/' + num).push(ponto);

                verificarRadar(lat, lng, kmh);

            }, err => console.error(err), { enableHighAccuracy: true, maximumAge: 0 });
        }

        function verificarRadar(lat, lng, velAtual) {
            if (!percursoRally) return;
            const ponto = turf.point([lng, lat]);
            let alerta = false;
            let limite = 0;

            percursoRally.features.forEach(f => {
                if (f.geometry.type === 'Polygon' && turf.booleanPointInPolygon(ponto, f)) {
                    alerta = true;
                    limite = f.properties.velocidade || 60;
                }
            });

            const div = document.getElementById('alertaRadar');
            if (alerta && velAtual > limite) {
                div.style.display = 'flex';
                document.getElementById('txtLimite').innerText = `LIMITE: ${limite} KM/H`;
            } else {
                div.style.display = 'none';
            }
        }

        function calcularDistancia(lat1, lon1, lat2, lon2) {
            const R = 6371;
            const dLat = (lat2-lat1) * Math.PI/180;
            const dLon = (lon2-lon1) * Math.PI/180;
            const a = Math.sin(dLat/2)**2 + Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLon/2)**2;
            return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
        }

        function atualizarTelaOdo() {
            document.getElementById('displayOdo').innerText = odoTotal.toFixed(3);
            atualizarScrollRoadbook();
        }

        async function atualizarScrollRoadbook() {
            const itens = await localDB.planilha.toArray();
            let idxAtivo = -1;
            itens.forEach((it, i) => {
                const el = document.getElementById('rb-item-' + i);
                if(el) {
                    el.classList.remove('rb-item-ativo');
                    if (idxAtivo === -1 && odoTotal < it.km) idxAtivo = i;
                }
            });
            if (idxAtivo !== -1) {
                const alvo = document.getElementById('rb-item-' + idxAtivo);
                alvo.classList.add('rb-item-ativo');
                alvo.scrollIntoView({ behavior: 'smooth', block: 'center' });
            }
        }

        document.getElementById('btnIniciar').onclick = async () => {
            const num = document.getElementById('carro').value;
            if(!num) return alert("Digite o número do carro");
            
            await salvarEstadoLocal(num);
            iniciarInterfaceAtiva(num);
            carregarRoadbookFirebase();
        };

        function ajusteManualOdo() {
            const n = prompt("Ajustar Odômetro:", odoTotal.toFixed(3));
            if (n !== null) {
                odoTotal = parseFloat(n.replace(',','.'));
                atualizarTelaOdo();
                const num = document.getElementById('carro').value;
                salvarEstadoLocal(num);
            }
        }

        function encerrarSessao() {
            if(confirm("Isso apagará os dados locais. Sair?")) {
                localDB.estado.clear();
                localDB.planilha.clear();
                localDB.rastreio.clear();
                location.reload();
            }
        }

        // Menu Toggle
        document.getElementById('btnMenu').onclick = (e) => {
            e.stopPropagation();
            const m = document.getElementById('menuOpcoes');
            m.style.display = m.style.display === 'block' ? 'none' : 'block';
        };
        window.onclick = () => document.getElementById('menuOpcoes').style.display = 'none';

    </script>
</body>
</html>
