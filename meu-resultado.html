<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meu Resultado - Rally Tracker</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <style>
        :root { --primary: #e67e22; --bg: #1a202c; --card: #2d3748; }
        body { font-family: sans-serif; background: var(--bg); color: white; margin: 0; padding: 15px; }
        .container { max-width: 800px; margin: auto; }
        .header { text-align: center; margin-bottom: 20px; }
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; }
        .stat-card { background: var(--card); padding: 15px; border-radius: 10px; text-align: center; border-bottom: 3px solid var(--primary); }
        .stat-card small { color: #a0aec0; display: block; margin-bottom: 5px; text-transform: uppercase; font-size: 10px; }
        .stat-card span { font-size: 1.2rem; font-weight: bold; }
        
        #map { height: 300px; border-radius: 12px; margin-bottom: 20px; border: 2px solid var(--card); z-index: 1; }
        
        .penalty-list { background: var(--card); border-radius: 10px; padding: 15px; }
        h3 { margin-top: 0; color: var(--primary); font-size: 16px; border-bottom: 1px solid #4a5568; padding-bottom: 10px; }
        table { width: 100%; border-collapse: collapse; font-size: 12px; }
        th { text-align: left; color: #a0aec0; padding: 8px 0; }
        td { padding: 10px 0; border-bottom: 1px solid #4a5568; }
        .text-red { color: #f56565; font-weight: bold; }
        .btn-voltar { background: #333; border: none; color: white; padding: 15px; border-radius: 8px; width: 100%; cursor: pointer; margin-top: 20px; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h2 id="nomePiloto" style="margin-bottom: 5px;">Carregando...</h2>
        <p id="infoCarro" style="margin: 0; color: #a0aec0;">Identificando veículo...</p>
    </div>

    <div class="stats-grid">
        <div class="stat-card">
            <small>Tempo Total</small>
            <span id="tempoTotal">--:--:--</span>
        </div>
