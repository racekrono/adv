<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Relatório de Performance - Rally</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/@turf/turf@6/turf.min.js"></script>
    
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>

    <style>
        :root { --orange: #e67e22; --dark: #121212; --card: #1e1e1e; --border: #333; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--dark); color: white; margin: 0; display: flex; flex-direction: column; height: 100vh; }
        
        /* Cabeçalho de Controle */
        .no-print { background: #000; padding: 15px; border-bottom: 3px solid var(--orange); display: flex; justify-content: center; gap: 12px; align-items: center; z-index: 2000; }
        select, button { padding: 10px 15px; border-radius: 6px; border: none; font-size: 14px; outline: none; }
        select { background: #2d3748; color: white; min-width: 200px; border: 1px solid #4a5568; }
        button { background: var(--orange); color: white; font-weight: bold; cursor: pointer; transition: 0.2s; }
        button:hover { background: #d35400; }
        .btn-print { background: #4a5568; }

        /* Layout Principal */
        .main-layout { display: grid; grid-template-columns: 1fr 400px; flex-grow: 1; overflow: hidden; }
        #map { background: #222; height: 100%; }

        /* Painel Lateral (Relatório) */
        .sidebar { background: var(--card); border-left: 2px solid var(--orange); padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 20px; }
        
        .section-title { color: var(--orange); text-transform: uppercase; font-size: 13px; font-weight: bold; letter-spacing: 1px; border-bottom: 1px solid var(--border); padding-bottom: 5px; margin-bottom: 10px; display: block; }
        
        .data-table { width: 100%; border-collapse: collapse; margin-bottom: 10px; }
        .data-table td { padding: 10px 5px; border-bottom: 1px solid #2a2a2a; font-size: 15px; }
        .label { color: #888; }
        .val { text-align: right; font-weight: bold; }
        .highlight { color: var(--orange); font-size: 1.4rem; }

        /* Estilo das Penalidades (Igual ao rastro.html) */
        .penalty-card { background: rgba(231, 76, 60, 0.1); border: 1px solid #e74c3c; border-radius: 8px; padding: 12px; margin-bottom: 10px; }
        .penalty-card b { color: #e74c3c; display: block; margin-bottom: 4px; }
        .penalty-card span { font-size: 13px; color: #ccc; }

        .success-msg { color: #2ecc71; text-align: center; padding: 20px; font-weight: bold; }

        /* Impressão */
        @media print {
            .no-print { display: none; }
            .main-layout { display: block; overflow: visible; }
            .sidebar { border: none; width: 100%; height: auto; }
            #map { height: 450px; width: 100%; border: 1px solid #000; margin-bottom: 20px; }
        }

        @media (max-width: 1000px) {
            .main-layout { grid-template-columns: 1fr; }
            #map { height: 350px; }
            .sidebar { height: auto; overflow: visible; }
        }
    </style>
</head>
<body>

<div class="no-print">
    <select id="carSelect"><option>Conectando ao banco...</option></select>
    <button onclick="carregarRelatorio()">GERAR RELATÓRIO</button>
    <button class="btn-print" onclick="window.print()">SALVAR PDF / IMPRIMIR</button>
</div>

<div class="main-layout">
    <div id="map"></div>

    <div class="sidebar">
        <div>
            <span class="section-title">Dados do Competidor</span>
            <table class="data-table">
                <tr><td class="label">Nº Carro:</td><td class="val" id="resId">--</td></tr>
                <tr><td class="label">Piloto:</td><td class="val" id="resNome">---</td></tr>
                <tr><td class="label">Categoria:</td><td class="val" id="resCat">---</td></tr>
            </table>
        </div>

        <div>
            <span class="section-title">Performance de Prova</span>
            <table class="data-table">
                <tr><td class="label">Tempo de Prova:</td><td class="val" id="resTempo">--:--:--</td></tr>
                <tr><td class="label">Pontos de Fotos:</td><td class="val" id="resFotos" style="color:#3498db">0</td></tr>
                <tr><td class="label">Penalizações GPS:</td><td class="val" id="resPenal" style="color:#e74c3c">0</td></tr>
                <tr><td class="label highlight">TOTAL FINAL:</td><td class="val highlight" id="resTotal">0 pts</td></tr>
            </table>
        </div>

        <div id="radarSection">
            <span class="section-title">Análise de Radares</span>
            <div id="logPenalidades">Selecione um carro para analisar.</div>
        </div>
    </div>
</div>

<script>
    // Configuração do Firebase
    const firebaseConfig = {
        apiKey: "AIzaSyBPJkehV9C1x0hiY5dQSwSRtVf5c4P2JGE",
        databaseURL: "https://cronometro-rally-default-rtdb.firebaseio.com"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // Inicializar Mapa
    const map = L.map('map').setView([-12.26, -38.96], 13);
    L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}').addTo(map);
    const camadaRastro = L.featureGroup().addTo(map);

    // Carregar Lista de Competidores
    db.ref('competidores').on('value', snap => {
        const select = document.getElementById('carSelect');
        select.innerHTML = '<option value="">Escolha seu Carro</option>';
        if(!snap.exists()) return;
        
        snap.forEach(c => {
            select.innerHTML += `<option value="${c.key}">Carro ${c.key} - ${c.val().nome}</option>`;
        });
    });

    async function carregarRelatorio() {
        const id = document.getElementById('carSelect').value;
        if(!id) return;

        camadaRastro.clearLayers();
        document.getElementById('logPenalidades').innerHTML = "Processando telemetria...";

        try {
            // Busca dados em paralelo
            const [sComp, sRastro, sPerc] = await Promise.all([
                db.ref(`competidores/${id}`).once('value'),
                db.ref(`rastros/${id}`).once('value'),
                db.ref('configuracoes/percurso').once('value')
            ]);

            const p = sComp.val();
            const rastro = Object.values(sRastro.val() || {}).sort((a,b) => a.ts - b.ts);
            const percurso = sPerc.val();

            // Preencher Dados Básicos
            document.getElementById('resId').innerText = id;
            document.getElementById('resNome').innerText = p.nome;
            document.getElementById('resCat').innerText = p.categoria;
            document.getElementById('resTempo').innerText = p.tempoFormatado || "Não finalizou";
            document.getElementById('resFotos').innerText = `+${p.pontosFotos || 0}`;

            let totalPenal = 0;
            let radarHTML = "";

            if(percurso && percurso.features) {
                percurso.features.forEach((feat, index) => {
                    if(feat.geometry.type.includes('Polygon')) {
                        const vMax = feat.properties.velocidade || 60;
                        const vTol = vMax * 1.1;
                        
                        // Desenha Radar no Mapa
                        L.geoJSON(feat, {style: {color: '#3498db', weight: 1, fillOpacity: 0.15}}).addTo(camadaRastro);

                        let tempoInfracaoMs = 0;
                        let velMaxima = 0;

                        rastro.forEach((pt, i) => {
                            const ponto = turf.point([pt.lng, pt.lat]);
                            if(turf.booleanPointInPolygon(ponto, feat)) {
                                // Se estiver acima da velocidade
                                if(pt.vel > vTol) {
                                    if(pt.vel > velMaxima) velMaxima = pt.vel;
                                    
                                    // Cálculo de tempo entre pontos (max 20s para evitar saltos de GPS)
                                    if(i > 0) {
                                        const diff = pt.ts - rastro[i-1].ts;
                                        if(diff < 20000) tempoInfracaoMs += diff;
                                    }

                                    // Bolinha vermelha no mapa
                                    L.circleMarker([pt.lat, pt.lng], {
                                        radius: 4, color: 'red', fillColor: '#f00', fillOpacity: 1
                                    }).addTo(camadaRastro).bindPopup(`<b>EXCESSO!</b><br>Vel: ${pt.vel} km/h`);
                                }
                            }
                        });

                        // Lógica de pontos: Carência 10s + Bloco de 30s
                        if(tempoInfracaoMs > 10000) {
                            const segs = Math.round(tempoInfracaoMs / 1000);
                            const pts = (Math.floor((tempoInfracaoMs - 10000) / 30000) + 1) * 500;
                            totalPenal += pts;

                            radarHTML += `
                                <div class="penalty-card">
                                    <b>⚠️ RADAR ${index + 1} (${vMax} km/h)</b>
                                    <span>Tempo em excesso: ${segs}s</span><br>
                                    <span>Velocidade Pico: ${velMaxima} km/h</span><br>
                                    <b style="margin-top:5px; color:#ff7675">PUNIÇÃO: -${pts} pts</b>
                                </div>`;
                        }
                    }
                });
            }

            // Atualiza Totais
            document.getElementById('resPenal').innerText = `-${totalPenal}`;
            document.getElementById('resTotal').innerText = `${(p.pontos || 0) + (p.pontosFotos || 0)} pts`;
            document.getElementById('logPenalidades').innerHTML = radarHTML || '<div class="success-msg">✅ Nenhuma infração detectada!</div>';

            // Desenha Rastro
            if(rastro.length > 0) {
                const latlngs = rastro.map(p => [p.lat, p.lng]);
                L.polyline(latlngs, {color: 'yellow', weight: 2, opacity: 0.7}).addTo(camadaRastro);
                map.fitBounds(camadaRastro.getBounds(), {padding: [30, 30]});
            }

        } catch (e) {
            console.error(e);
            document.getElementById('logPenalidades').innerHTML = "Erro ao processar dados.";
        }
    }
</script>
</body>
</html>
