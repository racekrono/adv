<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Race Krono</title>

    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0d0af0">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Race Krono">
    <link rel="apple-touch-icon" href="https://raw.githubusercontent.com/racekrono/adv/refs/heads/main/Logo.png">
    <meta name="mobile-web-app-capable" content="yes">

    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    
    <style>
        body { font-family: sans-serif; background: #121212; color: white; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; overflow: hidden; }
        .card { background: #1e1e1e; padding: 25px; border-radius: 12px; width: 90%; max-width: 380px; box-shadow: 0 8px 32px rgba(0,0,0,0.5); border-top: 5px solid #ffffff; z-index: 10; max-height: 95vh; display: flex; flex-direction: column; }
        .logo { display: block; margin: 0 auto 10px auto; max-width: 120px; height: auto; }
        input, select, button { width: 100%; padding: 14px; margin-bottom: 15px; border-radius: 8px; border: 1px solid #333; background: #252525; color: white; font-size: 16px; box-sizing: border-box; }
        button { background: #f80303; border: none; font-weight: bold; cursor: pointer; transition: 0.3s; }
        button:active { transform: scale(0.98); }
        
        #setup { display: block; } 
        #ativo { display: none; flex-direction: column; overflow: hidden; }
        
        .header-dados { display: flex; justify-content: center; align-items: baseline; gap: 12px; margin-bottom: 5px; }
        #viewCarro { color: #ffffff; margin: 0; font-size: 1.1rem; font-weight: bold; }
        #viewVel { font-size: 3rem; font-weight: bold; line-height: 1; color: #f1c40f; }
        .unidade-kmh { color: #888; font-size: 11px; font-weight: bold; text-transform: uppercase; }

        .odo-box { padding: 10px 5px; border-top: 1px solid #333; background: rgba(0,0,0,0.2); border-radius: 10px; margin-bottom: 10px; }
        .odo-label { font-size: 9px; color: #888; text-transform: uppercase; letter-spacing: 1px; }
        .odo-val { font-size: 4rem; text-align: center; font-weight: bold; color: #f1c40f; margin: 0; cursor: pointer; font-family: monospace; line-height: 1; }
        .odo-btns { display: flex; gap: 4px; justify-content: center; margin-top: 8px; }
        .btn-mini { padding: 8px 2px; font-size: 11px; background: #333; margin-bottom: 0; width: auto; flex: 1; border: 1px solid #444; color: white; border-radius: 4px; }

        .roadbook-container { 
            background: #000; 
            border-radius: 8px; 
            overflow-y: auto; 
            flex-grow: 1; 
            border: 2px solid #333; 
            min-height: 150px; 
            margin-bottom: 10px;
            scroll-behavior: smooth;
        }
        .roadbook-item { display: flex; align-items: center; border-bottom: 1px solid #222; padding: 6px 4px; gap: 8px; }
        .rb-item-ativo { background-color: #262d37 !important; border-left: 6px solid #FF0000 ; }
        .rb-col-km { flex: 0 0 55px; font-family: monospace; font-weight: bold; color: #f1c40f; font-size: 14px; text-align: right; }
        .rb-col-tulipa { flex: 0 0 65px; background: white; padding: 2px; border-radius: 4px; display: flex; justify-content: center; align-items: center; min-height: 50px; }
        .rb-col-tulipa img { max-width: 100%; height: auto; max-height: 50px; }
        .rb-col-obs { flex: 1; font-size: 11px; color: #eee; text-align: left; text-transform: uppercase; font-weight: bold; }

        #opcoesMenu { display: none; background: #252525; padding: 10px; border-radius: 8px; border: 1px solid #444; margin-top: 5px; }

        .status-container { padding: 5px; border-radius: 8px; background: rgba(0,0,0,0.3); border: 1px solid #333; margin-bottom: 5px; }
        .status-gps { color: #2ecc71; font-weight: bold; font-size: 11px; text-align: center; }
        .status-offline { color: #f1c40f !important; }
        .btn-sair { background: transparent; color: #555; font-size: 10px; margin-top: 5px; text-decoration: underline; cursor: pointer; border: none; width: 100%; padding: 5px; }
        
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: #444; border-radius: 10px; }
    </style>
</head>
<body>

    <div class="card">
        <div id="setup">
            <img src="https://raw.githubusercontent.com/racekrono/adv/refs/heads/main/Logo.png" class="logo">
            <h2 style="color:#ffffff; text-align:center; margin-top: 0; font-size: 1.2rem;">Rally de Aventura</h2>
            <input type="text" id="nome" placeholder="Nome do Piloto">
            <select id="categoria">
                <option>UTV</option>
                <option>BAIANO 4x2</option><option>BAIANO 4x4</option>
                <option>INICIANTE 4x2</option><option>INICIANTE 4x4</option>
                <option>ANTIGOS</option>
            </select>
            <input type="number" id="carro" placeholder="Nº do Carro">
            <button id="btnIniciar">INICIAR PROVA</button>
        </div>

        <div id="ativo">
            <div class="header-dados">
                <span id="viewCarro">Carro --</span>
                <div id="viewVel">0.0</div>
                <span class="unidade-kmh">KM/H</span>
            </div>

            <div class="odo-box">
                <span class="odo-label">Odômetro</span>
                <div id="displayOdo" class="odo-val" onclick="ajusteManualOdo()">0.000</div>
                <div class="odo-btns">
                    <button class="btn-mini" onclick="alterarOdo(-0.010)">-10m</button>
                    <button class="btn-mini" onclick="alterarOdo(-0.001)">-1m</button>
                    <button class="btn-mini" onclick="zerarOdo()" style="background:#b30000;">ZERAR</button>
                    <button class="btn-mini" onclick="alterarOdo(0.001)">+1m</button>
                    <button class="btn-mini" onclick="alterarOdo(0.010)">+10m</button>
                </div>
            </div>

            <div class="roadbook-container" id="roadbookList">
                <div style="padding: 20px; color: #444; font-size: 11px; text-align: center;">AGUARDANDO PLANILHA...</div>
            </div>

            <div id="menuEmergencia" style="margin-bottom: 10px;">
                <button onclick="toggleMenu()" style="background: #444; margin-bottom: 5px; font-size: 12px; padding: 8px;">🛠️ MENU</button>
                <div id="opcoesMenu">
                    <button class="btn-mini" onclick="baixarPlanilhaOffline()" style="background: #2b6cb0; width: 100%; margin-bottom: 8px;">💾 Salvar Planilha (Download)</button>
                    <button class="btn-mini" onclick="document.getElementById('inputOffline').click()" style="background: #d69e2e; width: 100%; margin-bottom: 8px;">📂 Carregar Planilha Offline</button>
                    <input type="file" id="inputOffline" accept=".json" style="display:none" onchange="carregarArquivoLocal(this)">
                    <button class="btn-mini" onclick="enviarDatalogger()" style="background: #38a169; width: 100%;">📤 Enviar Datalogger</button>
                    <button class="btn-sair" onclick="encerrarSessao()" style="background: #2b6cb0; width: 100%;">Encerrar Prova</button>
                    
                </div>
            </div>
            
            <div class="status-container">
                <div id="msgGps" class="status-gps">● CONECTANDO...</div>
            </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBPJkehV9C1x0hiY5dQSwSRtVf5c4P2JGE",
            authDomain: "cronometro-rally.firebaseapp.com",
            databaseURL: "https://cronometro-rally-default-rtdb.firebaseio.com",
            projectId: "cronometro-rally",
            appId: "1:341731891354:web:d0c34265be68015e98a723"
        };
        const app = firebase.initializeApp(firebaseConfig);
        const db = firebase.database(app);

        let odoTotal = 0;
        let watchID = null;
        let ultimaPos = null;
        let dadosPlanilhaAtual = [];

        window.onload = function() {
            const salvo = localStorage.getItem('rally_carro_ativo');
            if (salvo) {
                iniciarFluxoRastreio(salvo);
                // Primeiro tenta carregar do cache local para ser rápido
                const cache = localStorage.getItem('planilha_offline');
                if (cache) {
                    dadosPlanilhaAtual = JSON.parse(cache);
                    renderizarRoadbookManual(dadosPlanilhaAtual);
                }
                carregarRoadbookFirebase();
            }
        };

        function toggleMenu() {
            const menu = document.getElementById('opcoesMenu');
            menu.style.display = menu.style.display === 'none' ? 'block' : 'none';
        }

        async function baixarPlanilhaOffline() {
            if (dadosPlanilhaAtual.length === 0) return alert("Nenhuma planilha carregada para salvar.");
            const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(dadosPlanilhaAtual));
            const a = document.createElement('a');
            a.href = dataStr;
            a.download = "planilha_reserva.json";
            document.body.appendChild(a);
            a.click();
            a.remove();
        }

        function carregarArquivoLocal(input) {
            const arquivo = input.files[0];
            if (!arquivo) return;
            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    const dados = JSON.parse(e.target.result);
                    if (Array.isArray(dados)) {
                        dadosPlanilhaAtual = dados;
                        localStorage.setItem('planilha_offline', JSON.stringify(dados));
                        renderizarRoadbookManual(dados);
                        alert("Planilha importada com sucesso!");
                        toggleMenu();
                    }
                } catch (err) { alert("Erro ao ler arquivo."); }
            };
            reader.readAsText(arquivo);
        }

        function carregarRoadbookFirebase() {
            db.ref('prova_atual').on('value', (snap) => {
                const dados = snap.val();
                if (dados) {
                    dadosPlanilhaAtual = dados;
                    localStorage.setItem('planilha_offline', JSON.stringify(dados));
                    renderizarRoadbookManual(dados);
                }
            });
        }

        function renderizarRoadbookManual(dados) {
            const rbList = document.getElementById('roadbookList');
            rbList.innerHTML = '';
            dados.forEach((item, index) => {
                const div = document.createElement('div');
                div.className = 'roadbook-item';
                div.id = 'rb-item-' + index;
                const km = parseFloat(item.km || 0).toFixed(3);
                div.innerHTML = `
                    <div class="rb-col-km">${km}</div>
                    <div class="rb-col-tulipa">${item.tulipa ? `<img src="${item.tulipa}">` : ''}</div>
                    <div class="rb-col-obs">${item.obs || '--'}</div>
                `;
                rbList.appendChild(div);
            });
            atualizarScrollRoadbook();
        }

        function atualizarScrollRoadbook() {
            const itens = document.querySelectorAll('.roadbook-item');
            let proximoIdx = -1;
            itens.forEach((div, i) => {
                const kmItem = parseFloat(div.querySelector('.rb-col-km').innerText);
                div.classList.remove('rb-item-ativo');
                if (proximoIdx === -1 && odoTotal < kmItem) proximoIdx = i;
            });
            if (proximoIdx !== -1) {
                const alvo = document.getElementById('rb-item-' + proximoIdx);
                alvo.classList.add('rb-item-ativo');
                alvo.scrollIntoView({ behavior: 'smooth', block: 'center' });
            }
        }

        function calcularDistancia(lat1, lon1, lat2, lon2) {
            const R = 6371; 
            const dLat = (lat2-lat1)*Math.PI/180;
            const dLon = (lon2-lon1)*Math.PI/180;
            const a = Math.sin(dLat/2)**2 + Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLon/2)**2;
            return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
        }

        function iniciarFluxoRastreio(num) {
            document.getElementById('setup').style.display = 'none';
            document.getElementById('ativo').style.display = 'flex';
            document.getElementById('viewCarro').innerText = "Carro " + num;

            db.ref(".info/connected").on("value", (snap) => {
                const msg = document.getElementById('msgGps');
                msg.innerText = snap.val() ? "● TRANSMITINDO AO VIVO" : "SEM INTERNET - MODO OFFLINE";
                msg.className = snap.val() ? "status-gps" : "status-gps status-offline";
            });

            watchID = navigator.geolocation.watchPosition(pos => {
                const { latitude: lat, longitude: lng, speed, accuracy } = pos.coords;
                if (accuracy > 30) return;
                const kmh = Math.round((speed || 0) * 3.6);
                if (ultimaPos) {
                    const d = calcularDistancia(ultimaPos.lat, ultimaPos.lng, lat, lng);
                    if (d > 0.002) { odoTotal += d; atualizarTelaOdo(); ultimaPos = {lat, lng}; }
                } else { ultimaPos = {lat, lng}; }
                document.getElementById('viewVel').innerText = kmh.toFixed(1);
                db.ref('posicoes/' + num).set({ lat, lng, vel: kmh, ts: Date.now() });
            }, null, { enableHighAccuracy: true });
        }

        document.getElementById('btnIniciar').onclick = async function() {
            const num = document.getElementById('carro').value;
            const nome = document.getElementById('nome').value;
            if(!num || !nome) return alert("Preencha os dados!");
            localStorage.setItem('rally_carro_ativo', num);
            iniciarFluxoRastreio(num);
            carregarRoadbookFirebase();
        };

        function alterarOdo(v) { odoTotal = Math.max(0, odoTotal + v); atualizarTelaOdo(); }
        function zerarOdo() { if(confirm("Zerar?")) { odoTotal = 0; atualizarTelaOdo(); } }
        function atualizarTelaOdo() { 
            document.getElementById('displayOdo').innerText = odoTotal.toFixed(3); 
            atualizarScrollRoadbook(); 
        }
        function ajusteManualOdo() {
            let n = prompt("Ajustar KM:", odoTotal.toFixed(3));
            if(n) { odoTotal = parseFloat(n.replace(',','.')); atualizarTelaOdo(); }
        }

        function encerrarSessao() {
            if(confirm("Sair?")) {
                localStorage.clear();
                location.reload();
            }
        }

        function enviarDatalogger() {
            alert("Sincronizando dados locais com o servidor...");
        }
    </script>
</body>
</html>
