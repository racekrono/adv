<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Race Krono</title>

    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0d0af0">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Race Krono">
    <link rel="apple-touch-icon" href="https://raw.githubusercontent.com/racekrono/adv/refs/heads/main/Logo.png">
    
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    
    <style>
        body { font-family: sans-serif; background: #000000; color: white; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; overflow: hidden; }
        .card { background: #1a1a1a; padding: 25px; border-radius: 12px; width: 90%; max-width: 380px; box-shadow: 0 8px 32px rgba(0,0,0,0.8); border-top: 5px solid #ffffff; z-index: 10; }
        .logo { display: block; margin: 0 auto 20px auto; max-width: 150px; height: auto; }
        input, select, button { width: 100%; padding: 14px; margin-bottom: 15px; border-radius: 8px; border: 1px solid #333; background: #252525; color: white; font-size: 16px; box-sizing: border-box; }
        button { background: #f80303; border: none; font-weight: bold; cursor: pointer; transition: 0.3s; }
        #setup { display: block; } 
        .tracking { text-align: center; display: none; }
        .status-container { margin-top: 15px; padding: 10px; border-radius: 8px; background: rgba(0,0,0,0.5); border: 1px solid #333; }
        .status-gps { color: #2ecc71; font-weight: bold; font-size: 14px; }
        .status-offline { color: #f1c40f !important; }
        .wake-lock-status { color: #2ecc71; font-size: 10px; margin-top: 10px; text-transform: uppercase; font-weight: bold; }
        .odo-box { margin-top: 15px; padding: 15px 10px; border-top: 1px solid #333; background: rgba(0,0,0,0.4); border-radius: 10px; }
        .odo-val { font-size: 5rem; font-weight: bold; color: #f1c40f; margin: 2px 0; font-family: monospace; }
        .btn-mini { padding: 10px; font-size: 14px; background: #333; margin-bottom: 0; width: auto; flex: 1; border: 1px solid #444; }
        /* Esconder o vídeo de suporte */
        #videoWakeLock { position: absolute; width: 1px; height: 1px; opacity: 0.01; pointer-events: none; }
    </style>
</head>
<body>

    <video id="videoWakeLock" playsinline loop muted>
        <source src="https://raw.githubusercontent.com/bower-media-samples/big-buck-bunny-1080p-30s/master/video.mp4" type="video/mp4">
    </video>

    <div class="card">
        <div id="setup">
            <img src="https://raw.githubusercontent.com/racekrono/adv/refs/heads/main/Logo.png" class="logo">
            <h2 style="color:#ffffff; text-align:center; margin-top: 0;">Rally de Aventura</h2>
            <input type="text" id="nome" placeholder="Nome do Piloto">
            <select id="categoria">
                <option>UTV</option>
                <option>BAIANO 4x2</option><option>BAIANO 4x4</option>
                <option>INICIANTE 4x2</option><option>INICIANTE 4x4</option>
                <option>ANTIGOS</option>
            </select>
            <input type="number" id="carro" placeholder="Nº do Carro">
            <button id="btnIniciar">INICIAR PROVA</button>
        </div>

        <div id="ativo" class="tracking">
            <h2 id="viewCarro" style="color:#0d0af0; margin-bottom: 4px;">Carro --</h2>
            <div id="viewVel" style="font-size: 2rem; font-weight: bold; line-height: 1;">0.0</div>
            <p style="margin-top: 5px; color: #888; font-size: 12px;">KM/H</p>

            <div class="odo-box">
                <div id="displayOdo" class="odo-val">0.000</div>
                <div style="display:flex; gap:8px;">
                    <button class="btn-mini" onclick="alterarOdo(-0.001)">-1m</button>
                    <button class="btn-mini" onclick="zerarOdo()" style="background:#b30000;">ZERAR</button>
                    <button class="btn-mini" onclick="alterarOdo(0.001)">+1m</button>
                </div>
            </div>
            
            <div class="status-container">
                <div id="msgGps" class="status-gps">● CONECTANDO...</div>
                <div id="statusTela" class="wake-lock-status">PROTEÇÃO DE TELA ATIVA</div>
            </div>

            <button class="btn-sair" onclick="location.reload()" style="background:none; color:#555; text-decoration:underline; border:none; margin-top:15px;">Sair</button>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBPJkehV9C1x0hiY5dQSwSRtVf5c4P2JGE",
            authDomain: "cronometro-rally.firebaseapp.com",
            databaseURL: "https://cronometro-rally-default-rtdb.firebaseio.com",
            projectId: "cronometro-rally",
            appId: "1:341731891354:web:d0c34265be68015e98a723"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let wakeLock = null;
        let watchID = null;
        let odoTotal = 0;
        let ultimaPos = null;

        // Recurso 2: Wake Lock API com auto-reativação
        async function solicitarWakeLock() {
            if ('wakeLock' in navigator) {
                try {
                    wakeLock = await navigator.wakeLock.request('screen');
                    document.getElementById('statusTela').innerText = "TELA SEMPRE ACESA";
                    document.getElementById('statusTela').style.color = "#2ecc71";
                    
                    wakeLock.addEventListener('release', () => {
                        console.log('Wake Lock foi liberado');
                    });
                } catch (err) {
                    document.getElementById('statusTela').innerText = "ERRO NA PROTEÇÃO DE TELA";
                    document.getElementById('statusTela').style.color = "#e74c3c";
                }
            }
        }

        // Recurso 3: Reativação ao voltar para a aba (Visibility Change)
        document.addEventListener('visibilitychange', async () => {
            if (wakeLock !== null && document.visibilityState === 'visible') {
                await solicitarWakeLock();
            }
        });

        function iniciarFluxoRastreio(num) {
            document.getElementById('setup').style.display = 'none';
            document.getElementById('ativo').style.display = 'block';
            document.getElementById('viewCarro').innerText = "Carro " + num;
            
            // Ativa as duas camadas de proteção ao iniciar
            solicitarWakeLock();
            document.getElementById('videoWakeLock').play().catch(() => console.log("Vídeo aguardando interação"));

            watchID = navigator.geolocation.watchPosition(position => {
                const { latitude: lat, longitude: lng, speed, accuracy } = position.coords;
                const kmh = Math.round((speed || 0) * 3.6);
                document.getElementById('viewVel').innerText = kmh.toFixed(1);

                if (accuracy <= 20) {
                    db.ref('posicoes/' + num).set({ lat, lng, vel: kmh, ts: Date.now() });
                }
            }, null, { enableHighAccuracy: true });
        }

        document.getElementById('btnIniciar').onclick = function() {
            const num = document.getElementById('carro').value;
            if(!num) return alert("Insira o número do carro");
            iniciarFluxoRastreio(num);
        };

        function alterarOdo(v) { odoTotal = Math.max(0, odoTotal + v); atualizarTelaOdo(); }
        function zerarOdo() { if(confirm("Zerar?")) { odoTotal = 0; atualizarTelaOdo(); } }
        function atualizarTelaOdo() { document.getElementById('displayOdo').innerText = odoTotal.toFixed(3); }
    </script>
</body>
</html>
