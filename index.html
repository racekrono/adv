<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Race Krono - Digital</title>

    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0d0af0">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Race Krono">
    <link rel="apple-touch-icon" href="https://raw.githubusercontent.com/racekrono/adv/refs/heads/main/Logo.png">

    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    
    <style>
        body { font-family: sans-serif; background: #121212; color: white; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; overflow: hidden; }
        .card { background: #1e1e1e; padding: 20px; border-radius: 12px; width: 95%; max-width: 400px; box-shadow: 0 8px 32px rgba(0,0,0,0.5); border-top: 5px solid #ffffff; z-index: 10; max-height: 95vh; overflow-y: auto; }
        .logo { display: block; margin: 0 auto 15px auto; max-width: 120px; height: auto; }
        input, select, button { width: 100%; padding: 12px; margin-bottom: 12px; border-radius: 8px; border: 1px solid #333; background: #252525; color: white; font-size: 16px; box-sizing: border-box; }
        button { background: #f80303; border: none; font-weight: bold; cursor: pointer; color: white; }
        
        /* Estilo da Planilha Digital */
        .planilha-container { margin-top: 15px; border: 2px solid #333; border-radius: 8px; background: #000; height: 280px; overflow-y: auto; }
        .grid-planilha { display: grid; grid-template-columns: 60px 80px 60px 1fr; border-bottom: 1px solid #333; align-items: center; background: #1e1e1e; min-height: 70px; }
        .celula { padding: 8px; border-right: 1px solid #333; font-size: 13px; color: #fff; text-align: center; font-family: monospace; }
        .col-obs { text-align: left; padding-left: 10px; font-family: sans-serif; font-size: 11px; text-transform: uppercase; }
        .img-tulipa { width: 100%; max-height: 55px; filter: invert(1); object-fit: contain; }
        .linha-ativa { background: #f1c40f !important; }
        .linha-ativa .celula { color: #000 !important; border-right: 1px solid #9a7d0a; font-weight: bold; }
        
        .odo-val { font-size: 4.5rem; font-weight: bold; color: #f1c40f; margin: 2px 0; font-family: monospace; text-align: center; line-height: 1; }
        .status-gps { color: #2ecc71; font-weight: bold; font-size: 12px; text-align: center; margin-top: 5px; }
        .btn-mini { padding: 10px; background: #333; width: auto; flex: 1; margin-bottom: 0; }
        label { display: block; font-size: 11px; color: #888; margin-bottom: 5px; text-transform: uppercase; letter-spacing: 1px; }
    </style>
</head>
<body>

    <div class="card">
        <div id="setup">
            <img src="https://raw.githubusercontent.com/racekrono/adv/refs/heads/main/Logo.png" class="logo">
            <input type="text" id="nome" placeholder="Nome do Piloto">
            <select id="categoria">
                <option>UTV</option>
                <option>MOTO</option>
                <option>BAIANO 4x2</option>
                <option>BAIANO 4x4</option>
            </select>
            <input type="number" id="carro" placeholder="Nº do Veículo">
            
            <label>Planilha da Prova (JSON)</label>
            <input type="file" id="csvFile" accept=".json" style="font-size: 12px;">
            
            <button id="btnIniciar">INICIAR COMPETIÇÃO</button>
        </div>

        <div id="ativo" style="display:none; text-align: center;">
            <div style="display: flex; justify-content: space-between; align-items: center;">
                <h3 id="viewCarro" style="color:#0d0af0; margin: 0;">Carro --</h3>
                <div id="viewVel" style="font-size: 1.8rem; font-weight: bold;">0</div>
                <span style="font-size: 10px; color: #888;">KM/H</span>
            </div>

            <div id="displayOdo" class="odo-val">0.000</div>
            
            <div style="display:flex; gap:8px; margin-top: 5px;">
                <button class="btn-mini" onclick="alterarOdo(-0.010)">-10m</button>
                <button class="btn-mini" onclick="zerarOdo()" style="background:#b30000;">ZERAR</button>
                <button class="btn-mini" onclick="alterarOdo(0.010)">+10m</button>
            </div>

            <div class="planilha-container" id="listaDigital">
                <div style="padding: 40px 20px; color: #444; text-align: center;">Carregue a planilha para navegar</div>
            </div>
            
            <div id="msgGps" class="status-gps">● AGUARDANDO GPS...</div>
            <button onclick="encerrarSessao()" style="background:transparent; color:#555; font-size:10px; text-decoration:underline; border:none; margin-top:15px; width: auto;">ENCERRAR SESSÃO</button>
        </div>
    </div>

    <script>
        // Configurações do Firebase
        const firebaseConfig = {
            apiKey: "AIzaSyBPJkehV9C1x0hiY5dQSwSRtVf5c4P2JGE",
            authDomain: "cronometro-rally.firebaseapp.com",
            databaseURL: "https://cronometro-rally-default-rtdb.firebaseio.com",
            projectId: "cronometro-rally",
            appId: "1:341731891354:web:d0c34265be68015e98a723"
        };
        const app = firebase.initializeApp(firebaseConfig);
        const db = firebase.database(app);

        let odoTotal = 0;
        let watchID = null;
        let ultimaPos = null;
        let dadosPlanilha = [];

        // --- CARREGAMENTO DA PLANILHA ---
        document.getElementById('csvFile').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function(event) {
                try {
                    dadosPlanilha = JSON.parse(event.target.result);
                    console.log("Planilha carregada:", dadosPlanilha.length, "linhas");
                } catch(err) {
                    alert("Erro no arquivo JSON!");
                }
            };
            reader.readAsText(file);
        });

        function renderizarPlanilhaDigital() {
            const container = document.getElementById('listaDigital');
            if (dadosPlanilha.length === 0) return;
            
            container.innerHTML = dadosPlanilha.map((item, index) => `
                <div class="grid-planilha" id="tulipa-${index}">
                    <div class="celula">${parseFloat(item.km).toFixed(2)}</div>
                    <div class="celula"><img src="${item.tulipa}" class="img-tulipa"></div>
                    <div class="celula">${item.media}</div>
                    <div class="celula col-obs">${item.obs}</div>
                </div>
            `).join('');
        }

        function atualizarDestaquePlanilha() {
            if (dadosPlanilha.length === 0) return;
            
            let indiceAtivo = 0;
            for (let i = 0; i < dadosPlanilha.length; i++) {
                if (odoTotal >= parseFloat(dadosPlanilha[i].km)) {
                    indiceAtivo = i;
                } else {
                    break;
                }
            }

            document.querySelectorAll('.grid-planilha').forEach(el => el.classList.remove('linha-ativa'));
            const elementoAtivo = document.getElementById(`tulipa-${indiceAtivo}`);
            if (elementoAtivo) {
                elementoAtivo.classList.add('linha-ativa');
                elementoAtivo.scrollIntoView({ behavior: 'smooth', block: 'start' });
            }
        }

        // --- LÓGICA DE NAVEGAÇÃO E GPS ---
        function alterarOdo(v) { 
            odoTotal = Math.max(0, odoTotal + v); 
            atualizarTelaOdo(); 
        }

        function zerarOdo() { 
            if(confirm("Deseja zerar o odômetro?")) { odoTotal = 0; atualizarTelaOdo(); } 
        }

        function atualizarTelaOdo() { 
            document.getElementById('displayOdo').innerText = odoTotal.toFixed(3); 
            atualizarDestaquePlanilha();
        }

        function calcularDistancia(lat1, lon1, lat2, lon2) {
            const R = 6371; 
            const dLat = (lat2 - lat1) * Math.PI / 180;
            const dLon = (lon2 - lon1) * Math.PI / 180;
            const a = Math.sin(dLat/2) * Math.sin(dLat/2) + Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) * Math.sin(dLon/2) * Math.sin(dLon/2);
            return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a)); 
        }

        function iniciarFluxoRastreio(num) {
            document.getElementById('setup').style.display = 'none';
            document.getElementById('ativo').style.display = 'block';
            document.getElementById('viewCarro').innerText = "Carro " + num;
            
            renderizarPlanilhaDigital();

            watchID = navigator.geolocation.watchPosition(position => {
                const { latitude: lat, longitude: lng, accuracy, speed } = position.coords;
                const kmh = Math.round((speed || 0) * 3.6);

                if (accuracy <= 25) {
                    if (ultimaPos) {
                        const dist = calcularDistancia(ultimaPos.lat, ultimaPos.lng, lat, lng);
                        if (dist > 0.001) { 
                            odoTotal += dist;
                            atualizarTelaOdo();
                            ultimaPos = { lat, lng };
                        }
                    } else {
                        ultimaPos = { lat, lng };
                    }
                    document.getElementById('msgGps').innerText = "● GPS ATIVO (" + Math.round(accuracy) + "m)";
                }

                document.getElementById('viewVel').innerText = kmh;
                db.ref('posicoes/' + num).set({ lat, lng, vel: kmh, odo: odoTotal.toFixed(3), ts: Date.now() });

            }, (err) => {
                document.getElementById('msgGps').innerText = "❌ ERRO GPS";
            }, { enableHighAccuracy: true });
        }

        document.getElementById('btnIniciar').onclick = function() {
            const num = document.getElementById('carro').value;
            const nome = document.getElementById('nome').value;
            if(!num || !nome) return alert("Preencha o Nome e o Número!");
            iniciarFluxoRastreio(num);
        };

        function encerrarSessao() {
            if(confirm("Encerrar prova?")) location.reload();
        }
    </script>
</body>
</html>
