<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Painel Admin Rally - Oficial v3</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet.draw/1.0.4/leaflet.draw.css"/>
    <style>
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; height: 100%; width: 100%; background: #1a202c; font-family: sans-serif; display: flex; flex-direction: column; }
    
    #toolbar { 
        background: #2d3748; 
        display: flex; 
        flex-wrap: wrap; 
        padding: 10px; 
        gap: 15px; 
        z-index: 9999; 
        position: relative;
        border-bottom: 1px solid #4a5568;
    }

    .button-group {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        align-items: center;
        background: rgba(255,255,255,0.05);
        padding: 8px;
        border-radius: 8px;
    }

    #map { flex-grow: 1; width: 100%; background: #a0aec0; }

    button {
        padding: 8px 12px;
        background: #4a5568;
        color: white;
        border: none;
        border-radius: 4px;
        cursor: pointer;
        font-weight: bold;
        font-size: 11px;
    }

    button:hover { filter: brightness(1.2); }

    input, select {
        padding: 8px;
        border-radius: 4px;
        border: none;
        background: #1a202c;
        color: white;
        font-size: 11px;
    }

    .marker-label {
        background: #ed8936;
        border: 2px solid white;
        border-radius: 50%;
        color: white;
        font-weight: bold;
        text-align: center;
        line-height: 26px;
        width: 30px;
        height: 30px;
    }
    </style>
</head>
<body>

    <div id="toolbar">
        <div class="button-group">
            <input type="text" id="coordsInput" placeholder="Lat, Lng">
            <button onclick="adicionarPontoNaLinha()">📍 Add Ponto</button>
            <button onclick="finalizarLinhaManual()" style="background: #2b6cb0;">✏️ Criar Linha</button>
            <button onclick="limparTemporarios()">🗑️ Limpar</button>
        </div>

        <div class="button-group">
            <input type="text" id="cityInput" placeholder="Buscar Cidade...">
            <button onclick="buscar()">🔍</button>
            <button onclick="salvar()" style="background: #38a169;">💾 Salvar Trajeto</button>
            <button id="btnStatusProva" onclick="alternarStatusProva()">Carregando...</button>
            <button onclick="logoffGeral()" style="background: #742a2a;">🚫 Logoff Geral</button>
            <button onclick="excluirTodosCarros()" style="background: #e53e3e;">💀 Excluir Todos</button>
        </div>

        <div class="button-group">
            <button onclick="window.location.href='rastro.html'" style="background: #805ad5;">🗺️ Rastro</button>
            <button onclick="processarPenalidadesGeral()" style="background: #dd6b20;">🏁 Rodar Apuração</button>
            <button onclick="window.location.href='tempos.html'" style="background: #2c7a7b;">⏱️ Tempos</button>
            <button onclick="window.location.href='ranking-geral.html'" style="background: #b7791f;">🏆 RANKING FINAL</button>
        </div>

        <div class="button-group">
            <select id="carSelector"><option value="">Carro...</option></select>
            <button onclick="excluirCarro()">🗑️</button>  
            <button onclick="resetarTudo()" style="background: #000; color: red;">⚠️ RESET TOTAL</button>
        </div>
    </div>

    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet.draw/1.0.4/leaflet.draw.js"></script>
    <script src="https://unpkg.com/@turf/turf@6/turf.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>

    <script>
    const firebaseConfig = {
        apiKey: "AIzaSyBPJkehV9C1x0hiY5dQSwSRtVf5c4P2JGE",
        authDomain: "cronometro-rally.firebaseapp.com",
        databaseURL: "https://cronometro-rally-default-rtdb.firebaseio.com",
        projectId: "cronometro-rally",
        appId: "1:341731891354:web:d0c34265be68015e98a723"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let map, drawnItems;
    let pontosTemporarios = [];
    let linhaTemporaria;

    function initMap() {
        const osm = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png');
        const satelite = L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}');

        map = L.map('map', {
            center: [-12.26, -38.96],
            zoom: 13,
            layers: [osm]
        });

        const baseMaps = { "Ruas": osm, "Satélite": satelite };
        L.control.layers(baseMaps).addTo(map);

        drawnItems = new L.FeatureGroup();
        map.addLayer(drawnItems);

        const drawControl = new L.Control.Draw({
            edit: { featureGroup: drawnItems },
            draw: { 
                polyline: true, 
                polygon: true, 
                circle: true, // Habilitado para Checkpoints
                rectangle: false, 
                marker: false, 
                circlemarker: false 
            }
        });
        map.addControl(drawControl);

        linhaTemporaria = L.polyline([], {color: 'yellow', dashArray: '5, 5'}).addTo(map);

        map.on(L.Draw.Event.CREATED, function (event) {
            const layer = event.layer;
            layer.feature = layer.feature || {type: "Feature", properties: {}};
            
            if (event.layerType === 'polygon') {
                const vel = prompt("Velocidade Máxima do Radar (km/h):", "60");
                layer.feature.properties.velocidade = parseInt(vel) || 60;
                layer.feature.properties.tipo = 'radar';
            }
            
            if (event.layerType === 'circle') {
                layer.feature.properties.tipo = 'checkpoint';
                layer.feature.properties.radius = layer.getRadius(); // Salva o raio explicitamente
            }

            drawnItems.addLayer(layer);
        });

        carregarTrajeto();
        rastrearCarros();
        atualizarSeletorCarros();
        monitorarStatusProva();
    }

    // --- CORREÇÃO NO SALVAMENTO (Salva o Raio do Círculo) ---
    window.salvar = function() {
        const data = { type: "FeatureCollection", features: [] };
        
        drawnItems.eachLayer(layer => {
            const geojson = layer.toGeoJSON();
            geojson.properties = geojson.properties || {};
            
            // Se for um círculo, precisamos anexar o raio manualmente pois o GeoJSON padrão não suporta círculos
            if (layer instanceof L.Circle) {
                geojson.properties.radius = layer.getRadius();
                geojson.properties.tipo = 'checkpoint';
            }
            data.features.push(geojson);
        });

        db.ref('configuracoes/percurso').set(data).then(() => alert("Trajeto e Radares salvos com sucesso!"));
    };

    // --- CORREÇÃO NO CARREGAMENTO (Renderiza Círculos Novamente) ---
    function carregarTrajeto() {
        db.ref('configuracoes/percurso').once('value', snap => {
            if (snap.exists()) {
                L.geoJSON(snap.val(), {
                    pointToLayer: (feature, latlng) => {
                        // Se o GeoJSON tiver raio nas propriedades, recria como Círculo Leaflet
                        if (feature.properties && feature.properties.radius) {
                            return L.circle(latlng, { radius: feature.properties.radius });
                        }
                    },
                    onEachFeature: (feature, layer) => {
                        drawnItems.addLayer(layer);
                    }
                });
            }
        });
    }

    // --- APURAÇÃO ATUALIZADA (Radar + Checkpoint) ---
    window.processarPenalidadesGeral = async function() {
        if (!confirm("Deseja processar radares e checkpoints de todos os carros?")) return;
        
        const percursoSnap = await db.ref('configuracoes/percurso').once('value');
        if (!percursoSnap.exists()) return alert("Trajeto não definido!");
        
        const features = percursoSnap.val().features;
        const radares = features.filter(f => f.geometry.type === 'Polygon');
        const checkpoints = features.filter(f => f.properties && f.properties.radius);
        
        const rastrosSnap = await db.ref('rastros').once('value');
        const rastros = rastrosSnap.val() || {};

        for (let carId in rastros) {
            let penRadar = 0;
            let penCheckpoint = 0;
            let excessosPorRadar = {}; 
            const carPoints = Object.values(rastros[carId]);

            // 1. Processar Radares (Lógica de Tempo do Admin2)
            for (let radarFeature of radares) {
                const velMax = radarFeature.properties.velocidade || 60;
                const poly = turf.polygon(radarFeature.geometry.coordinates);

                carPoints.forEach(p => {
                    const pt = turf.point([p.lng, p.lat]);
                    if (turf.booleanPointInPolygon(pt, poly) && p.vel > velMax) {
                        const radarId = JSON.stringify(radarFeature.geometry.coordinates[0][0]);
                        if (!excessosPorRadar[radarId]) excessosPorRadar[radarId] = [];
                        excessosPorRadar[radarId].push(p.ts);
                    }
                });
            }

            // Cálculo penalidade radar (Admin2 style: 500pts a cada 10s extras)
            for (let rid in excessosPorRadar) {
                const tempos = excessosPorRadar[rid].sort((a, b) => a - b);
                if (tempos.length > 0) {
                    const duracaoSeg = (tempos[tempos.length - 1] - tempos[0]) / 1000;
                    if (duracaoSeg > 10) {
                        penRadar += 500 + (Math.floor((duracaoSeg - 10) / 10) * 500);
                    }
                }
            }

            // 2. Processar Checkpoints (Lógica de Proximidade do Admin.html)
            checkpoints.forEach(cp => {
                const centro = cp.geometry.coordinates; // [lng, lat]
                const raioKm = cp.properties.radius / 1000;
                
                const passouNoCheckpoint = carPoints.some(p => {
                    const dist = turf.distance(turf.point([p.lng, p.lat]), turf.point(centro));
                    return dist <= raioKm;
                });

                if (!passouNoCheckpoint) penCheckpoint += 2000; // Penalidade fixa por perder checkpoint
            });

            // Atualiza o competidor com a soma das penalidades (negativo para diminuir do ranking)
            await db.ref(`competidores/${carId}`).update({ 
                penalidadeRadar: penRadar,
                penalidadeCheckpoint: penCheckpoint,
                pontos: 0 - (penRadar + penCheckpoint) 
            });
        }
        alert("Apuração completa: Radares e Checkpoints processados!");
    };

    // --- FUNÇÕES DE UTILITÁRIO (MANTIDAS) ---
    window.logoffGeral = function() {
        if (confirm("Deseja desconectar todos os competidores?") && prompt("Senha:") === "261291") {
            db.ref('configuracoes').update({ comandoEncerramento: Date.now(), provaAberta: false });
            alert("Logoff enviado!");
        }
    };

    window.excluirTodosCarros = function() {
        if (confirm("Apagar todos os dados?") && prompt("Senha:") === "261291") {
            Promise.all([db.ref('competidores').remove(), db.ref('posicoes').remove(), db.ref('rastros').remove(), db.ref('tempos').remove()])
            .then(() => location.reload());
        }
    };

    function rastrearCarros() {
        const markers = {};
        db.ref('posicoes').on('value', snap => {
            snap.forEach(child => {
                const carId = child.key;
                const p = child.val();
                if (markers[carId]) {
                    markers[carId].setLatLng([p.lat, p.lng]);
                } else {
                    markers[carId] = L.marker([p.lat, p.lng], {
                        icon: L.divIcon({ className: 'marker-label', html: carId, iconSize: [30, 30] })
                    }).addTo(map);
                }
            });
        });
    }

    function atualizarSeletorCarros() {
        db.ref('competidores').on('value', snap => {
            const selector = document.getElementById('carSelector');
            selector.innerHTML = '<option value="">Carro...</option>';
            snap.forEach(child => {
                selector.innerHTML += `<option value="${child.key}">Carro ${child.key}</option>`;
            });
        });
    }

    window.excluirCarro = async function() {
        const carId = document.getElementById('carSelector').value;
        if (carId && confirm(`Excluir Carro ${carId}?`)) {
            await Promise.all([db.ref(`competidores/${carId}`).remove(), db.ref(`posicoes/${carId}`).remove(), db.ref(`rastros/${carId}`).remove(), db.ref(`tempos/${carId}`).remove()]);
            location.reload(); 
        }
    };

    function monitorarStatusProva() {
        const btn = document.getElementById('btnStatusProva');
        db.ref('configuracoes/provaAberta').on('value', snap => {
            const aberta = snap.val();
            btn.innerText = aberta ? "🔓 PROVA ABERTA" : "🔒 PROVA FECHADA";
            btn.style.background = aberta ? "#38a169" : "#e53e3e";
        });
    }

    window.alternarStatusProva = function() {
        const ref = db.ref('configuracoes/provaAberta');
        ref.once('value', snap => { ref.set(!snap.val()); });
    };

    window.adicionarPontoNaLinha = function() {
        const val = document.getElementById('coordsInput').value;
        const coords = val.split(',');
        if (coords.length === 2) {
            const lat = parseFloat(coords[0]), lng = parseFloat(coords[1]);
            pontosTemporarios.push([lat, lng]);
            linhaTemporaria.setLatLngs(pontosTemporarios);
            map.setView([lat, lng], 15);
        }
    };

    window.finalizarLinhaManual = function() {
        if (pontosTemporarios.length < 2) return alert("Mínimo 2 pontos.");
        drawnItems.addLayer(L.polyline(pontosTemporarios, {color: '#FF007F'}));
        pontosTemporarios = []; linhaTemporaria.setLatLngs([]);
    };

    window.limparTemporarios = function() {
        pontosTemporarios = []; linhaTemporaria.setLatLngs([]);
    };

    window.resetarTudo = function() {
        if (confirm("Reset total?") && prompt("Senha:") === "261291") db.ref('/').remove().then(() => location.reload());
    };

    window.buscar = async function() {
        const query = document.getElementById('cityInput').value;
        const res = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${query}`);
        const data = await res.json();
        if (data && data.length > 0) map.setView([data[0].lat, data[0].lon], 14);
    };

    window.onload = initMap;
    </script>
</body>
</html>
