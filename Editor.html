<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Race Krono - Editor de Planilha</title>
    <style>
        :root { --amarelo: #f1c40f; --bg: #121212; --card: #1e1e1e; }
        body { font-family: sans-serif; background: var(--bg); color: white; padding: 20px; }
        .container { max-width: 900px; margin: auto; background: var(--card); padding: 20px; border-radius: 12px; border-top: 5px solid var(--amarelo); }
        .controles { display: flex; justify-content: space-between; margin-bottom: 20px; align-items: center; }
        .btn-acao { padding: 10px 20px; border: none; border-radius: 5px; font-weight: bold; cursor: pointer; transition: 0.2s; }
        .btn-save { background: var(--amarelo); color: black; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th { background: #252525; color: var(--amarelo); padding: 12px; font-size: 12px; border: 1px solid #333; }
        td { padding: 10px; border: 1px solid #333; text-align: center; }
        input { background: #121212; color: white; border: 1px solid #444; padding: 10px; border-radius: 4px; width: 90%; font-size: 16px; }
        
        .btn-tulipa-seletor { background: #000; border: 1px dashed #555; cursor: pointer; width: 70px; height: 70px; display: flex; align-items: center; justify-content: center; margin: auto; }
        .btn-tulipa-seletor img { max-width: 100%; max-height: 100%; object-fit: contain; }

        #modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 100; justify-content: center; align-items: center; }
        .modal-content { background: #222; padding: 20px; border-radius: 15px; width: 90%; max-width: 600px; border: 2px solid var(--amarelo); }
        .abas { display: flex; gap: 10px; margin-bottom: 15px; border-bottom: 1px solid #444; padding-bottom: 10px; }
        .aba { padding: 8px 15px; cursor: pointer; background: #333; border-radius: 5px; font-size: 14px; }
        .aba.ativa { background: var(--amarelo); color: black; font-weight: bold; }
        .galeria { display: grid; grid-template-columns: repeat(auto-fill, minmax(70px, 1fr)); gap: 10px; max-height: 350px; overflow-y: auto; padding: 10px; }
        .galeria img { width: 100%; cursor: pointer; border: 1px solid #444; padding: 5px; border-radius: 5px; transition: 0.2s; background: #333; }
        
        /* Alerta de Auto-Save */
        #aviso-save { color: #2ecc71; font-size: 11px; font-weight: bold; display: none; }
    </style>
</head>
<body>

<div class="container">
    <div class="controles">
        <div>
            <h2>🛠️ Editor Race Krono</h2>
            <span id="aviso-save">✓ Alterações salvas no cache</span>
        </div>
        <div style="display: flex; gap: 10px;">
            <button class="btn-acao" onclick="limparEditor()" style="background:#e74c3c; color:white;">🗑️ LIMPAR TUDO</button>
            <button class="btn-acao" onclick="document.getElementById('importInput').click()" style="background:#3498db; color:white;">📂 IMPORTAR</button>
            <button class="btn-acao btn-save" onclick="salvarJSON()">📥 SALVAR JSON</button>
        </div>
    </div>

    <input type="file" id="importInput" style="display:none" accept=".json" onchange="importarJSON(this)">

    <table id="tabelaDados">
        <thead>
            <tr>
                <th style="width: 150px;">KM</th>
                <th style="width: 100px;">TULIPA</th>
                <th>OBSERVAÇÃO</th>
                <th style="width: 40px;"></th>
            </tr>
        </thead>
        <tbody></tbody>
    </table>
    <button class="btn-acao" onclick="adicionarLinha()" style="background: #2ecc71; color: white; width: 100%; margin-top: 15px;">+ ADICIONAR NOVO PONTO</button>
</div>

<div id="modal">
    <div class="modal-content">
        <h3>Selecione a Tulipa</h3>
        <div class="abas">
            <div class="aba ativa" onclick="mudarAba('frente', this)">Frente</div>
            <div class="aba" onclick="mudarAba('esquerda', this)">Esquerda</div>
            <div class="aba" onclick="mudarAba('direita', this)">Direita</div>
        </div>
        <div class="galeria" id="galeria"></div>
        <br>
        <button class="btn-acao" onclick="fecharModal()" style="background:#e74c3c; color:white; width: 100%;">FECHAR</button>
    </div>
</div>

<script>
    const URL_BASE = "https://raw.githubusercontent.com/racekrono/adv/refs/heads/main/tulipas/";
    const imagensPorPasta = { frente: 10, esquerda: 10, direita: 10 };
    let linhaSendoEditada = null;
    let abaAtual = 'frente';

    // --- FUNÇÕES DE AUTO-SAVE ---
    function gravarCache() {
        const linhas = document.querySelectorAll("#tabelaDados tbody tr");
        const rascunho = Array.from(linhas).map(linha => ({
            km: linha.querySelector(".km").value,
            tulipa: linha.querySelector(".btn-tulipa-seletor img").dataset.url,
            obs: linha.querySelector(".obs").value
        }));
        localStorage.setItem('rascunho_racekrono', JSON.stringify(rascunho));
        
        const aviso = document.getElementById('aviso-save');
        aviso.style.display = 'block';
        setTimeout(() => aviso.style.display = 'none', 2000);
    }

    function restaurarCache() {
        const salvo = localStorage.getItem('rascunho_racekrono');
        if (salvo) {
            const dados = JSON.parse(salvo);
            if (dados.length > 0 && confirm("Encontramos uma planilha não salva. Deseja restaurar?")) {
                document.querySelector("#tabelaDados tbody").innerHTML = "";
                dados.forEach(item => adicionarLinha(item));
            } else {
                adicionarLinha();
            }
        } else {
            adicionarLinha();
        }
    }

    function limparEditor() {
        if(confirm("Isso apagará todo o rascunho atual. Continuar?")) {
            localStorage.removeItem('rascunho_racekrono');
            location.reload();
        }
    }

    // --- LÓGICA DO EDITOR ---
    function adicionarLinha(dados = null) {
        const tbody = document.querySelector("#tabelaDados tbody");
        const tr = document.createElement("tr");
        const imgPath = (dados && dados.tulipa) ? dados.tulipa : (URL_BASE + "frente/1.png");

        tr.innerHTML = `
            <td><input type="number" step="0.001" class="km" value="${dados ? dados.km : ''}" oninput="gravarCache()"></td>
            <td>
                <div class="btn-tulipa-seletor" onclick="abrirModal(this)">
                    <img src="${imgPath}" data-url="${imgPath}">
                </div>
            </td>
            <td><input type="text" class="obs" value="${dados ? dados.obs : ''}" oninput="gravarCache()" placeholder="..."></td>
            <td><button onclick="this.parentElement.parentElement.remove(); gravarCache();" style="background:none; border:none; color:#e74c3c; cursor:pointer;">✕</button></td>
        `;
        tbody.appendChild(tr);
    }

    // Modal e Galeria (Mesma lógica anterior)
    function abrirModal(elemento) { linhaSendoEditada = elemento.querySelector("img"); document.getElementById("modal").style.display = "flex"; renderizarGaleria(); }
    function fecharModal() { document.getElementById("modal").style.display = "none"; gravarCache(); }
    function mudarAba(pasta, elemento) {
        abaAtual = pasta;
        document.querySelectorAll('.aba').forEach(a => a.classList.remove('ativa'));
        elemento.classList.add('ativa');
        renderizarGaleria();
    }
    function renderizarGaleria() {
        const galeria = document.getElementById("galeria");
        galeria.innerHTML = "";
        for (let i = 1; i <= imagensPorPasta[abaAtual]; i++) {
            const img = document.createElement("img");
            const url = `${URL_BASE}${abaAtual}/${i}.png`;
            img.src = url;
            img.onclick = function() { linhaSendoEditada.src = url; linhaSendoEditada.dataset.url = url; fecharModal(); };
            galeria.appendChild(img);
        }
    }

    function salvarJSON() {
        const linhas = document.querySelectorAll("#tabelaDados tbody tr");
        const data = Array.from(linhas).map(linha => ({
            km: parseFloat(linha.querySelector(".km").value),
            tulipa: linha.querySelector(".btn-tulipa-seletor img").dataset.url,
            media: "--",
            obs: linha.querySelector(".obs").value.toUpperCase()
        })).filter(item => !isNaN(item.km));
        data.sort((a, b) => a.km - b.km);
        const blob = new Blob([JSON.stringify(data, null, 2)], {type: "application/json"});
        const a = document.createElement("a");
        a.href = URL.createObjectURL(blob);
        a.download = "planilha_prova.json";
        a.click();
    }

    function importarJSON(input) {
        const file = input.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = function(e) {
            const importados = JSON.parse(e.target.result);
            document.querySelector("#tabelaDados tbody").innerHTML = "";
            importados.forEach(item => adicionarLinha(item));
            gravarCache();
        };
        reader.readAsText(file);
    }

    // Iniciar tentando restaurar o que estava salvo
    restaurarCache();
</script>
</body>
</html>
