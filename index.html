<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Race Krono</title>

    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0d0af0">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Race Krono">
    <link rel="apple-touch-icon" href="https://raw.githubusercontent.com/racekrono/adv/refs/heads/main/Logo.png">

    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    
    <style>
        body { font-family: sans-serif; background: #121212; color: white; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; overflow: hidden; }
        .card { background: #1e1e1e; padding: 25px; border-radius: 12px; width: 90%; max-width: 380px; box-shadow: 0 8px 32px rgba(0,0,0,0.5); border-top: 5px solid #ffffff; z-index: 10; max-height: 95vh; overflow-y: auto; }
        .logo { display: block; margin: 0 auto 20px auto; max-width: 150px; height: auto; }
        input, select, button { width: 100%; padding: 14px; margin-bottom: 15px; border-radius: 8px; border: 1px solid #333; background: #252525; color: white; font-size: 16px; box-sizing: border-box; }
        button { background: #f80303; border: none; font-weight: bold; cursor: pointer; transition: 0.3s; }
        
        .tracking { text-align: center; display: none; }
        .odo-val { font-size: 5rem; font-weight: bold; color: #f1c40f; margin: 2px 0; font-family: monospace; }
        .odo-btns { display: flex; gap: 4px; justify-content: center; flex-wrap: wrap; }
        .btn-mini { padding: 10px; font-size: 12px; background: #333; margin-bottom: 5px; width: auto; flex: 1; border: 1px solid #444; }

        .planilha-container { margin-top: 15px; border: 2px solid #333; border-radius: 8px; background: #000; height: 220px; overflow-y: auto; }
        .grid-planilha { display: grid; grid-template-columns: 55px 75px 50px 1fr; border-bottom: 1px solid #222; align-items: center; min-height: 65px; }
        .celula { padding: 4px; font-size: 12px; color: #fff; text-align: center; font-family: monospace; }
        .col-obs { text-align: left; font-size: 10px; text-transform: uppercase; color: #888; }
        .img-tulipa { width: 100%; max-height: 50px; object-fit: contain; }
        .linha-ativa { background: #f1c40f !important; }
        .linha-ativa .celula, .linha-ativa .col-obs { color: #000 !important; font-weight: bold; }

        .status-gps { color: #f1c40f; font-weight: bold; font-size: 11px; margin-top: 10px; }
        .status-net { font-size: 10px; margin-top: 5px; font-weight: bold; }
        .btn-sair { background: transparent; color: #444; font-size: 10px; text-decoration: underline; border: none; cursor: pointer; margin-top: 10px; }
    </style>
</head>
<body>

    <div class="card">
        <div id="setup">
            <img src="https://raw.githubusercontent.com/racekrono/adv/refs/heads/main/Logo.png" class="logo">
            <input type="text" id="nome" placeholder="Nome do Piloto">
            <select id="categoria">
                <option>UTV</option><option>BAIANO 4x2</option><option>BAIANO 4x4</option>
            </select>
            <input type="number" id="carro" placeholder="Nº do Carro">
            <button id="btnIniciar">INICIAR PROVA</button>
        </div>

        <div id="ativo" class="tracking">
            <div style="display: flex; justify-content: space-between; align-items: center;">
                <h3 id="viewCarro" style="color:#0d0af0; margin: 0;">Carro --</h3>
                <div id="viewVel" style="font-size: 1.8rem; font-weight: bold;">0</div>
            </div>

            <div id="displayOdo" class="odo-val">0.000</div>
            
            <div class="odo-btns">
                <button class="btn-mini" onclick="alterarOdo(-0.010)">-10m</button>
                <button class="btn-mini" onclick="alterarOdo(-0.001)">-1m</button>
                <button class="btn-mini" onclick="zerarOdo()" style="background:#b30000;">ZERAR</button>
                <button class="btn-mini" onclick="alterarOdo(0.001)">+1m</button>
                <button class="btn-mini" onclick="alterarOdo(0.010)">+10m</button>
            </div>

            <div class="planilha-container" id="listaDigital">
                <div style="padding: 20px; color: #444;">Buscando planilha...</div>
            </div>
            
            <div id="msgGps" class="status-gps">● BUSCANDO SATÉLITES...</div>
            <div id="msgNet" class="status-net" style="color: #2ecc71;">● CONECTADO À NUVEM</div>
            <button class="btn-sair" onclick="encerrarSessao()">Encerrar Sessão</button>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBPJkehV9C1x0hiY5dQSwSRtVf5c4P2JGE",
            authDomain: "cronometro-rally.firebaseapp.com",
            databaseURL: "https://cronometro-rally-default-rtdb.firebaseio.com",
            projectId: "cronometro-rally",
            appId: "1:341731891354:web:d0c34265be68015e98a723"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let odoTotal = 0;
        let watchID = null;
        let ultimaPos = null;
        let dadosPlanilha = [];

        // --- MONITOR DE INTERNET ---
        window.addEventListener('offline', () => {
            const net = document.getElementById('msgNet');
            net.innerText = "⚠️ SEM INTERNET! DADOS PROTEGIDOS, NÃO FECHE A TELA";
            net.style.color = "#f80303";
        });
        window.addEventListener('online', () => {
            const net = document.getElementById('msgNet');
            net.innerText = "● CONECTADO À NUVEM";
            net.style.color = "#2ecc71";
        });

        window.onload = function() {
            const carroSalvo = localStorage.getItem('rally_carro_ativo');
            if (carroSalvo) iniciarFluxoRastreio(carroSalvo);
        };

        async function carregarPlanilhaHibrida() {
            try {
                const snap = await db.ref('prova_atual').once('value');
                if (snap.exists()) {
                    dadosPlanilha = snap.val();
                    localStorage.setItem('backup_planilha', JSON.stringify(dadosPlanilha));
                }
            } catch (e) {
                const backup = localStorage.getItem('backup_planilha');
                if (backup) dadosPlanilha = JSON.parse(backup);
            }
            renderizarPlanilha();
        }

        function renderizarPlanilha() {
            const container = document.getElementById('listaDigital');
            container.innerHTML = dadosPlanilha.map((p, i) => `
                <div class="grid-planilha" id="t-${i}">
                    <div class="celula">${parseFloat(p.km).toFixed(3)}</div>
                    <div class="celula"><img src="${p.tulipa}" class="img-tulipa"></div>
                    <div class="celula">${p.media || '--'}</div>
                    <div class="celula col-obs">${p.obs || ''}</div>
                </div>
            `).join('');
            atualizarDestaque();
        }

        function atualizarDestaque() {
            if (dadosPlanilha.length === 0) return;
            let idx = 0;
            for (let i = 0; i < dadosPlanilha.length; i++) {
                if (odoTotal >= parseFloat(dadosPlanilha[i].km)) idx = i;
                else break;
            }
            document.querySelectorAll('.grid-planilha').forEach(el => el.classList.remove('linha-ativa'));
            const ativo = document.getElementById('t-' + idx);
            if (ativo) {
                ativo.classList.add('linha-ativa');
                ativo.scrollIntoView({ behavior: 'smooth', block: 'center' });
            }
        }

        function alterarOdo(v) { odoTotal = Math.max(0, odoTotal + v); atualizarTela(); }
        function zerarOdo() { if(confirm("Zerar Odômetro?")) { odoTotal = 0; atualizarTela(); } }
        function atualizarTela() { 
            document.getElementById('displayOdo').innerText = odoTotal.toFixed(3); 
            atualizarDestaque();
        }

        function calcularDistancia(lat1, lon1, lat2, lon2) {
            const R = 6371;
            const dLat = (lat2 - lat1) * Math.PI / 180;
            const dLon = (lon2 - lon1) * Math.PI / 180;
            const a = Math.sin(dLat/2)**2 + Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLon/2)**2;
            return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
        }

        function iniciarFluxoRastreio(num) {
            document.getElementById('setup').style.display = 'none';
            document.getElementById('ativo').style.display = 'block';
            document.getElementById('viewCarro').innerText = "Carro " + num;
            localStorage.setItem('rally_carro_ativo', num);
            carregarPlanilhaHibrida();

            watchID = navigator.geolocation.watchPosition(pos => {
                const { latitude: lat, longitude: lng, accuracy, speed } = pos.coords;
                const kmh = Math.round((speed || 0) * 3.6);
                const statusGps = document.getElementById('msgGps');

                if (accuracy <= 25) {
                    statusGps.innerText = "● GPS ATIVO (" + Math.round(accuracy) + "m)";
                    statusGps.style.color = "#2ecc71";
                    if (ultimaPos) {
                        const d = calcularDistancia(ultimaPos.lat, ultimaPos.lng, lat, lng);
                        if (d > 0.001) { odoTotal += d; atualizarTela(); ultimaPos = {lat, lng}; }
                    } else { ultimaPos = {lat, lng}; }
                } else {
                    statusGps.innerText = "● SINAL GPS FRACO (" + Math.round(accuracy) + "m)";
                    statusGps.style.color = "#f1c40f";
                }
                
                document.getElementById('viewVel').innerText = kmh;
                db.ref('posicoes/' + num).set({ lat, lng, vel: kmh, odo: odoTotal.toFixed(3), ts: Date.now() });
            }, (err) => {
                document.getElementById('msgGps').innerText = "❌ ERRO GPS: " + err.message;
            }, { enableHighAccuracy: true });
        }

        document.getElementById('btnIniciar').onclick = function() {
            const num = document.getElementById('carro').value;
            const nome = document.getElementById('nome').value;
            if(!num || !nome) return alert("Preencha Nome e Número!");
            iniciarFluxoRastreio(num);
        };

        function encerrarSessao() {
            if(confirm("Encerrar prova e sair?")) {
                localStorage.removeItem('rally_carro_ativo');
                location.reload();
            }
        }
    </script>
</body>
</html>
