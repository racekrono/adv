<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Race Krono - Digital</title>

    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#121212">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Race Krono">
    <link rel="apple-touch-icon" href="https://raw.githubusercontent.com/racekrono/adv/refs/heads/main/Logo.png">

    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    
    <style>
        body { font-family: sans-serif; background: #121212; color: white; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; overflow: hidden; }
        .card { background: #1e1e1e; padding: 20px; border-radius: 12px; width: 95%; max-width: 400px; text-align: center; border-top: 5px solid #f1c40f; }
        
        input { width: 100%; padding: 12px; margin: 8px 0; border-radius: 6px; border: none; background: #2d2d2d; color: white; font-size: 16px; }
        button { width: 100%; padding: 15px; margin-top: 10px; border-radius: 8px; border: none; background: #f1c40f; color: black; font-weight: bold; font-size: 18px; cursor: pointer; }
        
        #ativo { display: none; width: 100%; }
        .odo-val { font-size: 4.5rem; font-weight: bold; color: #f1c40f; margin: 10px 0; font-family: monospace; }
        .grid-topo { display: flex; justify-content: space-between; background: #000; padding: 10px; border-radius: 8px; margin-bottom: 10px; }
        .topo-item { flex: 1; }
        .topo-label { font-size: 10px; color: #888; text-transform: uppercase; }
        .topo-val { font-size: 1.5rem; font-weight: bold; }

        /* Planilha Digital */
        .planilha-container { margin-top: 15px; border: 2px solid #333; background: #000; height: 300px; overflow-y: auto; border-radius: 8px; }
        .grid-planilha { display: grid; grid-template-columns: 65px 85px 60px 1fr; border-bottom: 1px solid #222; align-items: center; min-height: 75px; transition: 0.3s; }
        .celula { padding: 5px; color: #fff; text-align: center; font-family: monospace; font-size: 14px; }
        .col-obs { text-align: left; font-family: sans-serif; font-size: 11px; text-transform: uppercase; color: #bbb; }
        
        /* Imagem da Tulipa Branca Original */
        .img-tulipa { width: 100%; max-height: 60px; object-fit: contain; }
        
        .linha-ativa { background: #f1c40f !important; }
        .linha-ativa .celula { color: #000 !important; font-weight: bold; }
        .linha-ativa .col-obs { color: #000 !important; font-weight: bold; }

        #msgGps { font-size: 10px; color: #f1c40f; margin-top: 10px; display: block; }
    </style>
</head>
<body>

    <div class="card">
        <div id="setup">
            <img src="https://raw.githubusercontent.com/racekrono/adv/refs/heads/main/Logo.png" width="80" style="margin-bottom: 10px;">
            <h2 style="margin:0 0 15px 0;">Race Krono</h2>
            <input type="text" id="nome" placeholder="Nome do Piloto">
            <input type="number" id="carro" placeholder="Número do Carro">
            <button id="btnIniciar">INICIAR PROVA</button>
        </div>

        <div id="ativo">
            <div class="grid-topo">
                <div class="topo-item">
                    <div class="topo-label">Velocidade</div>
                    <div id="viewVel" class="topo-val">0</div>
                </div>
                <div class="topo-item" style="border-left: 1px solid #333;">
                    <div class="topo-label">KM Ideal</div>
                    <div id="viewIdeal" class="topo-val">--</div>
                </div>
            </div>

            <div id="displayOdo" class="odo-val">0.000</div>
            
            <div class="planilha-container" id="listaDigital">
                <div style="padding: 20px; color: #666;">Carregando planilha...</div>
            </div>

            <span id="msgGps">Buscando sinal GPS...</span>
            <button onclick="encerrarSessao()" style="background: #c53030; color: white; margin-top: 15px; font-size: 12px; padding: 10px;">ENCERRAR SESSÃO</button>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBPJkehV9C1x0hiY5dQSwSRtVf5c4P2JGE",
            authDomain: "cronometro-rally.firebaseapp.com",
            databaseURL: "https://cronometro-rally-default-rtdb.firebaseio.com",
            projectId: "cronometro-rally",
            storageBucket: "cronometro-rally.firebasestorage.app",
            messagingSenderId: "341731891354",
            appId: "1:341731891354:web:d0c34265be68015e98a723"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let odoTotal = 0;
        let ultimaPos = null;
        let dadosPlanilha = [];

        // --- FUNÇÃO HÍBRIDA DE CARREGAMENTO ---
        async function carregarDadosPlanilha() {
            // 1. Tenta buscar da Nuvem
            try {
                const snap = await db.ref('prova_atual').once('value');
                if (snap.exists()) {
                    dadosPlanilha = snap.val();
                    localStorage.setItem('backup_planilha', JSON.stringify(dadosPlanilha));
                    console.log("Planilha atualizada via Nuvem.");
                } else {
                    throw new Error("Nuvem vazia");
                }
            } catch (e) {
                // 2. Se falhar, usa o Backup Local
                const backup = localStorage.getItem('backup_planilha');
                if (backup) {
                    dadosPlanilha = JSON.parse(backup);
                    console.log("Planilha carregada do Backup Local (Offline).");
                }
            }
            renderizarPlanilhaDigital();
        }

        function renderizarPlanilhaDigital() {
            const container = document.getElementById('listaDigital');
            container.innerHTML = "";
            if (dadosPlanilha.length === 0) {
                container.innerHTML = "<div style='padding:20px;'>Sem dados de planilha disponíveis.</div>";
                return;
            }
            dadosPlanilha.forEach((p, index) => {
                const item = document.createElement('div');
                item.className = 'grid-planilha';
                item.id = 'ponto-' + index;
                item.innerHTML = `
                    <div class="celula">${parseFloat(p.km).toFixed(3)}</div>
                    <div class="celula"><img src="${p.tulipa}" class="img-tulipa"></div>
                    <div class="celula">${p.media || '--'}</div>
                    <div class="celula col-obs">${p.obs || ''}</div>
                `;
                container.appendChild(item);
            });
        }

        function atualizarDestaquePlanilha() {
            let pontoAtualIdx = 0;
            for (let i = 0; i < dadosPlanilha.length; i++) {
                if (odoTotal >= dadosPlanilha[i].km) {
                    pontoAtualIdx = i;
                } else {
                    break;
                }
            }
            
            document.querySelectorAll('.grid-planilha').forEach(el => el.classList.remove('linha-ativa'));
            const elAtivo = document.getElementById('ponto-' + pontoAtualIdx);
            if (elAtivo) {
                elAtivo.classList.add('linha-ativa');
                elAtivo.scrollIntoView({ behavior: 'smooth', block: 'center' });
            }
        }

        function iniciarFluxoRastreio(num) {
            document.getElementById('setup').style.display = 'none';
            document.getElementById('ativo').style.display = 'block';
            
            carregarDadosPlanilha();

            navigator.geolocation.watchPosition((position) => {
                const { latitude: lat, longitude: lng, speed, accuracy } = position.coords;
                const kmh = Math.round((speed || 0) * 3.6);

                if (accuracy <= 25) {
                    if (ultimaPos) {
                        const dist = calcularDistancia(ultimaPos.lat, ultimaPos.lng, lat, lng);
                        if (dist > 0.001) { 
                            odoTotal += dist;
                            document.getElementById('displayOdo').innerText = odoTotal.toFixed(3);
                            atualizarDestaquePlanilha();
                            ultimaPos = { lat, lng };
                        }
                    } else {
                        ultimaPos = { lat, lng };
                    }
                    document.getElementById('msgGps').innerText = "● GPS ATIVO (" + Math.round(accuracy) + "m)";
                }

                document.getElementById('viewVel').innerText = kmh;
                db.ref('posicoes/' + num).set({ 
                    lat, lng, vel: kmh, odo: odoTotal.toFixed(3), ts: Date.now() 
                });

            }, (err) => {
                document.getElementById('msgGps').innerText = "❌ ERRO GPS: " + err.message;
            }, { enableHighAccuracy: true });
        }

        function calcularDistancia(lat1, lon1, lat2, lon2) {
            const R = 6371;
            const dLat = (lat2 - lat1) * Math.PI / 180;
            const dLon = (lon2 - lon1) * Math.PI / 180;
            const a = Math.sin(dLat/2) * Math.sin(dLat/2) +
                      Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) *
                      Math.sin(dLon/2) * Math.sin(dLon/2);
            const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
            return R * c;
        }

        document.getElementById('btnIniciar').onclick = function() {
            const num = document.getElementById('carro').value;
            const nome = document.getElementById('nome').value;
            if(!num || !nome) return alert("Preencha Nome e Número!");
            iniciarFluxoRastreio(num);
        };

        function encerrarSessao() {
            if(confirm("Deseja realmente encerrar a prova?")) location.reload();
        }
    </script>
</body>
</html>
