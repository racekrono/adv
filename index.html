    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBPJkehV9C1x0hiY5dQSwSRtVf5c4P2JGE",
            authDomain: "cronometro-rally.firebaseapp.com",
            databaseURL: "https://cronometro-rally-default-rtdb.firebaseio.com",
            projectId: "cronometro-rally",

        };
        const app = firebase.initializeApp(firebaseConfig);
        const db = firebase.database(app);

        let wakeLock = null;
        let watchID = null;
        let odoTotal = 0;
        let ultimaPos = null;
        let ultimoIndiceAtivo = -1;
        
        // Variáveis do Radar
        let radaresAtivos = [];
        let intervaloAlertaRadar = null;

        let audioCtx = null;

        function obterAudioContext() {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            if (audioCtx.state === 'suspended') audioCtx.resume();
            return audioCtx;
        }

        function tocarBip(frequencia, duracao, volume = 0.1) {
            try {
                const ctx = obterAudioContext();
                const oscillator = ctx.createOscillator();
                const gainNode = ctx.createGain();
                oscillator.type = 'sine'; 
                oscillator.frequency.setValueAtTime(frequencia, ctx.currentTime);
                gainNode.gain.setValueAtTime(volume, ctx.currentTime);
                gainNode.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + duracao);
                oscillator.connect(gainNode);
                gainNode.connect(ctx.destination);
                oscillator.start();
                oscillator.stop(ctx.currentTime + duracao);
            } catch (e) { console.error(e); }
        }

        const somClique = () => tocarBip(2000, 0.08, 0.1); 
        const somTrocaReferencia = () => tocarBip(1200, 0.25, 0.15);
        const somAlertaRadar = () => tocarBip(2500, 0.15, 0.2); // Som bem agudo para radar

        // FUNÇÃO LEVE: Verifica se ponto está dentro do polígono (Ray Casting)
        function pontoNoPoligono(ponto, vs) {
            let x = ponto[0], y = ponto[1];
            let inside = false;
            for (let i = 0, j = vs.length - 1; i < vs.length; j = i++) {
                let xi = vs[i][0], yi = vs[i][1];
                let xj = vs[j][0], yj = vs[j][1];
                let intersect = ((yi > y) != (yj > y)) && (x < (xj - xi) * (y - yi) / (yj - yi) + xi);
                if (intersect) inside = !inside;
            }
            return inside;
        }

        function monitorarRadares() {
            db.ref('configuracoes/percurso').on('value', snap => {
                const data = snap.val();
                if (data && data.features) {
                    radaresAtivos = data.features.filter(f => f.geometry.type === 'Polygon');
                }
            });
        }

        function verificarRadar(lat, lng, velAtual) {
            let dentroRadar = false;
            let velLimite = 0;

            radaresAtivos.forEach(radar => {
                const poligono = radar.geometry.coordinates[0];
                if (pontoNoPoligono([lng, lat], poligono)) {
                    dentroRadar = true;
                    velLimite = radar.properties.velocidade || 60;
                }
            });

            const displayVel = document.getElementById('viewVel');
            if (dentroRadar && velAtual > velLimite) {
                // Efeito visual piscante
                displayVel.style.color = (Date.now() % 1000 < 500) ? "#ff0000" : "#f1c40f";
                
                // Efeito sonoro intermitente
                if (!intervaloAlertaRadar) {
                    intervaloAlertaRadar = setInterval(somAlertaRadar, 400);
                }
            } else {
                displayVel.style.color = "#f1c40f";
                if (intervaloAlertaRadar) {
                    clearInterval(intervaloAlertaRadar);
                    intervaloAlertaRadar = null;
                }
            }
        }

        const btnMenu = document.getElementById('btnMenu');
        const menuOpcoes = document.getElementById('menuOpcoes');

        btnMenu.onclick = (e) => {
            e.stopPropagation();
            menuOpcoes.style.display = menuOpcoes.style.display === 'block' ? 'none' : 'block';
        };

        window.onclick = () => menuOpcoes.style.display = 'none';

        window.onload = async function() {
            const salvo = localStorage.getItem('rally_carro_ativo');
            const tempoLogin = localStorage.getItem('rally_timestamp_login') || 0;

            monitorarRadares(); // Inicia escuta dos radares

            if (salvo) {
                const snapLogoff = await db.ref('configuracoes/comandoLogoff').once('value');
                const timestampLogoff = snapLogoff.val() || 0;

                if (timestampLogoff > parseInt(tempoLogin)) {
                    limparLocalStorage();
                    location.reload();
                } else {
                    iniciarFluxoRastreio(salvo);
                    carregarRoadbook();
                }
            }
        };

        db.ref('configuracoes/comandoLogoff').on('value', (snap) => {
            const timestampLogoff = snap.val();
            const tempoLogin = localStorage.getItem('rally_timestamp_login') || 0;
            if (timestampLogoff && timestampLogoff > parseInt(tempoLogin) && localStorage.getItem('rally_carro_ativo')) {
                encerrarSessaoRemoto();
            }
        });

        function carregarRoadbook() {
            const rbList = document.getElementById('roadbookList');
            db.ref('prova_atual').on('value', (snapshot) => {
                const dados = snapshot.val();
                if (!dados) {
                    rbList.innerHTML = '<div style="padding:20px; color:#444; font-size:11px; text-align:center;">PLANILHA NÃO DISPONÍVEL</div>';
                    return;
                }
                rbList.innerHTML = '';
                dados.forEach((item, index) => {
                    const div = document.createElement('div');
                    div.className = 'roadbook-item';
                    div.id = 'rb-item-' + index;
                    const imgUrl = item.tulipa || ''; 
                    const obs = item.obs || '--';
                    const km = parseFloat(item.km).toFixed(3);
                    div.
