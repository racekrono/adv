<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Race Krono</title>
    <style>
        body { font-family: sans-serif; background: #121212; color: white; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; overflow: hidden; }
        .card { background: #1e1e1e; padding: 25px; border-radius: 12px; width: 90%; max-width: 380px; box-shadow: 0 8px 32px rgba(0,0,0,0.5); border-top: 5px solid #ffffff; }
        input, select, button { width: 100%; padding: 14px; margin-bottom: 15px; border-radius: 8px; border: 1px solid #333; background: #252525; color: white; font-size: 16px; box-sizing: border-box; }
        button { background: #f80303; border: none; font-weight: bold; cursor: pointer; }
        .tracking { text-align: center; display: none; }
        .odo-val { font-size: 4rem; font-weight: bold; color: #f1c40f; font-family: monospace; }
        .btn-sair { background: transparent; color: #555; font-size: 11px; margin-top: 20px; border: none; text-decoration: underline; }
    </style>
</head>
<body>
    <div class="card">
        <div id="setup">
            <h2 style="text-align:center;">Rally de Aventura</h2>
            <input type="text" id="nome" placeholder="Nome do Piloto">
            <select id="categoria">
                <option>UTV</option><option>4x4</option><option>4x2</option>
            </select>
            <input type="number" id="carro" placeholder="Nº do Carro">
            <button id="btnIniciar">INICIAR PROVA</button>
        </div>

        <div id="ativo" class="tracking">
            <h2 id="viewCarro" style="color:#0d0af0;">Carro --</h2>
            <div id="viewVel" style="font-size: 3rem; font-weight: bold;">0.0</div>
            <p>KM/H</p>
            <div class="odo-val" id="displayOdo">0.000</div>
            <button class="btn-sair" onclick="encerrarSessaoConfirmada()">Encerrar Sessão</button>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBPJkehV9C1x0hiY5dQSwSRtVf5c4P2JGE",
            authDomain: "cronometro-rally.firebaseapp.com",
            databaseURL: "https://cronometro-rally-default-rtdb.firebaseio.com",
            projectId: "cronometro-rally",
            appId: "1:341731891354:web:d0c34265be68015e98a723"
        };
        const app = firebase.initializeApp(firebaseConfig);
        const db = firebase.database(app);

        let watchID = null;

        function iniciarFluxoRastreio(num) {
            document.getElementById('setup').style.display = 'none';
            document.getElementById('ativo').style.display = 'block';
            document.getElementById('viewCarro').innerText = "Carro " + num;
            
            // LOGICA PERSISTENTE: Obtém ou cria o timestamp do login original
            let loginOriginal = localStorage.getItem('rally_login_timestamp');
            if (!loginOriginal) {
                loginOriginal = Date.now();
                localStorage.setItem('rally_login_timestamp', loginOriginal);
            }

            // ESCUTA COMANDO DE ENCERRAMENTO DO ADMIN
            db.ref('configuracoes/comandoEncerramento').on('value', snap => {
                if (snap.exists()) {
                    const tsComando = snap.val();
                    // Se o comando do admin for mais recente que o login do piloto
                    if (tsComando > loginOriginal) {
                        alert("A prova foi encerrada pela organização.");
                        encerrarSessao();
                    }
                }
            });

            // Inicia GPS
            watchID = navigator.geolocation.watchPosition(p => {
                const dados = { lat: p.coords.latitude, lng: p.coords.longitude, vel: Math.round((p.coords.speed || 0) * 3.6), ts: Date.now() };
                document.getElementById('viewVel').innerText = dados.vel;
                db.ref('posicoes/' + num).set(dados);
                db.ref('rastros/' + num).push(dados);
            }, null, { enableHighAccuracy: true });
        }

        document.getElementById('btnIniciar').onclick = async function() {
            const num = document.getElementById('carro').value;
            const nome = document.getElementById('nome').value;
            if(!num || !nome) return alert("Preencha tudo!");

            const aberta = (await db.ref('configuracoes/provaAberta').once('value')).val();
            if(!aberta) return alert("Prova fechada!");

            // Define o timestamp do login NO MOMENTO do clique em Iniciar
            localStorage.setItem('rally_login_timestamp', Date.now());
            localStorage.setItem('rally_carro_ativo', num);
            
            await db.ref('competidores/' + num).set({ nome, ativo: true });
            iniciarFluxoRastreio(num);
        };

        function encerrarSessaoConfirmada() {
            if(confirm("Deseja mesmo sair?")) encerrarSessao();
        }

        function encerrarSessao() {
            if (watchID) navigator.geolocation.clearWatch(watchID);
            localStorage.removeItem('rally_carro_ativo');
            localStorage.removeItem('rally_login_timestamp'); // Limpa para permitir novo login futuro
            location.reload();
        }

        window.onload = () => {
            const salvo = localStorage.getItem('rally_carro_ativo');
            if (salvo) iniciarFluxoRastreio(salvo);
        };
    </script>
</body>
</html>
