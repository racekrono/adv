<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Painel Admin Rally - Oficial</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet.draw/1.0.4/leaflet.draw.css"/>
    <style>
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; height: 100%; width: 100%; background: #1a202c; font-family: sans-serif; display: flex; flex-direction: column; }
    
    #toolbar { 
        background: #2d3748; 
        display: flex; 
        flex-wrap: wrap; 
        padding: 10px; 
        gap: 15px; 
        z-index: 9999; 
        position: relative;
        border-bottom: 1px solid #4a5568;
    }

    .button-group {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        align-items: center;
        background: rgba(255,255,255,0.05);
        padding: 8px;
        border-radius: 8px;
    }

    #map { flex-grow: 1; width: 100%; background: #a0aec0; }

    button {
        padding: 8px 12px;
        background: #4a5568;
        color: white;
        border: none;
        border-radius: 4px;
        cursor: pointer;
        font-weight: bold;
        font-size: 11px;
    }

    button:hover { filter: brightness(1.2); }

    input, select {
        padding: 8px;
        border-radius: 4px;
        border: none;
        background: #1a202c;
        color: white;
        font-size: 11px;
    }

    .marker-label {
        background: #ed8936;
        border: 2px solid white;
        border-radius: 50%;
        color: white;
        font-weight: bold;
        text-align: center;
        line-height: 26px;
        width: 30px;
        height: 30px;
    }
    </style>
</head>
<body>

    <div id="toolbar">
        <div class="button-group">
            <input type="text" id="coordsInput" placeholder="Lat, Lng">
            <button onclick="adicionarPontoNaLinha()">📍 Add Ponto</button>
            <button onclick="finalizarLinhaManual()" style="background: #2b6cb0;">✏️ Criar Linha</button>
            <button onclick="limparTemporarios()">🗑️ Limpar</button>
        </div>

        <div class="button-group">
            <input type="text" id="cityInput" placeholder="Buscar Cidade...">
            <button onclick="buscar()">🔍</button>
            <button onclick="salvar()" style="background: #38a169;">💾 Salvar Trajeto</button>
            <button id="btnStatusProva" onclick="alternarStatusProva()">Carregando...</button>
            <button onclick="logoffGeral()" style="background: #742a2a;">🚫 Logoff Geral</button>
            <button onclick="excluirTodosCarros()" style="background: #e53e3e;">💀 Excluir Todos</button>
        </div>

        <div class="button-group">
            <button onclick="window.location.href='rastro.html'" style="background: #805ad5;">🗺️ Rastro</button>
            <button onclick="window.location.href='rastro.html'" style="background: #dd6b20;">🏁 Rodar Apuração</button>
            <button onclick="window.location.href='tempos.html'" style="background: #2c7a7b;">⏱️ Chegada</button>
            <button onclick="window.location.href='fotos.html'" style="background: #3182ce;">📸 Fotos</button>
            <button onclick="window.location.href='ranking-fotos.html'" style="background: #4a5568;">🖼️ Ranking Fotos</button>
            <button onclick="window.location.href='ranking-geral.html'" style="background: #b7791f;">🏆 RANKING FINAL</button>
        </div>

        <div class="button-group">
            <select id="carSelector"><option value="">Carro...</option></select>
            <button onclick="excluirCarro()">🗑️</button>  
            <button onclick="resetar()" style="background: #000; color: red;">⚠️ RESET TOTAL</button>
        </div>
    </div>

    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
