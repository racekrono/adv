<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Extrato do Piloto - Rally Tracker</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

    <style>
        :root { --primary: #e67e22; --bg: #121212; --card: #1e1e1e; --text: #eeeeee; }
        body { font-family: sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 15px; }
        .container { max-width: 600px; margin: auto; padding-bottom: 100px; }
        
        .header { text-align: center; margin-bottom: 20px; border-bottom: 1px solid var(--primary); padding-bottom: 15px; }
        .header h2 { color: var(--primary); margin: 0; }
        
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; }
        .stat-card { background: var(--card); padding: 12px; border-radius: 10px; text-align: center; border: 1px solid #333; }
        .stat-card small { color: #888; display: block; font-size: 11px; margin-bottom: 4px; }
        .stat-card span { font-weight: bold; font-size: 1.1rem; }

        #map { height: 300px; border-radius: 12px; margin-bottom: 20px; border: 1px solid #333; z-index: 1; background: #222; }
        
        .penalty-list { background: var(--card); border-radius: 12px; padding: 15px; border: 1px solid #333; }
        table { width: 100%; border-collapse: collapse; font-size: 13px; }
        th { text-align: left; color: #666; border-bottom: 1px solid #333; padding-bottom: 8px; }
        td { padding: 10px 0; border-bottom: 1px solid #2d2d2d; }
        .text-red { color: #f56565; font-weight: bold; }

        .actions-footer { position: fixed; bottom: 0; left: 0; right: 0; padding: 15px; background: rgba(18, 18, 18, 0.95); display: flex; gap: 10px; border-top: 1px solid #333; z-index: 1000; }
        .btn { flex: 1; padding: 12px; border-radius: 8px; border: none; font-weight: bold; cursor: pointer; color: white; }
        .btn-pdf { background: #c0392b; }
        .btn-voltar { background: #333; }

        /* Estilo para a busca manual caso não encontre ID */
        .busca-manual { background: var(--card); padding: 20px; border-radius: 12px; text-align: center; margin-bottom: 20px; border: 1px solid var(--primary); }
        .busca-manual input { padding: 10px; border-radius: 5px; border: 1px solid #444; background: #000; color: white; width: 80px; text-align: center; font-size: 18px; margin-right: 10px; }
        .busca-manual button { padding: 10px 20px; border-radius: 5px; background: var(--primary); border: none; color: white; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

<div class="container" id="relatorio-conteudo">
    <div id="boxBusca" class="busca-manual" style="display:none;">
        <p style="margin-top:0">Número do carro não detectado:</p>
        <input type="number" id="inputCarro" placeholder="Nº">
        <button onclick="definirCarroManual()">CARREGAR</button>
    </div>

    <div class="header">
        <h2 id="nomePiloto">Relatório de Prova</h2>
        <p id="infoCarro">Selecione um carro para começar</p>
    </div>

    <div class="stats-grid">
        <div class="stat-card">
            <small>TEMPO TOTAL</small>
            <span id="tempoTotal">--:--:--</span>
        </div>
        <div class="stat-card">
            <small>FOTOS (BÔNUS)</small>
            <span id="pontosFotos">0</span>
        </div>
        <div class="stat-card" style="grid-column: span 2; border-color: #f56565;">
            <small>PENALIZAÇÃO TOTAL</small>
            <span id="totalPenalidade" class="text-red">0 pontos</span>
        </div>
    </div>

    <div id="map"></div>

    <div class="penalty-list">
        <h3 style="margin-top:0">Detalhamento de Infrações</h3>
        <table>
            <thead>
                <tr>
                    <th>Hora</th>
                    <th>Radar</th>
                    <th>Velocidade</th>
                    <th>Pontos</th>
                </tr>
            </thead>
            <tbody id="listaPenalidades"></tbody>
        </table>
    </div>
</div>

<div class="actions-footer">
    <button class="btn btn-voltar" onclick="location.href='index.html'">VOLTAR</button>
    <button class="btn btn-pdf" id="btnGerarPDF" onclick="gerarPDF()">GERAR PDF</button>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
