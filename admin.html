<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Painel Admin Rally - Oficial</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet.draw/1.0.4/leaflet.draw.css"/>
    <style>
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; height: 100%; width: 100%; background: #1a202c; font-family: sans-serif; display: flex; flex-direction: column; }
    
    #toolbar { 
        background: #2d3748; 
        display: flex; 
        flex-wrap: wrap; 
        padding: 10px; 
        gap: 15px; 
        z-index: 9999; 
        position: relative;
        border-bottom: 1px solid #4a5568;
    }

    .button-group {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        align-items: center;
        background: rgba(255,255,255,0.05);
        padding: 8px;
        border-radius: 8px;
    }

    #map { flex-grow: 1; width: 100%; background: #a0aec0; }

    button {
        padding: 8px 15px;
        border: none;
        border-radius: 5px;
        color: white;
        cursor: pointer;
        font-weight: bold;
        font-size: 13px;
        transition: opacity 0.2s;
    }

    button:hover { opacity: 0.8; }

    .btn-danger { background: #e53e3e; }
    .btn-success { background: #38a169; }
    .btn-nav { background: #4a5568; }
    .btn-backup { background: #2b6cb0; }
    .btn-restore { background: #805ad5; }

    select {
        padding: 8px;
        border-radius: 5px;
        background: #1a202c;
        color: white;
        border: 1px solid #4a5568;
    }
    </style>
</head>
<body>

<div id="toolbar">
    <div class="button-group">
        <button class="btn-nav" onclick="window.location.href='index.html'">🏠 Início</button>
        <button class="btn-nav" onclick="window.location.href='resultados.html'">🏆 Ranking</button>
        <button class="btn-nav" onclick="window.location.href='tempos.html'">⏱️ Tempos</button>
        <button class="btn-nav" onclick="window.location.href='fotos.html'">📸 Fotos</button>
        <button class="btn-nav" onclick="window.location.href='penalizacoes.html'">⚠️ Penalizar</button>
    </div>

    <div class="button-group">
        <select id="filtro-categoria" onchange="atualizarFiltro()">
            <option value="TODOS">Todas Categorias</option>
            <option value="GRADUADO">Graduado</option>
            <option value="TURISMO">Turismo</option>
            <option value="EXPEDICAO">Expedição</option>
            <option value="MOTO">Moto</option>
        </select>
        <button id="btn-status-prova" class="btn-success" onclick="alternarStatusProva()">Carregando...</button>
        <button class="btn-danger" onclick="logoffGeral()">🔴 Logoff Geral</button>
        <button class="btn-danger" onclick="excluirTodosCarros()">🔥 Limpar Banco</button>
    </div>

    <div class="button-group">
        <button class="btn-backup" onclick="exportarBackup()">📤 Exportar</button>
        <button class="btn-restore" onclick="document.getElementById('importFile').click()">📥 Importar</button>
        <input type="file" id="importFile" style="display: none;" onchange="importarBackup(event)" accept=".json">
    </div>
</div>

<div id="map"></div>

<script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet.draw/1.0.4/leaflet.draw.js"></script>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyBPJkehV9C1x0hiY5dQSwSRtVf5c4P2JGE",
        databaseURL: "https://cronometro-rally-default-rtdb.firebaseio.com",
        projectId: "cronometro-rally"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    const map = L.map('map').setView([-12.25, -38.95], 13);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

    const markers = {};
    const radares = {};
    let categoriaFiltro = "TODOS";

    // Ícone personalizado
    const carIcon = L.divIcon({
        className: 'custom-div-icon',
        html: "<div style='background-color:#e67e22; width:12px; height:12px; border:2px solid white; border-radius:50%;'></div>",
        iconSize: [12, 12],
        iconAnchor: [6, 6]
    });

    // Monitorar Competidores e Posições (Original)
    db.ref('competidores').on('value', snapComp => {
        const dadosComp = snapComp.val() || {};
        db.ref('posicoes').on('value', snapPos => {
            const dadosPos = snapPos.val() || {};
            
            Object.keys(dadosPos).forEach(id => {
                const p = dadosPos[id];
                const info = dadosComp[id] || { nome: "Piloto", categoria: "N/A" };

                if (categoriaFiltro !== "TODOS" && info.categoria !== categoriaFiltro) {
                    if (markers[id]) { map.removeLayer(markers[id]); delete markers[id]; }
                    return;
                }

                if (!markers[id]) {
                    markers[id] = L.marker([p.lat, p.lng], {icon: carIcon}).addTo(map);
                }
                markers[id].setLatLng([p.lat, p.lng])
                           .bindPopup(`<b>Carro ${id}</b><br>${info.nome}<br>${info.categoria}<br>Vel: ${p.vel} km/h`);
            });
        });
    });

    // Desenho de Radares (Original)
    const drawnItems = new L.FeatureGroup().addTo(map);
    const drawControl = new L.Control.Draw({
        draw: { polygon: false, polyline: false, rectangle: false, marker: false, circlemarker: false, circle: true },
        edit: { featureGroup: drawnItems }
    });
    map.addControl(drawControl);

    map.on(L.Draw.Event.CREATED, e => {
        const layer = e.layer;
        const center = layer.getLatLng();
        const radius = layer.getRadius();
        const id = "radar_" + Date.now();
        db.ref('configuracoes/radares/' + id).set({ lat: center.lat, lng: center.lng, radius: radius });
    });

    db.ref('configuracoes/radares').on('value', snap => {
        drawnItems.clearLayers();
        const data = snap.val();
        for (let id in data) {
            L.circle([data[id].lat, data[id].lng], { radius: data[id].radius, color: 'red' }).addTo(drawnItems);
        }
    });

    window.atualizarFiltro = function() {
        categoriaFiltro = document.getElementById('filtro-categoria').value;
    };

    function monitorarStatus() {
        db.ref('configuracoes/provaAberta').on('value', snap => {
            const aberta = snap.val();
            const btn = document.getElementById('btn-status-prova');
            btn.innerText = aberta ? "🟢 PROVA ABERTA" : "🔴 PROVA FECHADA";
            btn.style.background = aberta ? "#38a169" : "#e53e3e";
        });
    }
    monitorarStatus();

    window.alternarStatusProva = function() {
        const ref = db.ref('configuracoes/provaAberta');
        ref.once('value', snap => { ref.set(!snap.val()); });
    };

    window.excluirTodosCarros = async function() {
        const senha = prompt("SENHA PARA DELETAR TUDO:");
        if (senha === "261291") {
            if (confirm("Apagar competidores, posições, rastros e tempos?")) {
                const paths = ['competidores', 'posicoes', 'rastros', 'tempos'];
                await Promise.all(paths.map(path => db.ref(path).remove()));
                alert("Limpeza concluída!");
                location.reload();
            }
        }
    };

    window.logoffGeral = function() {
        const senha = prompt("SENHA LOGOFF GERAL:");
        if (senha === "261291") {
            db.ref('configuracoes/comandoLogoff').set(Date.now()).then(() => alert("Logoff enviado!"));
        }
    };

    // FUNÇÕES DE BACKUP (Adicionadas ao final para não quebrar o resto)
    window.exportarBackup = function() {
        db.ref('/').once('value').then(snapshot => {
            const jsonStr = JSON.stringify(snapshot.val(), null, 2);
            const blob = new Blob([jsonStr], { type: "application/json" });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `backup_rally_${new Date().toISOString().split('T')[0]}.json`;
            a.click();
        });
    };

    window.importarBackup = function(event) {
        const file = event.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = function(e) {
            try {
                const json = JSON.parse(e.target.result);
                if (confirm("SOBRESCREVER BANCO ATUAL?")) {
                    const senha = prompt("Senha de Admin:");
                    if (senha === "261291") {
                        db.ref('/').set(json).then(() => {
                            alert("Sucesso!");
                            location.reload();
                        });
                    }
                }
            } catch (err) { alert("Erro no arquivo!"); }
        };
        reader.readAsText(file);
    };
</script>
</body>
</html>
