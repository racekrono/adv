<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

    <meta name="theme-color" content="#0d0af0">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <style>
        body { font-family: sans-serif; background: #121212; color: white; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; overflow: hidden; }
        .card { position: relative; background: #1e1e1e; padding: 25px; border-radius: 12px; width: 90%; max-width: 380px; box-shadow: 0 8px 32px rgba(0,0,0,0.5); border-top: 5px solid #ffffff; z-index: 10; max-height: 95vh; display: flex; flex-direction: column; }
        .logo { display: block; margin: 0 auto 10px auto; max-width: 120px; height: auto; }
        input, select, button { width: 100%; padding: 14px; margin-bottom: 15px; border-radius: 8px; border: 1px solid #333; background: #252525; color: white; font-size: 16px; box-sizing: border-box; }
        button { background: #f80303; border: none; font-weight: bold; cursor: pointer; transition: 0.3s; }
        button:active { transform: scale(0.98); }

        #setup { display: block; }
        #ativo { display: none; flex-direction: column; overflow: hidden; }

        .header-dados { display: flex; justify-content: center; align-items: baseline; gap: 12px; margin-bottom: 5px; }
        #viewCarro { color: #ffffff; margin: 0; font-size: 1.1rem; font-weight: bold; }
        #viewVel { font-size: 3rem; font-weight: bold; line-height: 1; color: #f1c40f; }
        .unidade-kmh { color: #888; font-size: 11px; font-weight: bold; text-transform: uppercase; }
        .odo-box { padding: 10px 5px; border-top: 1px solid #333; background: rgba(0,0,0,0.2); border-radius: 10px; margin-bottom: 10px; }
        .odo-label { font-size: 9px; color: #888; text-transform: uppercase; letter-spacing: 1px; }
        .odo-val { font-size: 4rem; text-align: center; font-weight: bold; color: #f1c40f; margin: 0; cursor: pointer; font-family: monospace; line-height: 1; }
        .odo-btns { display: flex; gap: 4px; justify-content: center; margin-top: 8px; }
        .btn-mini { padding: 8px 2px; font-size: 11px; background: #333; margin-bottom: 0; width: auto; flex: 1; border: 1px solid #444; color: white; border-radius: 4px; }
        .roadbook-container {
            background: #000;
            border-radius: 8px;
            overflow-y: auto;
            flex-grow: 0;
            border: 2px solid #333;
            min-height: 260px;
            margin-bottom: 10px;
            scroll-behavior: smooth;
            height: 260px;
            max-height: 260px;
        }
        .roadbook-item { display: flex; align-items: center; border-bottom: 1px solid #222; padding: 6px 4px; gap: 8px; transition: background 0.3s; }
        .rb-item-ativo { background-color: #262d37 !important; border-left: 6px solid #FF0000 ; }
        .rb-col-km { flex: 0 0 55px; font-family: monospace; font-weight: bold; color: #f1c40f; font-size: 18px; text-align: right; }
        .rb-col-tulipa { flex: 0 0 80px; background: white; padding: 2px; border-radius: 4px; display: flex; justify-content: center; align-items: center; min-height: 70px; }
        .rb-col-tulipa img { max-width: 100%; height: auto; max-height: 70px; }
        .rb-col-obs { flex: 1; font-size: 14px; color: #eee; text-align: left; text-transform: uppercase; font-weight: bold; }
        .status-container { padding: 5px; border-radius: 8px; background: rgba(0,0,0,0.3); border: 1px solid #333; margin-bottom: 5px; }
        .status-gps { color: #2ecc71; font-weight: bold; font-size: 11px; text-align: center; }
        .status-offline { color: #f1c40f !important; }
        .status-pendente { color: #e67e22 !important; }

        #menuContainer { position: absolute; top: 15px; right: 15px; z-index: 100; }
        #btnMenu { width: 40px; height: 40px; padding: 0; margin: 0; border-radius: 50%; background: #333; display: flex; justify-content: center; align-items: center; border: 1px solid #444; font-size: 20px; color: white; }
        #menuOpcoes { display: none; position: absolute; top: 45px; right: 0; background: #252525; border: 1px solid #444; border-radius: 8px; width: 220px; box-shadow: 0 4px 15px rgba(0,0,0,0.8); overflow: hidden; }
        #menuOpcoes button { margin: 0; border: none; border-bottom: 1px solid #333; background: transparent; text-align: left; font-size: 14px; padding: 15px; border-radius: 0; }
        #menuOpcoes button:last-child { border-bottom: none; }
        #menuOpcoes button:hover { background: #333; }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: #444; border-radius: 10px; }

        /* Modal Ver Rastro */
        #rastroModal { display:none; position:fixed; inset:0; background:#000; z-index:9999; flex-direction:column; }
        #rastroModal.active { display:flex; }
        #rastroHeader { display:flex; justify-content:space-between; align-items:center; padding:12px 15px; background:#1e1e1e; border-bottom:1px solid #333; color:#fff; }
        #rastroHeader h3 { margin:0; font-size:15px; color:#f1c40f; }
        #rastroFechar { width:auto; padding:8px 14px; font-size:14px; margin:0; background:#333; }
        #rastroMapa { flex:1; background:#222; }
        #rastroInfo { padding:8px 12px; background:#1e1e1e; color:#aaa; font-size:11px; text-align:center; border-top:1px solid #333; }
    </style>
</head>
<body>
    <div class="card">
        <div id="menuContainer">
            <button id="btnMenu">☰</button>
            <div id="menuOpcoes">
                <button onclick="enviarDatalogger()">📤 Enviar Datalogger</button>
                <button onclick="verRastro()">📍 Ver Rastro</button>
            </div>
        </div>
        <div id="setup">
            <img src="https://raw.githubusercontent.com/racekrono/adv/refs/heads/main/Logo.png" class="logo">
            <h2 style="color:#ffffff; text-align:center; margin-top: 0; font-size: 1.2rem;">Rally de Aventura</h2>
            <input type="text" id="nome" placeholder="Nome do Piloto" oninput="this.value = this.value.replace(/[0-9]/g, '')">
            <select id="categoria">
                <option>UTV</option>
                <option>BAIANO 4x2</option><option>BAIANO 4x4</option>
                <option>INICIANTE 4x2</option><option>INICIANTE 4x4</option>
                <option>ANTIGOS</option>
            </select>
            <input type="number" id="carro" placeholder="Nº do Carro" min="1" max="100">
            <button id="btnIniciar">INICIAR PROVA</button>
        </div>
        <div id="ativo">
            <div class="header-dados">
                <span id="viewCarro">Carro --</span>
                <div id="viewVel">0.0</div>
                <span class="unidade-kmh">KM/H</span>
            </div>
            <div class="odo-box">
                <span class="odo-label">Odômetro</span>
                <div id="displayOdo" class="odo-val" onclick="ajusteManualOdo()">0.000</div>
                <div class="odo-btns">
                    <button class="btn-mini" onclick="alterarOdo(-0.010)">-10m</button>
                    <button class="btn-mini" onclick="alterarOdo(-0.001)">-1m</button>
                    <button class="btn-mini" onclick="zerarOdo()" style="background:#b30000;">ZERAR</button>
                    <button class="btn-mini" onclick="alterarOdo(0.001)">+1m</button>
                    <button class="btn-mini" onclick="alterarOdo(0.010)">+10m</button>
                </div>
            </div>
            <div class="roadbook-container" id="roadbookList">
                <div style="padding: 20px; color: #444; font-size: 11px; text-align: center;">CARREGANDO PLANILHA...</div>
            </div>

            <div class="status-container">
                <div id="msgGps" class="status-gps">● CONECTANDO...</div>
                <div id="msgPendentes" style="color:#e67e22; font-size:10px; text-align:center; margin-top:3px; display:none;">0 pontos pendentes</div>
            </div>
        </div>
    </div>

    <div id="rastroModal">
        <div id="rastroHeader">
            <h3>📍 Meu Rastro</h3>
            <button id="rastroFechar" onclick="fecharRastro()">✕ Fechar</button>
        </div>
        <div id="rastroMapa"></div>
        <div id="rastroInfo">Carregando pontos…</div>
    </div>

    <script>
    /* =========================================================
       FIREBASE
    ========================================================= */
    const firebaseConfig = {
        apiKey: "AIzaSyBPJkehV9C1x0hiY5dQSwSRtVf5c4P2JGE",
        authDomain: "cronometro-rally.firebaseapp.com",
        databaseURL: "https://cronometro-rally-default-rtdb.firebaseio.com",
        projectId: "cronometro-rally",
        appId: "1:341731891354:web:d0c34265be68015e98a723"
    };
    const app = firebase.initializeApp(firebaseConfig);
    const db = firebase.database(app);

    /* =========================================================
       INDEXEDDB - camada de redundância local
       Stores:
         - sessao   (login + estado: carro, nome, categoria, odo, ultimaPos, ultimoIndice, ts)
         - roadbook (cache da planilha enviada pelo servidor)
         - rastro   (todos os pontos GPS, com flag 'sincronizado')
         - referencias (eventos/refs marcadas durante a prova)
    ========================================================= */
    const IDB_NAME = 'racekrono-db';
    const IDB_VERSION = 1;
    let idb = null;

    function abrirIDB() {
        return new Promise((resolve, reject) => {
            const req = indexedDB.open(IDB_NAME, IDB_VERSION);
            req.onupgradeneeded = (e) => {
                const d = e.target.result;
                if (!d.objectStoreNames.contains('sessao')) {
                    d.createObjectStore('sessao', { keyPath: 'id' });
                }
                if (!d.objectStoreNames.contains('roadbook')) {
                    d.createObjectStore('roadbook', { keyPath: 'id' });
                }
                if (!d.objectStoreNames.contains('rastro')) {
                    const s = d.createObjectStore('rastro', { keyPath: 'id', autoIncrement: true });
                    s.createIndex('sincronizado', 'sincronizado', { unique: false });
                    s.createIndex('ts', 'ts', { unique: false });
                }
                if (!d.objectStoreNames.contains('referencias')) {
                    d.createObjectStore('referencias', { keyPath: 'id', autoIncrement: true });
                }
            };
            req.onsuccess = () => resolve(req.result);
            req.onerror = () => reject(req.error);
        });
    }

    function idbTx(store, mode = 'readonly') {
        return idb.transaction(store, mode).objectStore(store);
    }
    function idbPut(store, val) {
        return new Promise((res, rej) => {
            const r = idbTx(store, 'readwrite').put(val);
            r.onsuccess = () => res(r.result);
            r.onerror = () => rej(r.error);
        });
    }
    function idbAdd(store, val) {
        return new Promise((res, rej) => {
            const r = idbTx(store, 'readwrite').add(val);
            r.onsuccess = () => res(r.result);
            r.onerror = () => rej(r.error);
        });
    }
    function idbGet(store, key) {
        return new Promise((res, rej) => {
            const r = idbTx(store).get(key);
            r.onsuccess = () => res(r.result);
            r.onerror = () => rej(r.error);
        });
    }
    function idbGetAll(store) {
        return new Promise((res, rej) => {
            const r = idbTx(store).getAll();
            r.onsuccess = () => res(r.result || []);
            r.onerror = () => rej(r.error);
        });
    }
    function idbClear(store) {
        return new Promise((res, rej) => {
            const r = idbTx(store, 'readwrite').clear();
            r.onsuccess = () => res();
            r.onerror = () => rej(r.error);
        });
    }
    function idbDelete(store, key) {
        return new Promise((res, rej) => {
            const r = idbTx(store, 'readwrite').delete(key);
            r.onsuccess = () => res();
            r.onerror = () => rej(r.error);
        });
    }

    /* =========================================================
       ESTADO GLOBAL
    ========================================================= */
    let wakeLock = null;
    let watchID = null;
    let odoTotal = 0;
    let ultimaPos = null;
    let ultimoIndiceAtivo = -1;
    let carroAtivo = null;
    let pendentesCount = 0;
    let sincronizando = false;
    let salvarSessaoTimer = null;

    /* =========================================================
       ÁUDIO
    ========================================================= */
    let audioCtx = null;
    function obterAudioContext() {
        if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        if (audioCtx.state === 'suspended') audioCtx.resume();
        return audioCtx;
    }
    function tocarBip(frequencia, duracao, volume = 0.1) {
        try {
            const ctx = obterAudioContext();
            const osc = ctx.createOscillator();
            const gain = ctx.createGain();
            osc.type = 'sine';
            osc.frequency.setValueAtTime(frequencia, ctx.currentTime);
            gain.gain.setValueAtTime(volume, ctx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + duracao);
            osc.connect(gain); gain.connect(ctx.destination);
            osc.start(); osc.stop(ctx.currentTime + duracao);
            osc.onended = () => { osc.disconnect(); gain.disconnect(); };
        } catch (e) { console.error(e); }
    }
    const somClique = () => tocarBip(2000, 0.08, 0.1);
    const somTrocaReferencia = () => tocarBip(1200, 0.25, 0.15);

    /* =========================================================
       MENU
    ========================================================= */
    const btnMenu = document.getElementById('btnMenu');
    const menuOpcoes = document.getElementById('menuOpcoes');
    btnMenu.onclick = (e) => {
        e.stopPropagation();
        menuOpcoes.style.display = menuOpcoes.style.display === 'block' ? 'none' : 'block';
    };
    window.onclick = () => { menuOpcoes.style.display = 'none'; };

    /* =========================================================
       BOOTSTRAP
    ========================================================= */
    window.onload = async function () {
        try {
            idb = await abrirIDB();
        } catch (e) {
            console.error('Falha ao abrir IndexedDB', e);
            alert('Atenção: este navegador bloqueou o armazenamento local. Os dados podem se perder se ficar offline.');
        }

        // Tenta restaurar sessão do IndexedDB primeiro, fallback para localStorage
        let sessaoSalva = null;
        if (idb) sessaoSalva = await idbGet('sessao', 'atual').catch(() => null);

        const carroLS = localStorage.getItem('rally_carro_ativo');
        const tempoLogin = parseInt(
            (sessaoSalva && sessaoSalva.tsLogin) ||
            localStorage.getItem('rally_timestamp_login') || 0
        );

        const numCarro = (sessaoSalva && sessaoSalva.carro) || carroLS;

        if (numCarro) {
            // Verifica logoff remoto (com timeout de 3s para não travar offline)
            try {
                const snapLogoff = await Promise.race([
                    db.ref('configuracoes/comandoLogoff').once('value'),
                    new Promise((_, rej) => setTimeout(() => rej(new Error('timeout')), 3000))
                ]);
                const tsLogoff = snapLogoff.val() || 0;
                if (tsLogoff > tempoLogin) {
                    await limparTudo();
                    location.reload();
                    return;
                }
            } catch (e) {
                // sem internet ou timeout — segue direto com a sessão local
                console.warn('Offline/timeout ao verificar logoff, usando sessão local.');
            }

            // Restaura estado salvo (odo, ultimaPos, ultimoIndice)
            if (sessaoSalva) {
                if (typeof sessaoSalva.odo === 'number') odoTotal = sessaoSalva.odo;
                if (sessaoSalva.ultimaPos) ultimaPos = sessaoSalva.ultimaPos;
                if (typeof sessaoSalva.ultimoIndice === 'number') ultimoIndiceAtivo = sessaoSalva.ultimoIndice;
            }

            iniciarFluxoRastreio(numCarro);
            await carregarRoadbook();
            atualizarTelaOdo();

            // Conta pendentes existentes e tenta sincronizar
            await atualizarContadorPendentes();
            tentarSincronizarPendentes();
        }
    };

    /* =========================================================
       LOGOFF REMOTO
    ========================================================= */
    db.ref('configuracoes/comandoLogoff').on('value', async (snap) => {
        const tsLogoff = snap.val();
        const sessao = idb ? await idbGet('sessao', 'atual').catch(() => null) : null;
        const tsLogin = parseInt(
            (sessao && sessao.tsLogin) ||
            localStorage.getItem('rally_timestamp_login') || 0
        );
        if (tsLogoff && tsLogoff > tsLogin && (sessao || localStorage.getItem('rally_carro_ativo'))) {
            encerrarSessaoRemoto();
        }
    });

    /* =========================================================
       ROADBOOK - cache + atualização quando online
    ========================================================= */
    async function carregarRoadbook() {
        const rbList = document.getElementById('roadbookList');

        // 1) Renderiza imediatamente o cache local se existir
        if (idb) {
            const cache = await idbGet('roadbook', 'atual').catch(() => null);
            if (cache && Array.isArray(cache.dados) && cache.dados.length > 0) {
                renderizarRoadbook(cache.dados);
            }
        }

        // 2) Escuta o servidor; quando chegar, atualiza cache e re-renderiza
        db.ref('prova_atual').on('value', async (snapshot) => {
            const dados = snapshot.val();
            if (!dados) {
                // Mantém o cache na tela; só mostra placeholder se não houver cache
                const cache = idb ? await idbGet('roadbook', 'atual').catch(() => null) : null;
                if (!cache || !cache.dados || cache.dados.length === 0) {
                    rbList.innerHTML = '<div style="padding:20px; color:#444; font-size:11px; text-align:center;">PLANILHA NÃO DISPONÍVEL</div>';
                }
                return;
            }
            const lista = Array.isArray(dados) ? dados : Object.values(dados);
            if (idb) {
                await idbPut('roadbook', { id: 'atual', dados: lista, ts: Date.now() }).catch(() => {});
            }
            renderizarRoadbook(lista);
        });
    }

    function renderizarRoadbook(lista) {
        const rbList = document.getElementById('roadbookList');
        rbList.innerHTML = '';
        lista.forEach((item, index) => {
            const div = document.createElement('div');
            div.className = 'roadbook-item';
            div.id = 'rb-item-' + index;
            const imgUrl = item.tulipa || '';
            const obs = item.obs || '--';
            const km = parseFloat(item.km).toFixed(3);
            div.innerHTML = `
                <div class="rb-col-km">${km}</div>
                <div class="rb-col-tulipa">
                    ${imgUrl ? `<img src="${imgUrl}" onerror="this.style.display='none'">` : ''}
                </div>
                <div class="rb-col-obs">${obs}</div>
            `;
            rbList.appendChild(div);
        });
        atualizarScrollRoadbook();
    }

    function atualizarScrollRoadbook() {
        const itens = document.querySelectorAll('.roadbook-item');
        if (itens.length === 0) return;
        let proximoItemIdx = -1;

        itens.forEach((div, index) => {
            const kmItem = parseFloat(div.querySelector('.rb-col-km').innerText);
            div.classList.remove('rb-item-ativo');
            if (proximoItemIdx === -1 && odoTotal < kmItem) {
                proximoItemIdx = index;
            }
        });
        if (proximoItemIdx !== -1) {
            if (proximoItemIdx !== ultimoIndiceAtivo) {
                if (ultimoIndiceAtivo !== -1) somTrocaReferencia();
                // Salva referência marcada localmente
                if (idb && carroAtivo) {
                    idbAdd('referencias', {
                        carro: carroAtivo,
                        indice: proximoItemIdx,
                        odo: odoTotal,
                        ts: Date.now()
                    }).catch(() => {});
                }
                ultimoIndiceAtivo = proximoItemIdx;
                agendarSalvarSessao();
            }
            const itemAlvo = document.getElementById('rb-item-' + proximoItemIdx);
            itemAlvo.classList.add('rb-item-ativo');
            itemAlvo.scrollIntoView({ behavior: 'smooth', block: 'start' });
        }
    }

    /* =========================================================
       UTIL
    ========================================================= */
    function calcularDistancia(lat1, lon1, lat2, lon2) {
        const R = 6371;
        const dLat = (lat2 - lat1) * Math.PI / 180;
        const dLon = (lon2 - lon1) * Math.PI / 180;
        const a = Math.sin(dLat/2) ** 2 +
                  Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) *
                  Math.sin(dLon/2) ** 2;
        return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
    }

    async function solicitarWakeLock() {
        if ('wakeLock' in navigator) {
            try { wakeLock = await navigator.wakeLock.request('screen'); } catch (err) {}
        }
    }

    /* =========================================================
       SESSÃO - persistência rápida (debounced)
    ========================================================= */
    function agendarSalvarSessao() {
        if (!idb || !carroAtivo) return;
        if (salvarSessaoTimer) return;
        salvarSessaoTimer = setTimeout(async () => {
            salvarSessaoTimer = null;
            try {
                const atual = (await idbGet('sessao', 'atual')) || { id: 'atual' };
                atual.carro = carroAtivo;
                atual.odo = odoTotal;
                atual.ultimaPos = ultimaPos;
                atual.ultimoIndice = ultimoIndiceAtivo;
                atual.ts = Date.now();
                await idbPut('sessao', atual);
            } catch (e) { console.warn('Falha salvar sessão', e); }
        }, 500);
    }

    /* =========================================================
       FLUXO PRINCIPAL DE RASTREIO
    ========================================================= */
    function iniciarFluxoRastreio(num) {
        carroAtivo = num;
        document.getElementById('setup').style.display = 'none';
        document.getElementById('ativo').style.display = 'flex';
        document.getElementById('viewCarro').innerText = "Carro " + num;
        solicitarWakeLock();

        db.ref(".info/connected").on("value", (snap) => {
            const msg = document.getElementById('msgGps');
            if (snap.val() === true) {
                msg.innerText = "● TRANSMITINDO AO VIVO";
                msg.classList.remove('status-offline');
                // Voltou a internet → tenta enviar pendentes
                tentarSincronizarPendentes();
            } else {
                msg.innerText = "SEM INTERNET - DADOS PROTEGIDOS LOCAL";
                msg.classList.add('status-offline');
            }
        });

        // Reage a online/offline do navegador também
        window.addEventListener('online', tentarSincronizarPendentes);

        watchID = navigator.geolocation.watchPosition(async (position) => {
            const lat = position.coords.latitude;
            const lng = position.coords.longitude;
            const accuracy = position.coords.accuracy;
            const speedMS = position.coords.speed || 0;
            const kmh = Math.round(speedMS * 3.6);
            if (accuracy > 25) return;

            if (ultimaPos) {
                const dist = calcularDistancia(ultimaPos.lat, ultimaPos.lng, lat, lng);
                if (dist > 0.004) {
                    odoTotal += dist;
                    atualizarTelaOdo();
                    ultimaPos = { lat, lng };
                }
            } else {
                ultimaPos = { lat, lng };
            }

            document.getElementById('viewVel').innerText = kmh.toFixed(1);
            const ponto = { lat, lng, vel: kmh, acc: accuracy, ts: Date.now() };

            // 1) SEMPRE grava no IndexedDB primeiro (verdade local)
            if (idb) {
                try {
                    await idbAdd('rastro', {
                        carro: num,
                        ...ponto,
                        sincronizado: 0
                    });
                    pendentesCount++;
                    atualizarStatusPendentes();
                } catch (e) { console.warn('Falha gravar IDB', e); }
            }

            // 2) Tenta enviar agora (Firebase também enfileira offline, mas IDB é a verdade)
            try {
                db.ref('posicoes/' + num).set(ponto);
                db.ref('rastros/' + num).push(ponto);
            } catch (e) { /* offline */ }

            // 3) Salva sessão (debounced)
            agendarSalvarSessao();

            // 4) Se online, tenta esvaziar pendentes em background
            if (navigator.onLine) tentarSincronizarPendentes();
        }, (err) => {
            console.warn('Erro GPS', err);
        }, { enableHighAccuracy: true, maximumAge: 0, timeout: 10000 });
    }

    /* =========================================================
       SINCRONIZAÇÃO DE PENDENTES
    ========================================================= */
    async function atualizarContadorPendentes() {
        if (!idb) return;
        const all = await idbGetAll('rastro').catch(() => []);
        pendentesCount = all.filter(p => p.sincronizado === 0).length;
        atualizarStatusPendentes();
    }

    function atualizarStatusPendentes() {
        const el = document.getElementById('msgPendentes');
        if (!el) return;
        if (pendentesCount > 0) {
            el.style.display = 'block';
            el.innerText = `↻ ${pendentesCount} ponto(s) aguardando sincronização`;
        } else {
            el.style.display = 'none';
        }
    }

    async function tentarSincronizarPendentes() {
        if (!idb || sincronizando || !carroAtivo) return;
        if (!navigator.onLine) return;
        sincronizando = true;
        try {
            const all = await idbGetAll('rastro');
            const pendentes = all.filter(p => p.sincronizado === 0);
            if (pendentes.length === 0) { sincronizando = false; return; }

            // Envia em lotes de 100 via update multilocal
            const lote = pendentes.slice(0, 200);
            const updates = {};
            for (const p of lote) {
                const key = db.ref('rastros/' + p.carro).push().key;
                updates['rastros/' + p.carro + '/' + key] = {
                    lat: p.lat, lng: p.lng, vel: p.vel, acc: p.acc, ts: p.ts
                };
            }
            await db.ref().update(updates);

            // Marca como sincronizado
            const tx = idb.transaction('rastro', 'readwrite');
            const store = tx.objectStore('rastro');
            for (const p of lote) {
                p.sincronizado = 1;
                store.put(p);
            }
            await new Promise((res, rej) => {
                tx.oncomplete = res;
                tx.onerror = () => rej(tx.error);
            });

            pendentesCount = Math.max(0, pendentesCount - lote.length);
            atualizarStatusPendentes();

            // Se ainda restou, agenda próxima rodada
            if (pendentes.length > lote.length) {
                setTimeout(() => { sincronizando = false; tentarSincronizarPendentes(); }, 500);
            } else {
                sincronizando = false;
            }
        } catch (e) {
            console.warn('Falha sync pendentes', e);
            sincronizando = false;
        }
    }

    /* =========================================================
       INICIAR PROVA
    ========================================================= */
    document.getElementById('btnIniciar').onclick = async function () {
        const numRaw = document.getElementById('carro').value;
        const nomeRaw = document.getElementById('nome').value.trim();
        const cat = document.getElementById('categoria').value;
        const num = parseInt(numRaw);
        if (!nomeRaw || !numRaw) return alert("Preencha todos os campos!");
        try {
            const statusSnap = await db.ref('configuracoes/provaAberta').once('value');
            if (statusSnap.val() !== true) return alert("🚫 A prova está fechada.");
            const snapshot = await db.ref('competidores/' + num).once('value');
            if (snapshot.exists()) return alert("Este número de carro já existe!");

            somClique();

            await db.ref('competidores/' + num).set({ nome: nomeRaw, categoria: cat });

            const tsLogin = Date.now();
            // localStorage como fallback
            localStorage.setItem('rally_carro_ativo', num);
            localStorage.setItem('rally_timestamp_login', tsLogin);

            // IndexedDB - login persistente
            if (idb) {
                await idbPut('sessao', {
                    id: 'atual',
                    carro: num,
                    nome: nomeRaw,
                    categoria: cat,
                    tsLogin,
                    odo: 0,
                    ultimaPos: null,
                    ultimoIndice: -1,
                    ts: tsLogin
                }).catch(() => {});
            }

            iniciarFluxoRastreio(num);
            carregarRoadbook();
        } catch (e) {
            alert("Erro de conexão.");
        }
    };

    /* =========================================================
       ODÔMETRO
    ========================================================= */
    function alterarOdo(v) {
        odoTotal = Math.max(0, odoTotal + v);
        somClique();
        atualizarTelaOdo();
        agendarSalvarSessao();
    }
    function zerarOdo() {
        if (confirm("Zerar odômetro?")) {
            odoTotal = 0;
            somClique();
            atualizarTelaOdo();
            agendarSalvarSessao();
        }
    }
    function atualizarTelaOdo() {
        document.getElementById('displayOdo').innerText = odoTotal.toFixed(3);
        atualizarScrollRoadbook();
    }
    function ajusteManualOdo() {
        let n = prompt("Ajustar Odômetro (KM):", odoTotal.toFixed(3));
        if (n !== null) {
            let val = parseFloat(n.replace(',', '.'));
            if (!isNaN(val)) {
                odoTotal = Math.max(0, val);
                somClique();
                atualizarTelaOdo();
                agendarSalvarSessao();
            }
        }
    }

    /* =========================================================
       MENU - AÇÕES
    ========================================================= */
    async function enviarDatalogger() {
        if (!idb || !carroAtivo) {
            alert("Sem sessão ativa.");
            return;
        }
        if (!navigator.onLine) {
            alert("📡 SEM INTERNET\n\nO envio do datalogger exige conexão com a internet.\n\nSeus dados estão 100% seguros no celular. Conecte-se ao Wi-Fi ou dados móveis e tente novamente.");
            return;
        }
        // Valida conexão real com o Firebase antes de prosseguir
        try {
            const connSnap = await Promise.race([
                db.ref('.info/connected').once('value'),
                new Promise((_, rej) => setTimeout(() => rej(new Error('timeout')), 5000))
            ]);
            if (!connSnap.val()) throw new Error('offline');
        } catch (e) {
            alert("📡 SEM CONEXÃO COM O SERVIDOR\n\nNão foi possível contatar o servidor. Verifique a internet e tente novamente. Seus dados continuam seguros no celular.");
            return;
        }
        const all = await idbGetAll('rastro');
        const todos = all.filter(p => p.carro == carroAtivo);
        if (todos.length === 0) {
            alert("Nenhum ponto de rastro registrado ainda.");
            return;
        }

        if (!confirm(`Enviar ${todos.length} pontos de rastro do carro ${carroAtivo} para o servidor?`)) return;

        // Envia TUDO (não só pendentes) para garantir o registro completo
        try {
            const CHUNK = 300;
            for (let i = 0; i < todos.length; i += CHUNK) {
                const lote = todos.slice(i, i + CHUNK);
                const updates = {};
                for (const p of lote) {
                    const key = db.ref('datalogger/' + carroAtivo).push().key;
                    updates['datalogger/' + carroAtivo + '/' + key] = {
                        lat: p.lat, lng: p.lng, vel: p.vel, acc: p.acc, ts: p.ts
                    };
                }
                await db.ref().update(updates);
            }

            // Marca tudo como sincronizado, mas mantém local (conforme escolha do usuário)
            const tx = idb.transaction('rastro', 'readwrite');
            const store = tx.objectStore('rastro');
            for (const p of todos) {
                p.sincronizado = 1;
                store.put(p);
            }
            await new Promise((res, rej) => { tx.oncomplete = res; tx.onerror = () => rej(tx.error); });

            await atualizarContadorPendentes();
            alert(`✅ Datalogger enviado: ${todos.length} pontos.`);
        } catch (e) {
            console.error(e);
            alert("Falha ao enviar datalogger. Os dados continuam salvos no celular. Tente novamente.");
        }
    }

    let _rastroMap = null, _rastroLayer = null;
    async function verRastro() {
        document.getElementById('menuOpcoes').style.display = 'none';
        const carro = carroAtivo || localStorage.getItem('rally_carro_ativo');
        if (!carro) { alert("Você precisa iniciar a prova para visualizar seu rastro."); return; }

        const modal = document.getElementById('rastroModal');
        const info = document.getElementById('rastroInfo');
        modal.classList.add('active');
        info.innerText = 'Carregando pontos…';

        // Lê pontos do IndexedDB (fonte da verdade, funciona offline)
        let pontos = [];
        try {
            const all = await idbGetAll('rastro');
            pontos = all
                .filter(p => Number(p.carro) === Number(carro) && typeof p.lat === 'number' && typeof p.lng === 'number')
                .sort((a, b) => (a.ts || 0) - (b.ts || 0));
        } catch (e) { console.warn('Falha lendo rastro IDB', e); }

        // Inicializa mapa (uma vez)
        if (!_rastroMap) {
            _rastroMap = L.map('rastroMapa', { zoomControl: true, attributionControl: false });
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                maxZoom: 19, crossOrigin: true
            }).addTo(_rastroMap);
            _rastroMap.setView([-12.9, -38.5], 13);
        }
        if (_rastroLayer) { _rastroMap.removeLayer(_rastroLayer); _rastroLayer = null; }

        if (pontos.length === 0) {
            info.innerText = 'Nenhum ponto registrado ainda.';
            setTimeout(() => _rastroMap.invalidateSize(), 100);
            return;
        }

        const coords = pontos.map(p => [p.lat, p.lng]);
        const grupo = L.featureGroup();
        L.polyline(coords, { color: '#f80303', weight: 4, opacity: 0.85 }).addTo(grupo);
        L.circleMarker(coords[0], { radius: 7, color: '#2ecc71', fillColor: '#2ecc71', fillOpacity: 1 })
            .bindTooltip('Início').addTo(grupo);
        L.circleMarker(coords[coords.length - 1], { radius: 7, color: '#f1c40f', fillColor: '#f1c40f', fillOpacity: 1 })
            .bindTooltip('Atual').addTo(grupo);
        grupo.addTo(_rastroMap);
        _rastroLayer = grupo;

        setTimeout(() => {
            _rastroMap.invalidateSize();
            _rastroMap.fitBounds(grupo.getBounds(), { padding: [30, 30] });
        }, 150);

        const dt0 = pontos[0].ts ? new Date(pontos[0].ts).toLocaleTimeString() : '-';
        const dt1 = pontos[pontos.length - 1].ts ? new Date(pontos[pontos.length - 1].ts).toLocaleTimeString() : '-';
        info.innerText = `Carro ${carro} • ${pontos.length} pontos • ${dt0} → ${dt1}`;
    }

    function fecharRastro() {
        document.getElementById('rastroModal').classList.remove('active');
    }

    async function encerrarSessao() {
        if (!confirm("Encerrar sessão? Recomenda-se enviar o datalogger antes.")) return;
        pararGps();
        await limparTudo();
        location.reload();
    }

    function encerrarSessaoRemoto() {
        pararGps();
        limparTudo().finally(() => {
            alert("A organização encerrou a sessão.");
            location.reload();
        });
    }

    function pararGps() {
        if (watchID) navigator.geolocation.clearWatch(watchID);
    }

    async function limparTudo() {
        localStorage.removeItem('rally_carro_ativo');
        localStorage.removeItem('rally_timestamp_login');
        if (idb) {
            await idbClear('sessao').catch(() => {});
            await idbClear('rastro').catch(() => {});
            await idbClear('referencias').catch(() => {});
            // Roadbook pode ficar em cache para próxima sessão; opcional limpar:
            // await idbClear('roadbook').catch(() => {});
        }
    }

    // Reaquisição do wake lock ao voltar para a aba
    document.addEventListener('visibilitychange', () => {
        if (document.visibilityState === 'visible' && carroAtivo) {
            solicitarWakeLock();
            tentarSincronizarPendentes();
        }
    });
    </script>
