<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Race Krono</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0d0af0">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Race Krono">
    <link rel="apple-touch-icon" href="https://raw.githubusercontent.com/racekrono/adv/refs/heads/main/Logo.png">
    
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    
    <style>
        body { font-family: sans-serif; background: #121212; color: white; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; overflow: hidden; }
        .card { background: #1e1e1e; padding: 25px; border-radius: 12px; width: 90%; max-width: 380px; box-shadow: 0 8px 32px rgba(0,0,0,0.5); border-top: 5px solid #ffffff; z-index: 10; }
        .logo { display: block; margin: 0 auto 20px auto; max-width: 150px; height: auto; }
        input, select, button { width: 100%; padding: 14px; margin-bottom: 15px; border-radius: 8px; border: 1px solid #333; background: #252525; color: white; font-size: 16px; box-sizing: border-box; }
        button { background: #f80303; border: none; font-weight: bold; cursor: pointer; transition: 0.3s; }
        .tracking { text-align: center; display: none; }
        .status-container { margin-top: 15px; padding: 10px; border-radius: 8px; background: rgba(0,0,0,0.3); border: 1px solid #333; }
        .status-gps { color: #2ecc71; font-weight: bold; font-size: 14px; }
        .status-offline { color: #f1c40f !important; }
        .aviso-offline { display: none; font-size: 11px; color: #f1c40f; margin-top: 5px; text-transform: uppercase; font-weight: bold; }
        .odo-box { margin-top: 15px; padding: 15px 10px; border-top: 1px solid #333; background: rgba(0,0,0,0.2); border-radius: 10px; }
        .odo-label { font-size: 10px; color: #888; text-transform: uppercase; }
        .odo-val { font-size: 5rem; font-weight: bold; color: #f1c40f; margin: 2px 0; font-family: monospace; }
        .btn-mini { padding: 10px; font-size: 14px; background: #333; width: auto; flex: 1; }
        .btn-sair { background: transparent; color: #444; font-size: 11px; margin-top: 20px; border: none; width: 100%; text-decoration: underline; }
    </style>
</head>
<body>
    <div class="card">
        <div id="setup">
            <img src="https://raw.githubusercontent.com/racekrono/adv/refs/heads/main/Logo.png" class="logo">
            <input type="text" id="nome" placeholder="Nome do Piloto">
            <select id="categoria">
                <option>UTV</option><option>BAIANO 4x4</option><option>BAIANO 4x2</option><option>INICIANTE</option>
            </select>
            <input type="number" id="carro" placeholder="Nº do Carro">
            <button id="btnIniciar">INICIAR PROVA</button>
        </div>

        <div id="ativo" class="tracking">
            <h2 id="viewCarro" style="color:#0d0af0; margin-bottom: 4px;">Carro --</h2>
            <div id="viewVel" style="font-size: 3rem; font-weight: bold;">0.0</div>
            <p style="color: #888;">KM/H</p>
            
            <div class="odo-box">
                <span class="odo-label">Odômetro</span>
                <div id="displayOdo" class="odo-val">0.000</div>
                <div style="display:flex; gap:5px;">
                    <button class="btn-mini" onclick="odoTotal=0; atualizarTelaOdo();">ZERAR</button>
                </div>
            </div>

            <div class="status-container">
                <div id="msgGps" class="status-gps">● LOCALIZANDO...</div>
                <div id="detalheOffline" class="aviso-offline">MODO OFFLINE ATIVO</div>
            </div>
            
            <button class="btn-sair" onclick="encerrarSessao()">Encerrar / Sair</button>
        </div>
    </div>

            authDomain: "cronometro-rally.firebaseapp.com",
            databaseURL: "https://cronometro-rally-default-rtdb.firebaseio.com",
            projectId: "cronometro-rally",
            appId: "1:341731891354:web:d0c34265be68015e98a723"
        };
        const app = firebase.initializeApp(firebaseConfig);
        const db = firebase.database(app);

        let watchID = null, odoTotal = 0, ultimaPos = null;

            let loginTS = localStorage.getItem('rally_login_ts');

                    alert("A prova foi encerrada pela organização.");
                    encerrarSessao();
                }
            });
