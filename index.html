<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Race Krono - Oficial</title>

    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0d0af0">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Race Krono">
    <link rel="apple-touch-icon" href="https://raw.githubusercontent.com/racekrono/adv/refs/heads/main/Logo.png">
    
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <script src="https://unpkg.com/@turf/turf@6/turf.min.js"></script>
    
    <style>
        body { font-family: sans-serif; background: #121212; color: white; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; overflow: hidden; }
        .card { position: relative; background: #1e1e1e; padding: 25px; border-radius: 12px; width: 90%; max-width: 380px; box-shadow: 0 8px 32px rgba(0,0,0,0.5); border-top: 5px solid #ffffff; z-index: 10; max-height: 95vh; display: flex; flex-direction: column; }
        .logo { display: block; margin: 0 auto 10px auto; max-width: 120px; height: auto; }
        input, select, button { width: 100%; padding: 14px; margin-bottom: 15px; border-radius: 8px; border: 1px solid #333; background: #252525; color: white; font-size: 16px; box-sizing: border-box; }
        button { background: #f80303; border: none; font-weight: bold; cursor: pointer; transition: 0.3s; }
        button:active { transform: scale(0.98); }
        
        #setup { display: block; } 
        #ativo { display: none; flex-direction: column; overflow: hidden; }
        
        /* ALERTA DE RADAR */
        #radarAlert {
            display: none;
            position: absolute;
            top: 0; left: 0; right: 0;
            background: #e53e3e;
            color: white;
            text-align: center;
            padding: 10px;
            font-weight: bold;
            z-index: 1000;
            animation: blink 0.5s infinite;
            border-radius: 12px 12px 0 0;
        }
        @keyframes blink { 
            0% { opacity: 1; } 
            50% { opacity: 0.5; } 
            100% { opacity: 1; } 
        }

        .header-dados { display: flex; justify-content: center; align-items: baseline; gap: 12px; margin-bottom: 5px; }
        #viewCarro { color: #ffffff; margin: 0; font-size: 1.1rem; font-weight: bold; }
        #viewVel { font-size: 3rem; font-weight: bold; line-height: 1; color: #f1c40f; }
        .unidade-kmh { color: #888; font-size: 11px; font-weight: bold; text-transform: uppercase; }

        .odo-box { padding: 10px 5px; border-top: 1px solid #333; background: rgba(0,0,0,0.2); border-radius: 10px; margin-bottom: 10px; }
        .odo-label { font-size: 9px; color: #888; text-transform: uppercase; letter-spacing: 1px; }
        .odo-val { font-size: 4rem; text-align: center; font-weight: bold; color: #f1c40f; margin: 0; cursor: pointer; font-family: monospace; line-height: 1; }
        .odo-btns { display: flex; gap: 4px; justify-content: center; margin-top: 8px; }
        .btn-mini { padding: 8px 2px; font-size: 11px; background: #333; margin-bottom: 0; width: auto; flex: 1; border: 1px solid #444; color: white; border-radius: 4px; }

        .roadbook-container { 
            background: #000; 
            border-radius: 8px; 
            overflow-y: auto; 
            flex-grow: 0; 
            border: 2px solid #333; 
            min-height: 260px; 
            margin-bottom: 10px;
            scroll-behavior: smooth;
            height: 260px; 
            max-height: 260px;      
        }
        .roadbook-item { display: flex; align-items: center; border-bottom: 1px solid #222; padding: 6px 4px; gap: 8px; }
        .rb-item-ativo { background-color: #262d37 !important; border-left: 6px solid #FF0000 ; }
        .rb-col-km { flex: 0 0 55px; font-family: monospace; font-weight: bold; color: #f1c40f; font-size: 18px; text-align: right; }
        .rb-col-tulipa { flex: 0 0 80px; background: white; padding: 2px; border-radius: 4px; display: flex; justify-content: center; align-items: center; min-height: 70px; }
        .rb-col-tulipa img { max-width: 100%; height: auto; max-height: 70px; }
        .rb-col-obs { flex: 1; font-size: 14px; color: #eee; text-align: left; text-transform: uppercase; font-weight: bold; }

        .status-container { padding: 5px; border-radius: 8px; background: rgba(0,0,0,0.3); border: 1px solid #333; margin-bottom: 5px; }
        .status-gps { color: #2ecc71; font-weight: bold; font-size: 11px; text-align: center; }
        
        #menuContainer { position: absolute; top: 15px; right: 15px; z-index: 100; }
        #btnMenu { width: 40px; height: 40px; padding: 0; margin: 0; border-radius: 50%; background: #333; display: flex; justify-content: center; align-items: center; border: 1px solid #444; font-size: 20px; color: white; }
        #menuOpcoes { display: none; position: absolute; top: 45px; right: 0; background: #252525; border: 1px solid #444; border-radius: 8px; width: 200px; box-shadow: 0 4px 15px rgba(0,0,0,0.8); overflow: hidden; }
        #menuOpcoes button { margin: 0; border-bottom: 1px solid #333; background: transparent; text-align: left; font-size: 14px; padding: 15px; border-radius: 0; }
    </style>
</head>
<body>

    <div class="card">
        <div id="radarAlert">⚠️ ACIMA DO LIMITE (RADAR) ⚠️</div>

        <div id="menuContainer">
            <button id="btnMenu">☰</button>
            <div id="menuOpcoes">
                <button onclick="enviarDatalogger()">📤 Enviar Datalogger</button>
                <button onclick="verRastro()">📍 Ver Rastro</button>
                <button onclick="encerrarSessao()">🔚 SAIR ❌</button>
            </div>
        </div>

        <div id="setup">
            <img src="https://raw.githubusercontent.com/racekrono/adv/refs/heads/main/Logo.png" class="logo">
            <h2 style="color:#ffffff; text-align:center; margin-top: 0; font-size: 1.2rem;">Rally de Aventura</h2>
            <input type="text" id="nome" placeholder="Nome do Piloto">
            <select id="categoria">
                <option>UTV</option>
                <option>BAIANO 4x2</option><option>BAIANO 4x4</option>
                <option>INICIANTE 4x2</option><option>INICIANTE 4x4</option>
                <option>ANTIGOS</option>
            </select>
            <input type="number" id="carro" placeholder="Nº do Carro">
            <button id="btnIniciar">INICIAR PROVA</button>
        </div>

        <div id="ativo">
            <div class="header-dados">
                <span id="viewCarro">Carro --</span>
                <div id="viewVel">0.0</div>
                <span class="unidade-kmh">KM/H</span>
            </div>

            <div class="odo-box">
                <span class="odo-label">Odômetro</span>
                <div id="displayOdo" class="odo-val" onclick="ajusteManualOdo()">0.000</div>
                <div class="odo-btns">
                    <button class="btn-mini" onclick="alterarOdo(-0.010)">-10m</button>
                    <button class="btn-mini" onclick="alterarOdo(-0.001)">-1m</button>
                    <button class="btn-mini" onclick="zerarOdo()" style="background:#b30000;">ZERAR</button>
                    <button class="btn-mini" onclick="alterarOdo(0.001)">+1m</button>
                    <button class="btn-mini" onclick="alterarOdo(0.010)">+10m</button>
                </div>
            </div>

            <div class="roadbook-container" id="roadbookList">
                <div style="padding: 20px; color: #444; font-size: 11px; text-align: center;">CARREGANDO PLANILHA...</div>
            </div>
            
            <div class="status-container">
                <div id="msgGps" class="status-gps">● CONECTANDO...</div>
            </div>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBPJkehV9C1x0hiY5dQSwSRtVf5c4P2JGE",
            authDomain: "cronometro-rally.firebaseapp.com",
            databaseURL: "https://cronometro-rally-default-rtdb.firebaseio.com",
            projectId: "cronometro-rally",
            appId: "1:341731891354:web:d0c34265be68015e98a723"
        };
        const app = firebase.initializeApp(firebaseConfig);
        const db = firebase.database(app);

        let wakeLock = null;
        let watchID = null;
        let odoTotal = 0;
        let ultimaPos = null;
        let ultimoIndiceAtivo = -1;
        let listaRadares = []; // Armazena polígonos do percurso
        let audioCtx = null;
        let radarInterval = null; // Para o bip contínuo

        function obterAudioContext() {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            if (audioCtx.state === 'suspended') audioCtx.resume();
            return audioCtx;
        }

        function tocarBip(frequencia, duracao, volume = 0.1) {
            try {
                const ctx = obterAudioContext();
                const oscillator = ctx.createOscillator();
                const gainNode = ctx.createGain();
                oscillator.type = 'sine'; 
                oscillator.frequency.setValueAtTime(frequencia, ctx.currentTime);
                gainNode.gain.setValueAtTime(volume, ctx.currentTime);
                gainNode.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + duracao);
                oscillator.connect(gainNode);
                gainNode.connect(ctx.destination);
                oscillator.start();
                oscillator.stop(ctx.currentTime + duracao);
            } catch (e) {}
        }

        const somTrocaReferencia = () => tocarBip(1200, 0.25, 0.15);
        
        // Bip de alerta crítico (Radar acima do limite)
        function alertaCriticoRadar() {
            tocarBip(3000, 0.1, 0.2); // Som bem agudo
            setTimeout(() => tocarBip(2500, 0.1, 0.2), 150);
        }

        // Carrega polígonos de radar do Admin
        function carregarRadares() {
            db.ref('configuracoes/percurso').on('value', snap => {
                const data = snap.val();
                if (data && data.features) {
                    listaRadares = data.features.filter(f => f.geometry.type === 'Polygon');
                }
            });
        }

        function verificarRadar(lat, lng, velKmh) {
            const ponto = turf.point([lng, lat]);
            let emRadar = false;
            let excesso = false;

            listaRadares.forEach(radar => {
                if (turf.booleanPointInPolygon(ponto, radar)) {
                    emRadar = true;
                    const limite = radar.properties.velocidade || 60;
                    if (velKmh > limite) excesso = true;
                }
            });

            const alertDiv = document.getElementById('radarAlert');
            if (excesso) {
                alertDiv.style.display = 'block';
                if (!radarInterval) {
                    radarInterval = setInterval(alertaCriticoRadar, 400);
                }
            } else {
                alertDiv.style.display = 'none';
                if (radarInterval) {
                    clearInterval(radarInterval);
                    radarInterval = null;
                }
            }
        }

        // --- Lógica de Inicialização e GPS (Mantida e Atualizada) ---
        
        function iniciarFluxoRastreio(num) {
            document.getElementById('setup').style.display = 'none';
            document.getElementById('ativo').style.display = 'flex';
            document.getElementById('viewCarro').innerText = "Carro " + num;
            carregarRadares();

            watchID = navigator.geolocation.watchPosition(position => {
                const lat = position.coords.latitude;
                const lng = position.coords.longitude;
                const accuracy = position.coords.accuracy;
                const speedMS = position.coords.speed || 0;
                const kmh = speedMS * 3.6;

                if (accuracy > 25) return;

                // Verifica Radar
                verificarRadar(lat, lng, kmh);

                if (ultimaPos) {
                    const dist = calcularDistancia(ultimaPos.lat, ultimaPos.lng, lat, lng);
                    if (dist > 0.003) { 
                        odoTotal += dist;
                        atualizarTelaOdo();
                        ultimaPos = { lat, lng }; 
                    }
                } else {
                    ultimaPos = { lat, lng };
                }

                document.getElementById('viewVel').innerText = kmh.toFixed(1);
                db.ref('posicoes/' + num).set({ lat, lng, vel: Math.round(kmh), acc: accuracy, ts: Date.now() });
                db.ref('rastros/' + num).push({ lat, lng, vel: Math.round(kmh), ts: Date.now() });

            }, null, { enableHighAccuracy: true, maximumAge: 0, timeout: 10000 });
        }

        // Funções de apoio (Odômetro, Scroll, etc) seguem o padrão do seu arquivo original
        function calcularDistancia(lat1, lon1, lat2, lon2) {
            const R = 6371; 
            const dLat = (lat2 - lat1) * Math.PI / 180;
            const dLon = (lon2 - lon1) * Math.PI / 180;
            const a = Math.sin(dLat/2) * Math.sin(dLat/2) + Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) * Math.sin(dLon/2) * Math.sin(dLon/2);
            return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
        }

        function atualizarTelaOdo() { 
            document.getElementById('displayOdo').innerText = odoTotal.toFixed(3); 
            atualizarScrollRoadbook(); 
        }

        function atualizarScrollRoadbook() {
            const itens = document.querySelectorAll('.roadbook-item');
            if (itens.length === 0) return;
            let proximoItemIdx = -1;
            itens.forEach((div, index) => {
                const kmItem = parseFloat(div.querySelector('.rb-col-km').innerText);
                div.classList.remove('rb-item-ativo');
                if (proximoItemIdx === -1 && odoTotal < kmItem) proximoItemIdx = index;
            });
            if (proximoItemIdx !== -1) {
                if (proximoItemIdx !== ultimoIndiceAtivo) {
                    if (ultimoIndiceAtivo !== -1) somTrocaReferencia();
                    ultimoIndiceAtivo = proximoItemIdx;
                }
                const itemAlvo = document.getElementById('rb-item-' + proximoItemIdx);
                itemAlvo.classList.add('rb-item-ativo');
                itemAlvo.scrollIntoView({ behavior: 'smooth', block: 'start' });
            }
        }

        document.getElementById('btnIniciar').onclick = async function() {
            const num = document.getElementById('carro').value;
            const nome = document.getElementById('nome').value.trim();
            if(!nome || !num) return alert("Preencha tudo!");
            obterAudioContext(); // Habilita áudio
            iniciarFluxoRastreio(num);
            carregarRoadbook();
        };

        function carregarRoadbook() {
            const rbList = document.getElementById('roadbookList');
            db.ref('prova_atual').on('value', snap => {
                const dados = snap.val();
                if (!dados) return;
                rbList.innerHTML = '';
                dados.forEach((item, index) => {
                    const div = document.createElement('div');
                    div.className = 'roadbook-item';
                    div.id = 'rb-item-' + index;
                    div.innerHTML = `<div class="rb-col-km">${parseFloat(item.km).toFixed(3)}</div><div class="rb-col-tulipa"><img src="${item.tulipa}"></div><div class="rb-col-obs">${item.obs || ''}</div>`;
                    rbList.appendChild(div);
                });
            });
        }

        // Funções de Menu e UI
        document.getElementById('btnMenu').onclick = (e) => {
            e.stopPropagation();
            const m = document.getElementById('menuOpcoes');
            m.style.display = m.style.display === 'block' ? 'none' : 'block';
        };
        window.onclick = () => document.getElementById('menuOpcoes').style.display = 'none';

    </script>
</body>
</html>
