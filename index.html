<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Race Krono - Piloto</title>

    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0d0af0">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="https://raw.githubusercontent.com/racekrono/adv/refs/heads/main/Logo.png">

    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    
    <style>
        body { font-family: sans-serif; background: #121212; color: white; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; overflow: hidden; }
        .card { background: #1e1e1e; padding: 20px; border-radius: 12px; width: 95%; max-width: 400px; box-shadow: 0 8px 32px rgba(0,0,0,0.5); border-top: 5px solid #ffffff; max-height: 98vh; overflow-y: auto; }
        .logo { display: block; margin: 0 auto 15px auto; max-width: 120px; height: auto; }
        input, select, button { width: 100%; padding: 14px; margin-bottom: 10px; border-radius: 8px; border: 1px solid #333; background: #252525; color: white; font-size: 16px; box-sizing: border-box; }
        button { background: #f80303; border: none; font-weight: bold; cursor: pointer; transition: 0.3s; }
        button:active { transform: scale(0.98); }
        
        #setup { display: block; } 
        .tracking { text-align: center; display: none; }
        
        /* Odômetro */
        .odo-box { margin-top: 10px; padding: 10px; border-top: 1px solid #333; background: rgba(0,0,0,0.2); border-radius: 10px; }
        .odo-val { font-size: 4rem; font-weight: bold; color: #f1c40f; margin: 0; font-family: monospace; cursor: pointer; }
        
        /* Planilha */
        #roadbook-container { margin-top: 15px; background: #000; border: 2px solid #f1c40f; border-radius: 8px; height: 230px; overflow-y: auto; scroll-behavior: smooth; }
        #tabela-roadbook { width: 100%; border-collapse: collapse; color: white; font-size: 13px; }
        #tabela-roadbook td { padding: 15px 4px; border-bottom: 1px solid #222; text-align: center; }
        .linha-ativa { background: rgba(241, 196, 15, 0.25) !important; border-left: 4px solid #f1c40f; }
        .tulipa-img { width: 60px; filter: invert(1); }
        
        /* Status e Segurança */
        .status-container { margin-top: 10px; padding: 8px; border-radius: 8px; background: rgba(0,0,0,0.3); border: 1px solid #333; }
        .btn-seguranca { background: #333; color: #ccc; font-size: 10px; padding: 8px; margin-top: 5px; border: 1px dashed #555; width: auto; flex: 1; }
        .btn-sair { background: transparent; color: #444; font-size: 10px; margin-top: 15px; text-decoration: underline; border: none; cursor: pointer; }
    </style>
</head>
<body>

    <div class="card">
        <div id="setup">
            <img src="https://raw.githubusercontent.com/racekrono/adv/refs/heads/main/Logo.png" class="logo">
            <input type="text" id="nome" placeholder="Nome do Piloto">
            <input type="number" id="carro" placeholder="Nº do Carro">
            <button id="btnIniciar">INICIAR PROVA</button>
        </div>

        <div id="ativo" class="tracking">
            <h2 id="viewCarro" style="color:#0d0af0; margin: 0; font-size: 1.2rem;">Carro --</h2>
            <div id="viewVel" style="font-size: 2.5rem; font-weight: bold;">0.0</div>
            <p style="margin: 0; color: #888; font-size: 12px;">KM/H</p>

            <div class="odo-box">
                <div id="displayOdo" class="odo-val" onclick="ajusteManualOdo()">0.000</div>
                <div style="display:flex; gap:5px;">
                    <button onclick="alterarOdo(-0.010)" style="background:#333; padding:8px">-10m</button>
                    <button onclick="zerarOdo()" style="background:#b30000; padding:8px">ZERAR</button>
                    <button onclick="alterarOdo(0.010)" style="background:#333; padding:8px">+10m</button>
                </div>
            </div>

            <div id="roadbook-container">
                <table id="tabela-roadbook">
                    <tbody id="corpo-roadbook"></tbody>
                </table>
            </div>
            
            <div style="display: flex; gap: 5px;">
                <button class="btn-seguranca" onclick="baixarPlanilhaOffline()">💾 BACKUP</button>
                <button class="btn-seguranca" onclick="document.getElementById('inputArquivo').click()">📂 IMPORTAR</button>
                <input type="file" id="inputArquivo" style="display:none" accept=".json" onchange="importarPlanilhaOffline(this)">
            </div>

            <div class="status-container">
                <div id="msgGps" style="color: #2ecc71; font-weight: bold; font-size: 12px;">● CONECTANDO...</div>
                <div id="detalheOffline" style="display: none; font-size: 10px; color: #f1c40f; margin-top: 5px; text-transform: uppercase; font-weight: bold;">
                    MODO OFFLINE - BACKUP ATIVO
                </div>
            </div>

            <button class="btn-sair" onclick="encerrarSessao()">Sair / Finalizar</button>
        </div>
    </div>

    <script>
        // Configuração do Firebase (Utilizando as suas credenciais fornecidas)
        const firebaseConfig = {
            apiKey: "AIzaSyBPJkehV9C1x0hiY5dQSwSRtVf5c4P2JGE",
            authDomain: "cronometro-rally.firebaseapp.com",
            databaseURL: "https://cronometro-rally-default-rtdb.firebaseio.com",
            projectId: "cronometro-rally",
            appId: "1:341731891354:web:d0c34265be68015e98a723"
        };
        const app = firebase.initializeApp(firebaseConfig);
        const db = firebase.database(app);

        let odoTotal = 0;
        let ultimaPos = null;
        let dadosPlanilha = [];
        let watchID = null;

        // --- 1. LÓGICA DE DADOS E PERSISTÊNCIA ---
        function carregarPlanilhaDoServidor() {
            db.ref('prova_atual').on('value', (snapshot) => {
                if(snapshot.val()) {
                    dadosPlanilha = snapshot.val();
                    localStorage.setItem('backup_planilha', JSON.stringify(dadosPlanilha));
                    renderizarPlanilha();
                }
            });
        }

        function renderizarPlanilha() {
            const corpo = document.getElementById('corpo-roadbook');
            corpo.innerHTML = dadosPlanilha.map((item, index) => `
                <tr id="ref-${index}">
                    <td style="font-weight:bold; color:#f1c40f; font-family:monospace; font-size:1.1rem;">${item.km.toFixed(3)}</td>
                    <td><img src="${item.tulipa}" class="tulipa-img"></td>
                    <td style="font-size:10px; color:#aaa; text-align:left; padding-left:10px;">${item.obs || ''}</td>
                </tr>
            `).join('');
            sincronizarPlanilha();
        }

        function sincronizarPlanilha() {
            if (dadosPlanilha.length === 0) return;
            const indexAtivo = dadosPlanilha.findIndex(item => item.km >= odoTotal);
            if (indexAtivo !== -1) {
                document.querySelectorAll('#corpo-roadbook tr').forEach(tr => tr.classList.remove('linha-ativa'));
                const linha = document.getElementById(`ref-${indexAtivo}`);
                if (linha) {
                    linha.classList.add('linha-ativa');
                    linha.scrollIntoView({ behavior: 'smooth', block: 'center' });
                }
            }
        }

        // --- 2. CONTROLES DO ODÔMETRO ---
        function atualizarTelaOdo() { 
            document.getElementById('displayOdo').innerText = odoTotal.toFixed(3); 
            localStorage.setItem('rally_odo_salvo', odoTotal);
            sincronizarPlanilha();
        }

        function alterarOdo(v) { odoTotal = Math.max(0, odoTotal + v); atualizarTelaOdo(); }
        function zerarOdo() { if(confirm("Zerar odômetro parcial?")) { odoTotal = 0; atualizarTelaOdo(); } }
        function ajusteManualOdo() {
            let n = prompt("Ajustar Odômetro para (KM):", odoTotal.toFixed(3));
            if(n) { 
                let val = parseFloat(n.replace(',','.'));
                if(!isNaN(val)) { odoTotal = Math.max(0, val); atualizarTelaOdo(); }
            }
        }

        // --- 3. GPS E RASTREIO ---
        function calcularDistancia(lat1, lon1, lat2, lon2) {
            const R = 6371; 
            const dLat = (lat2 - lat1) * Math.PI / 180;
            const dLon = (lon2 - lon1) * Math.PI / 180;
            const a = Math.sin(dLat/2) * Math.sin(dLat/2) + Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) * Math.sin(dLon/2) * Math.sin(dLon/2);
            return R * (2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a))); 
        }

        function iniciarFluxoRastreio(num) {
            document.getElementById('setup').style.display = 'none';
            document.getElementById('ativo').style.display = 'block';
            document.getElementById('viewCarro').innerText = "Carro " + num;
            
            // Recupera estado anterior
            const odoSalvo = localStorage.getItem('rally_odo_salvo');
            if(odoSalvo) odoTotal = parseFloat(odoSalvo);
            atualizarTelaOdo();

            const cache = localStorage.getItem('backup_planilha');
            if(cache) { dadosPlanilha = JSON.parse(cache); renderizarPlanilha(); }

            carregarPlanilhaDoServidor();

            // Monitor de Conexão
            db.ref(".info/connected").on("value", (snap) => {
                const msg = document.getElementById('msgGps');
                const detalhe = document.getElementById('detalheOffline');
                if (snap.val() === true) {
                    msg.innerText = "● TRANSMITINDO AO VIVO";
                    msg.style.color = "#2ecc71";
                    detalhe.style.display = 'none';
                } else {
                    msg.innerText = "○ SEM INTERNET";
                    msg.style.color = "#f1c40f";
                    detalhe.style.display = 'block';
                }
            });

            watchID = navigator.geolocation.watchPosition(position => {
                const lat = position.coords.latitude;
                const lng = position.coords.longitude;
                const accuracy = position.coords.accuracy;
                const kmh = (position.coords.speed * 3.6 || 0);

                if (accuracy > 25) return;

                if (ultimaPos) {
                    const dist = calcularDistancia(ultimaPos.lat, ultimaPos.lng, lat, lng);
                    if (dist > 0.002) { 
                        odoTotal += dist; 
                        atualizarTelaOdo(); 
                        ultimaPos = { lat, lng }; 
                    }
                } else { ultimaPos = { lat, lng }; }

                document.getElementById('viewVel').innerText = kmh.toFixed(1);
                db.ref('posicoes/' + num).set({ lat, lng, vel: Math.round(kmh), ts: Date.now() });
            }, null, { enableHighAccuracy: true });
        }

        // --- 4. FUNÇÕES DE SEGURANÇA OFFLINE ---
        function baixarPlanilhaOffline() {
            if(dadosPlanilha.length === 0) return alert("Planilha vazia!");
            const blob = new Blob([JSON.stringify(dadosPlanilha)], { type: "application/json" });
            const a = document.createElement("a");
            a.href = URL.createObjectURL(blob);
            a.download = "backup_racekrono.json";
            a.click();
        }

        function importarPlanilhaOffline(input) {
            const file = input.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (e) => {
                try {
                    dadosPlanilha = JSON.parse(e.target.result);
                    localStorage.setItem('backup_planilha', JSON.stringify(dadosPlanilha));
                    renderizarPlanilha();
                    alert("✅ Importado com sucesso!");
                } catch (err) { alert("Erro no ficheiro!"); }
            };
            reader.readAsText(file);
        }

        // --- 5. INICIALIZAÇÃO ---
        document.getElementById('btnIniciar').onclick = function() {
            const num = document.getElementById('carro').value;
            if(!num) return alert("Digite o número do carro!");
            localStorage.setItem('rally_carro_ativo', num);
            iniciarFluxoRastreio(num);
        };

        window.onload = function() {
            const salvo = localStorage.getItem('rally_carro_ativo');
            if (salvo) iniciarFluxoRastreio(salvo);
        };

        function encerrarSessao() {
            if(confirm("Deseja encerrar a sessão? O progresso será limpo.")) {
                if(watchID) navigator.geolocation.clearWatch(watchID);
                localStorage.clear();
                location.reload();
            }
        }
    </script>
</body>
</html>
