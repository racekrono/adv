<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Gerador de Relatórios - Resolução Total</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/@turf/turf@6/turf.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

    <style>
        body { font-family: sans-serif; background: #121212; color: white; text-align: center; padding: 20px; }
        .ui-panel { background: #1e1e1e; padding: 20px; border-radius: 12px; border: 1px solid #e67e22; display: inline-block; min-width: 400px; margin-bottom: 20px; }
        .btn-group { display: flex; gap: 10px; justify-content: center; margin-top: 15px; }
        button { background: #e67e22; color: white; border: none; padding: 12px 20px; cursor: pointer; font-weight: bold; border-radius: 8px; }
        #status { margin-top: 10px; color: #ffcc00; font-size: 14px; }

        /* ÁREA DE IMPRESSÃO - CONFIGURAÇÃO DE ALTA COMPATIBILIDADE */
        #print-area { 
            position: absolute;
            left: 0;
            top: 0;
            width: 1000px;
            background: #121212;
            padding: 30px;
            box-sizing: border-box;
            transform: translateX(-2000px); /* Esconde para longe sem usar display:none */
        }
        
        .header { display: flex; justify-content: space-between; align-items: flex-end; border-bottom: 3px solid #e67e22; padding-bottom: 10px; margin-bottom: 20px; }
        .map-container { width: 940px; height: 600px; border-radius: 15px; border: 1px solid #333; background: #000; position: relative; }
        .footer-info { display: flex; gap: 20px; margin-top: 20px; text-align: left; }
        .stats-box { flex: 2; background: #1a1a1a; padding: 20px; border-radius: 10px; border-left: 6px solid #e67e22; font-size: 14px; }
        .legend-box { flex: 1; background: rgba(255,255,255,0.05); padding: 20px; border-radius: 10px; font-size: 12px; border: 1px solid #333; }
        .legend-item { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
    </style>
</head>
<body>

    <div class="ui-panel">
        <h2 style="color:#e67e22; margin:0;">🛰️ Relatório de Telemetria</h2>
        <div id="status">Aguardando comando...</div>
        <div class="btn-group">
            <button onclick="gerarRelatorios(true)">GERAR PDF ÚNICO</button>
            <button onclick="gerarRelatorios(false)" style="background:#444;">PDFs SEPARADOS</button>
        </div>
    </div>

    <div id="print-area">
        <div class="header">
            <div>
                <h1 style="color:#e67e22; margin:0; font-size: 32px;">Análise de Rastro</h1>
                <span style="color:#888;">Relatório Oficial de Prova</span>
            </div>
            <div id="pdf-carro" style="font-size: 24px; font-weight: bold;">Carro --</div>
        </div>
        <div id="map-temp" class="map-container"></div>
        <div class="footer-info">
            <div id="pdf-resumo" class="stats-box"></div>
            <div class="legend-box">
                <strong style="color:#e67e22">Dicionário:</strong><br><br>
                <div class="legend-item"><span style="color:#3498db; font-weight:bold;">━━</span> Rota Planejada</div>
                <div class="legend-item"><span style="color:#ffff00; font-size:18px;">●</span> Rastro Normal</div>
                <div class="legend-item"><span style="color:red; font-size:18px;">●</span> Excesso Velocidade</div>
                <div class="legend-item"><span style="color:#38a169; font-size:18px;">●</span> WP Validado</div>
                <div class="legend-item"><span style="color:#e74c3c; font-size:18px;">●</span> WP Perdido</div>
            </div>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBPJkehV9C1x0hiY5dQSwSRtVf5c4P2JGE",
            databaseURL: "https://cronometro-rally-default-rtdb.firebaseio.com"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // Configuração do mapa com PREFERCANVAS (Essencial para html2canvas não cortar)
        const map = L.map('map-temp', { 
            zoomControl: false, 
            attributionControl: false,
            preferCanvas: true 
        }).setView([0, 0], 13);
        
        L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}').addTo(map);
        const camadaElementos = L.featureGroup().addTo(map);

        async function gerarRelatorios(pdfUnico) {
            const status = document.getElementById('status');
            const snap = await db.ref('competidores').once('value');
            if(!snap.exists()) return;
            
            const carros = snap.val();
            const ids = Object.keys(carros);
            const { jsPDF } = window.jspdf;
            const docGeral = pdfUnico ? new jsPDF('p', 'mm', 'a4') : null;
            let primeiraPagina = true;

            for (let i = 0; i < ids.length; i++) {
                const id = ids[i];
                status.innerText = `Processando Carro ${id}...`;
                
                const canvas = await prepararECapturar(id, carros[id].nome);
                if (!canvas) continue;

                const imgData = canvas.toDataURL('image/jpeg', 0.85);
                if (pdfUnico) {
                    if (!primeiraPagina) docGeral.addPage();
                    docGeral.addImage(imgData, 'JPEG', 0, 0, 210, 297);
                    primeiraPagina = false;
                } else {
                    const docIndiv = new jsPDF('p', 'mm', 'a4');
                    docIndiv.addImage(imgData, 'JPEG', 0, 0, 210, 297);
                    docIndiv.save(`Relatorio_Carro_${id}.pdf`);
                }
            }

            if (pdfUnico) docGeral.save("Relatorio_Completo_Rally.pdf");
            status.innerHTML = "✅ CONCLUÍDO COM SUCESSO!";
        }

        async function prepararECapturar(id, nome) {
            camadaElementos.clearLayers();
            const [snapR, snapO] = await Promise.all([
                db.ref('rastros/' + id).once('value'),
                db.ref('configuracoes/percurso').once('value')
            ]);

            if (!snapR.exists()) return null;
            let rastro = Object.values(snapR.val()).sort((a,b) => a.ts - b.ts);
            let penTotal = 0, logs = "", infraMap = new Map();

            // Processamento igual ao rastro.html original
            if(snapO.exists()) {
                snapO.val().features.forEach(feat => {
                    if(feat.geometry.type === 'LineString') {
                        L.polyline(feat.geometry.coordinates.map(c => [c[1], c[0]]), {color: '#3498db', weight: 4, opacity: 0.5}).addTo(camadaElementos);
                    }
                    if(feat.properties?.type === 'circle') {
                        let visitou = rastro.some(p => (turf.distance(turf.point([p.lng, p.lat]), turf.point(feat.geometry.coordinates))*1000) <= (feat.properties.radius || 50));
                        L.circle([feat.geometry.coordinates[1], feat.geometry.coordinates[0]], { radius: feat.properties.radius || 50, color: visitou ? '#38a169' : '#e74c3c', fillOpacity: 0.2, weight: 2 }).addTo(camadaElementos);
                        if(!visitou) { penTotal += 2000; logs += "❌ WP Perdido (-2000 pts)<br>"; }
                    }
                    else if(feat.geometry.type.includes('Polygon')) {
                        const vMax = (feat.properties.velocidade || 60) * 1.1;
                        let tempoExcesso = 0;
                        rastro.forEach((p, i) => {
                            if(i > 0) {
                                const dur = p.ts - rastro[i-1].ts;
                                if(dur < 30000 && p.vel > vMax && turf.booleanPointInPolygon(turf.point([p.lng, p.lat]), feat)) {
                                    tempoExcesso += dur;
                                    infraMap.set(p.ts, true);
                                }
                            }
                        });
                        if(tempoExcesso > 10000) {
                            let pts = (Math.floor((tempoExcesso - 10000) / 10000) + 1) * 500;
                            penTotal += pts;
                            logs += `⚠️ Radar: Excesso (${Math.round(tempoExcesso/1000)}s) -${pts} pts<br>`;
                        }
                    }
                });
            }

            rastro.forEach((p, i) => {
                let infra = infraMap.has(p.ts);
                if(infra || i % 3 === 0) {
                    L.circleMarker([p.lat, p.lng], { radius: infra ? 5 : 2.5, color: infra ? 'red' : '#ffff00', fillOpacity: 0.8, weight: 1 }).addTo(camadaElementos);
                }
            });

            document.getElementById('pdf-carro').innerText = `Carro ${id} - ${nome}`;
            document.getElementById('pdf-resumo').innerHTML = `<strong>Resumo de Penalidades</strong><hr>${logs || "✅ Sem infrações."}<br><b>Total: -${penTotal} pts</b>`;

            // AJUSTE DE RENDERIZAÇÃO FORÇADA
            map.invalidateSize();
            map.fitBounds(camadaElementos.getBounds(), { padding: [50, 50], animate: false });

            // Tempo para garantir que o Canvas do Leaflet desenhou tudo
            await new Promise(res => setTimeout(res, 5000));

            return await html2canvas(document.getElementById('print-area'), { 
                useCORS: true, 
                backgroundColor: "#121212", 
                scale: 2,
                width: 1000, // Força a largura do canvas ignorando a tela
                height: 1200,
                x: 0,
                y: 0
            });
        }
    </script>
</body>
</html>
