<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Painel Admin Rally - Oficial</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet.draw/1.0.4/leaflet.draw.css"/>
    <style>
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; height: 100%; width: 100%; background: #1a202c; font-family: sans-serif; display: flex; flex-direction: column; }
    
    #toolbar { 
        background: #2d3748; 
        display: flex; 
        flex-wrap: wrap; 
        padding: 10px; 
        gap: 15px; 
        z-index: 9999; 
        position: relative;
        border-bottom: 1px solid #4a5568;
    }

    .button-group {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        align-items: center;
        background: rgba(255,255,255,0.05);
        padding: 8px;
        border-radius: 8px;
    }

    #map { flex-grow: 1; width: 100%; background: #a0aec0; }

    button {
        padding: 8px 15px;
        border: none;
        border-radius: 5px;
        color: white;
        cursor: pointer;
        font-weight: bold;
        font-size: 13px;
        transition: opacity 0.2s;
    }

    button:hover { opacity: 0.8; }

    .btn-danger { background: #e53e3e; }
    .btn-success { background: #38a169; }
    .btn-nav { background: #4a5568; }
    .btn-backup { background: #2b6cb0; }
    .btn-restore { background: #805ad5; }

    #status-indicador {
        padding: 5px 10px;
        border-radius: 20px;
        font-size: 12px;
        text-transform: uppercase;
    }
    </style>
</head>
<body>

<div id="toolbar">
    <div class="button-group">
        <button class="btn-nav" onclick="window.location.href='index.html'">🏠 Início</button>
        <button class="btn-nav" onclick="window.location.href='resultados.html'">🏆 Ranking</button>
        <button class="btn-nav" onclick="window.location.href='tempos.html'">⏱️ Tempos</button>
        <button class="btn-nav" onclick="window.location.href='fotos.html'">📸 Fotos</button>
        <button class="btn-nav" onclick="window.location.href='penalizacoes.html'">⚠️ Penalizar</button>
    </div>

    <div class="button-group">
        <button id="btn-status-prova" class="btn-success" onclick="alternarStatusProva()">Carregando...</button>
        <button class="btn-danger" onclick="logoffGeral()">🔴 Logoff Geral</button>
        <button class="btn-danger" onclick="excluirTodosCarros()">🔥 Limpar Banco</button>
    </div>

    <div class="button-group">
        <button class="btn-backup" onclick="exportarBackup()">📤 Exportar Backup</button>
        <button class="btn-restore" onclick="document.getElementById('importFile').click()">📥 Importar Backup</button>
        <input type="file" id="importFile" style="display: none;" onchange="importarBackup(event)" accept=".json">
    </div>
</div>

<div id="map"></div>

<script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet.draw/1.0.4/leaflet.draw.js"></script>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyBPJkehV9C1x0hiY5dQSwSRtVf5c4P2JGE",
        databaseURL: "https://cronometro-rally-default-rtdb.firebaseio.com",
        projectId: "cronometro-rally"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // Inicialização do Mapa
    const map = L.map('map').setView([-12.25, -38.95], 13);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

    // Controle de Status da Prova
    function monitorarStatus() {
        db.ref('configuracoes/provaAberta').on('value', snap => {
            const aberta = snap.val();
            const btn = document.getElementById('btn-status-prova');
            btn.innerText = aberta ? "🟢 PROVA ABERTA" : "🔴 PROVA FECHADA";
            btn.style.background = aberta ? "#38a169" : "#e53e3e";
        });
    }
    monitorarStatus();

    window.alternarStatusProva = function() {
        const ref = db.ref('configuracoes/provaAberta');
        ref.once('value', snap => { ref.set(!snap.val()); });
    };

    window.excluirTodosCarros = async function() {
        const senha = prompt("SENHA PARA DELETAR TODOS OS CARROS:");
        if (senha === "261291") {
            if (confirm("ATENÇÃO: Isso apagará TODOS os competidores, rastros e tempos. Confirmar?")) {
                const paths = ['competidores', 'posicoes', 'rastros', 'tempos'];
                await Promise.all(paths.map(path => db.ref(path).remove()));
                alert("🔥 Todos os dados foram removidos!");
                location.reload();
            }
        } else if (senha !== null) {
            alert("Senha incorreta!");
        }
    };

    window.logoffGeral = function() {
        const senha = prompt("DIGITE A SENHA PARA LOGOFF GERAL:");
        if (senha === "261291") {
            if (confirm("Isso forçará a saída de todos os pilotos agora. Continuar?")) {
                db.ref('configuracoes/comandoLogoff').set(Date.now()).then(() => {
                    alert("Sinal de logoff enviado!");
                });
            }
        } else if (senha !== null) {
            alert("Senha incorreta!");
        }
    };

    // --- FUNÇÕES DE BACKUP ---

    window.exportarBackup = function() {
        db.ref('/').once('value').then(snapshot => {
            const data = snapshot.val();
            const jsonStr = JSON.stringify(data, null, 2);
            const blob = new Blob([jsonStr], { type: "application/json" });
            const url = URL.createObjectURL(blob);
            
            const a = document.createElement('a');
            const dataAtual = new Date().toISOString().split('T')[0];
            a.href = url;
            a.download = `backup_racekrono_${dataAtual}.json`;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
        }).catch(err => alert("Erro ao exportar: " + err));
    };

    window.importarBackup = function(event) {
        const file = event.target.files[0];
        if (!file) return;

        const reader = new FileReader();
        reader.onload = function(e) {
            try {
                const json = JSON.parse(e.target.result);
                const confirmacao = confirm("⚠️ ATENÇÃO: Isso irá SOBRESCREVER todos os dados atuais do banco pelo arquivo de backup. Deseja continuar?");
                
                if (confirmacao) {
                    const senha = prompt("Digite a senha de administrador para confirmar a restauração:");
                    if (senha === "261291") {
                        db.ref('/').set(json).then(() => {
                            alert("✅ Backup restaurado com sucesso! A página será recarregada.");
                            location.reload();
                        });
                    } else {
                        alert("Senha incorreta!");
                    }
                }
            } catch (err) {
                alert("Erro ao ler o arquivo JSON: " + err);
            }
        };
        reader.readAsText(file);
    };
</script>

</body>
</html>
