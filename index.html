<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Race Krono</title>

    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0d0af0">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Race Krono">
    <link rel="apple-touch-icon" href="https://raw.githubusercontent.com/racekrono/adv/refs/heads/main/Logo.png">

    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    
    <style>
        body { font-family: sans-serif; background: #121212; color: white; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; overflow: hidden; }
        .card { background: #1e1e1e; padding: 20px; border-radius: 12px; width: 95%; max-width: 380px; box-shadow: 0 8px 32px rgba(0,0,0,0.5); border-top: 5px solid #ffffff; display: flex; flex-direction: column; max-height: 98vh; }
        .logo { display: block; margin: 0 auto 10px auto; max-width: 100px; height: auto; }
        
        input, select, button { width: 100%; padding: 14px; margin-bottom: 15px; border-radius: 8px; border: 1px solid #333; background: #252525; color: white; font-size: 16px; box-sizing: border-box; }
        button { background: #f80303; border: none; font-weight: bold; cursor: pointer; }

        #setup { display: block; } 
        #ativo { display: none; flex-direction: column; width: 100%; }
        
        /* Ajuste do Cabeçalho para reaparecer */
        .header-dados { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px solid #333; margin-bottom: 10px; }
        #viewCarro { color: #ffffff; font-size: 1.2rem; font-weight: bold; }
        .vel-box { text-align: right; }
        #viewVel { font-size: 2.5rem; font-weight: bold; color: #f1c40f; line-height: 1; }
        .unidade-kmh { color: #888; font-size: 10px; font-weight: bold; display: block; }

        .odo-box { padding: 10px; background: rgba(0,0,0,0.2); border-radius: 10px; margin-bottom: 10px; display: flex; flex-direction: column; align-items: center; }
        .odo-label { font-size: 10px; color: #888; text-transform: uppercase; }
        .odo-val { font-size: 4.5rem; font-weight: bold; color: #f1c40f; font-family: monospace; line-height: 1; text-align: center; width: 100%; cursor: pointer; }
        
        .odo-btns { display: flex; gap: 4px; justify-content: center; width: 100%; margin-top: 5px; }
        .btn-mini { padding: 10px 2px; font-size: 11px; background: #333; margin-bottom: 0; flex: 1; color: white; border-radius: 4px; border: 1px solid #444; }

        /* Roadbook reduzido para 3 referências */
        .roadbook-container { 
            background: #000; 
            border-radius: 8px; 
            overflow-y: auto; 
            border: 2px solid #333; 
            height: 240px; /* Altura ajustada para mostrar ~3 itens */
            margin-bottom: 10px; 
            scroll-behavior: smooth; 
            position: relative; 
        }
        .roadbook-item { display: flex; align-items: center; border-bottom: 1px solid #222; padding: 12px 8px; gap: 10px; min-height: 80px; box-sizing: border-box; transition: 0.3s; }
        .rb-col-km { flex: 0 0 65px; font-family: monospace; font-weight: bold; color: #f1c40f; font-size: 16px; text-align: right; }
        .rb-col-tulipa { flex: 0 0 80px; background: white; padding: 4px; border-radius: 4px; display: flex; justify-content: center; align-items: center; height: 60px; }
        .rb-col-tulipa img { max-width: 100%; max-height: 100%; }
        .rb-col-obs { flex: 1; font-size: 12px; color: #eee; text-transform: uppercase; font-weight: bold; }

        .status-gps { color: #2ecc71; font-weight: bold; font-size: 11px; text-align: center; padding: 5px; }
        .btn-sair { background: transparent; color: #555; font-size: 10px; text-decoration: underline; border: none; width: 100%; }
    </style>
</head>
<body>

    <div class="card">
        <div id="setup">
            <img src="https://raw.githubusercontent.com/racekrono/adv/refs/heads/main/Logo.png" class="logo">
            <input type="text" id="nome" placeholder="Piloto">
            <input type="number" id="carro" placeholder="Nº Carro">
            <select id="categoria">
                <option>UTV</option><option>4x2</option><option>4x4</option>
            </select>
            <button id="btnIniciar">INICIAR</button>
        </div>

        <div id="ativo">
            <div class="header-dados">
                <span id="viewCarro">Carro --</span>
                <div class="vel-box">
                    <span id="viewVel">0.0</span>
                    <span class="unidade-kmh">KM/H</span>
                </div>
            </div>

            <div class="odo-box">
                <span class="odo-label">Odômetro</span>
                <div id="displayOdo" class="odo-val" onclick="ajusteManualOdo()">0.000</div>
                <div class="odo-btns">
                    <button class="btn-mini" onclick="alterarOdo(-0.010)">-10m</button>
                    <button class="btn-mini" onclick="zerarOdo()" style="background:#b30000;">ZERAR</button>
                    <button class="btn-mini" onclick="alterarOdo(0.010)">+10m</button>
                </div>
            </div>

            <div class="roadbook-container" id="roadbookList">
                <div style="padding: 20px; text-align: center; color: #444;">CARREGANDO...</div>
            </div>
            
            <div id="msgGps" class="status-gps">● GPS ATIVO</div>
            <button class="btn-sair" onclick="encerrarSessao()">Sair</button>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBPJkehV9C1x0hiY5dQSwSRtVf5c4P2JGE",
            authDomain: "cronometro-rally.firebaseapp.com",
            databaseURL: "https://cronometro-rally-default-rtdb.firebaseio.com",
            projectId: "cronometro-rally",
            appId: "1:341731891354:web:d0c34265be68015e98a723"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let watchID = null;
        let odoTotal = 0;
        let ultimaPos = null;

        window.onload = function() {
            const salvo = localStorage.getItem('rally_carro_ativo');
            if (salvo) { iniciarFluxoRastreio(salvo); carregarRoadbook(); }
        };

        function carregarRoadbook() {
            const rbList = document.getElementById('roadbookList');
            db.ref('prova_atual').on('value', (snap) => {
                const dados = snap.val();
                if (!dados) return;
                rbList.innerHTML = '';
                dados.forEach((item) => {
                    const div = document.createElement('div');
                    div.className = 'roadbook-item';
                    div.setAttribute('data-km', item.km);
                    div.innerHTML = `
                        <div class="rb-col-km">${parseFloat(item.km).toFixed(3)}</div>
                        <div class="rb-col-tulipa"><img src="${item.tulipa || ''}"></div>
                        <div class="rb-col-obs">${item.obs || ''}</div>
                    `;
                    rbList.appendChild(div);
                });
                atualizarTelaOdo();
            });
        }

        function atualizarTelaOdo() {
            document.getElementById('displayOdo').innerText = odoTotal.toFixed(3);
            const itens = document.querySelectorAll('.roadbook-item');
            let atual = null;

            itens.forEach(item => {
                item.style.background = "transparent";
                if (parseFloat(item.getAttribute('data-km')) <= odoTotal) atual = item;
            });

            if (atual) {
                atual.style.background = "rgba(241, 196, 15, 0.2)";
                atual.scrollIntoView({ behavior: 'smooth', block: 'center' });
            }
        }

        function iniciarFluxoRastreio(num) {
            document.getElementById('setup').style.display = 'none';
            document.getElementById('ativo').style.display = 'flex';
            document.getElementById('viewCarro').innerText = "Carro " + num;

            watchID = navigator.geolocation.watchPosition(pos => {
                const lat = pos.coords.latitude;
                const lng = pos.coords.longitude;
                const kmh = Math.round((pos.coords.speed || 0) * 3.6);
                
                if (ultimaPos) {
                    const d = calcularDist(ultimaPos.lat, ultimaPos.lng, lat, lng);
                    if (d > 0.002) { odoTotal += d; atualizarTelaOdo(); ultimaPos = {lat, lng}; }
                } else { ultimaPos = {lat, lng}; }

                document.getElementById('viewVel').innerText = kmh.toFixed(1);
                db.ref('posicoes/' + num).set({ lat, lng, vel: kmh, ts: Date.now() });
            }, null, { enableHighAccuracy: true });
        }

        function calcularDist(lat1, lon1, lat2, lon2) {
            const R = 6371;
            const dLat = (lat2-lat1)*Math.PI/180;
            const dLon = (lon2-lon1)*Math.PI/180;
            const a = Math.sin(dLat/2)**2 + Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLon/2)**2;
            return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
        }

        document.getElementById('btnIniciar').onclick = function() {
            const n = document.getElementById('carro').value;
            if(!n) return alert("Número!");
            localStorage.setItem('rally_carro_ativo', n);
            iniciarFluxoRastreio(n);
            carregarRoadbook();
        };

        function alterarOdo(v) { odoTotal = Math.max(0, odoTotal + v); atualizarTelaOdo(); }
        function zerarOdo() { if(confirm("Zerar?")) { odoTotal = 0; atualizarTelaOdo(); } }
        function ajusteManualOdo() {
            let n = prompt("KM:", odoTotal.toFixed(3));
            if(n) { odoTotal = parseFloat(n.replace(',','.')); atualizarTelaOdo(); }
        }
        function encerrarSessao() { localStorage.removeItem('rally_carro_ativo'); location.reload(); }
    </script>
</body>
</html>
