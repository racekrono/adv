<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Race Krono - Digital</title>

    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0d0af0">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Race Krono">
    <link rel="apple-touch-icon" href="https://raw.githubusercontent.com/racekrono/adv/refs/heads/main/Logo.png">

    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    
    <style>
        body { font-family: sans-serif; background: #121212; color: white; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; overflow: hidden; }
        .card { background: #1e1e1e; padding: 20px; border-radius: 12px; width: 95%; max-width: 400px; box-shadow: 0 8px 32px rgba(0,0,0,0.5); border-top: 5px solid #ffffff; z-index: 10; max-height: 90vh; overflow-y: auto; }
        .logo { display: block; margin: 0 auto 15px auto; max-width: 120px; height: auto; }
        input, select, button { width: 100%; padding: 12px; margin-bottom: 12px; border-radius: 8px; border: 1px solid #333; background: #252525; color: white; font-size: 16px; box-sizing: border-box; }
        button { background: #f80303; border: none; font-weight: bold; cursor: pointer; }
        
        /* Estilos da Planilha */
        .planilha-container { margin-top: 15px; border: 1px solid #333; border-radius: 8px; background: #000; height: 120px; overflow-y: auto; font-family: monospace; font-size: 13px; }
        .linha-csv { display: flex; justify-content: space-between; padding: 8px; border-bottom: 1px solid #222; color: #666; }
        .linha-ativa { background: #f1c40f; color: #000; font-weight: bold; }
        
        .odo-val { font-size: 4rem; font-weight: bold; color: #f1c40f; margin: 2px 0; font-family: monospace; text-align: center;}
        .status-gps { color: #2ecc71; font-weight: bold; font-size: 14px; text-align: center;}
        .btn-mini { padding: 10px; background: #333; width: auto; flex: 1; }
        label { display: block; font-size: 12px; color: #888; margin-bottom: 5px; text-transform: uppercase; }
    </style>
</head>
<body>

    <div class="card">
        <div id="setup">
            <img src="https://raw.githubusercontent.com/racekrono/adv/refs/heads/main/Logo.png" class="logo">
            <input type="text" id="nome" placeholder="Nome do Piloto">
            <select id="categoria">
                <option>UTV</option>
                <option>BAIANO 4x2</option><option>BAIANO 4x4</option>
            </select>
            <input type="number" id="carro" placeholder="Nº do Carro">
            
            <label>Planilha Digital (CSV)</label>
            <input type="file" id="csvFile" accept=".csv" style="font-size: 12px;">
            
            <button id="btnIniciar">INICIAR PROVA</button>
        </div>

        <div id="ativo" style="display:none; text-align: center;">
            <h2 id="viewCarro" style="color:#0d0af0; margin: 0;">Carro --</h2>
            <div id="viewVel" style="font-size: 1.5rem; font-weight: bold;">0.0</div>
            <p style="margin: 0; color: #888; font-size: 10px;">KM/H</p>

            <div id="displayOdo" class="odo-val" onclick="ajusteManualOdo()">0.000</div>
            
            <div style="display:flex; gap:5px; margin-bottom: 15px;">
                <button class="btn-mini" onclick="alterarOdo(-0.010)">-10m</button>
                <button class="btn-mini" onclick="zerarOdo()" style="background:#b30000;">ZERAR</button>
                <button class="btn-mini" onclick="alterarOdo(0.010)">+10m</button>
            </div>

            <div class="planilha-container" id="listaCsv">
                <div style="padding: 20px; color: #444;">Nenhuma planilha carregada</div>
            </div>
            
            <div id="msgGps" class="status-gps" style="margin-top:10px;">● CONECTANDO...</div>
            <button onclick="encerrarSessao()" style="background:transparent; color:#444; font-size:11px; text-decoration:underline; border:none; margin-top:10px;">Sair</button>
        </div>
    </div>

    <script>
        // Configuração Firebase (Mantida do seu original)
        const firebaseConfig = {
            apiKey: "AIzaSyBPJkehV9C1x0hiY5dQSwSRtVf5c4P2JGE",
            authDomain: "cronometro-rally.firebaseapp.com",
            databaseURL: "https://cronometro-rally-default-rtdb.firebaseio.com",
            projectId: "cronometro-rally",
            appId: "1:341731891354:web:d0c34265be68015e98a723"
        };
        const app = firebase.initializeApp(firebaseConfig);
        const db = firebase.database(app);

        let odoTotal = 0;
        let watchID = null;
        let ultimaPos = null;
        let dadosPlanilha = [];

        // --- LÓGICA DO CSV ---
        document.getElementById('csvFile').addEventListener('change', function(e) {
            const file = e.target.files[0];
            const reader = new FileReader();
            reader.onload = function(event) {
                const text = event.target.result;
                processarCSV(text);
            };
            reader.readAsText(file);
        });

        function processarCSV(texto) {
            const linhas = texto.split('\n');
            dadosPlanilha = linhas.map(linha => {
                const colunas = linha.split(',');
                return { km: parseFloat(colunas[0]), desc: colunas[1] || '' };
            }).filter(item => !isNaN(item.km));
            
            renderizarPlanilha();
        }

        function renderizarPlanilha() {
            const container = document.getElementById('listaCsv');
            container.innerHTML = dadosPlanilha.map((item, index) => `
                <div class="linha-csv" id="tulipa-${index}">
                    <span>KM: ${item.km.toFixed(3)}</span>
                    <span>${item.desc}</span>
                </div>
            `).join('');
        }

        function atualizarDestaquePlanilha() {
            if (dadosPlanilha.length === 0) return;
            
            let indiceAtivo = 0;
            // Encontra a linha mais próxima do KM atual que o piloto já passou
            for (let i = 0; i < dadosPlanilha.length; i++) {
                if (odoTotal >= dadosPlanilha[i].km) {
                    indiceAtivo = i;
                } else {
                    break;
                }
            }

            // Remove destaques anteriores e aplica no novo
            document.querySelectorAll('.linha-csv').forEach(el => el.classList.remove('linha-ativa'));
            const elementoAtivo = document.getElementById(`tulipa-${indiceAtivo}`);
            if (elementoAtivo) {
                elementoAtivo.classList.add('linha-ativa');
                elementoAtivo.scrollIntoView({ behavior: 'smooth', block: 'center' });
            }
        }

        // --- LÓGICA DE NAVEGAÇÃO (ADAPTADA DO SEU ORIGINAL) ---
        function alterarOdo(v) { 
            odoTotal = Math.max(0, odoTotal + v); 
            atualizarTelaOdo(); 
        }

        function zerarOdo() { 
            if(confirm("Zerar odômetro?")) { odoTotal = 0; atualizarTelaOdo(); } 
        }

        function atualizarTelaOdo() { 
            document.getElementById('displayOdo').innerText = odoTotal.toFixed(3); 
            atualizarDestaquePlanilha(); // Vincula a planilha ao odômetro
        }

        function calcularDistancia(lat1, lon1, lat2, lon2) {
            const R = 6371; 
            const dLat = (lat2 - lat1) * Math.PI / 180;
            const dLon = (lon2 - lon1) * Math.PI / 180;
            const a = Math.sin(dLat/2) * Math.sin(dLat/2) + Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) * Math.sin(dLon/2) * Math.sin(dLon/2);
            return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a)); 
        }

        function iniciarFluxoRastreio(num) {
            document.getElementById('setup').style.display = 'none';
            document.getElementById('ativo').style.display = 'block';
            document.getElementById('viewCarro').innerText = "Carro " + num;

            watchID = navigator.geolocation.watchPosition(position => {
                const { latitude: lat, longitude: lng, accuracy, speed } = position.coords;
                const kmh = Math.round((speed || 0) * 3.6);

                if (accuracy <= 20) {
                    if (ultimaPos) {
                        const dist = calcularDistancia(ultimaPos.lat, ultimaPos.lng, lat, lng);
                        if (dist > 0.002) { // Incremento mínimo de 2 metros
                            odoTotal += dist;
                            atualizarTelaOdo();
                            ultimaPos = { lat, lng };
                        }
                    } else {
                        ultimaPos = { lat, lng };
                    }
                }

                document.getElementById('viewVel').innerText = kmh.toFixed(1);
                db.ref('posicoes/' + num).set({ lat, lng, vel: kmh, ts: Date.now() });

            }, null, { enableHighAccuracy: true });
        }

        document.getElementById('btnIniciar').onclick = function() {
            const num = document.getElementById('carro').value;
            if(!num) return alert("Informe o número!");
            iniciarFluxoRastreio(num);
        };

        function encerrarSessao() {
            if(confirm("Sair?")) location.reload();
        }
    </script>
</body>
</html>
