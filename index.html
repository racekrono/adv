<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Race Krono</title>

    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0d0af0">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Race Krono">
    <link rel="apple-touch-icon" href="https://raw.githubusercontent.com/racekrono/adv/refs/heads/main/Logo.png">
    <meta name="mobile-web-app-capable" content="yes">

    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    
    <style>
        body { font-family: sans-serif; background: #121212; color: white; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; overflow: hidden; }
        .card { background: #1e1e1e; padding: 20px; border-radius: 12px; width: 95%; max-width: 400px; box-shadow: 0 8px 32px rgba(0,0,0,0.5); border-top: 5px solid #ffffff; z-index: 10; }
        .logo { display: block; margin: 0 auto 15px auto; max-width: 120px; height: auto; }
        input, select, button { width: 100%; padding: 14px; margin-bottom: 12px; border-radius: 8px; border: 1px solid #333; background: #252525; color: white; font-size: 16px; box-sizing: border-box; }
        button { background: #f80303; border: none; font-weight: bold; cursor: pointer; transition: 0.3s; }
        button:active { transform: scale(0.98); }
        
        /* Tela de rastreio ativa */
        .tracking { text-align: center; display: none; }
        
        .header-dados {
            display: flex;
            justify-content: center;
            align-items: baseline;
            gap: 15px;
            margin-bottom: 5px;
        }

        #viewCarro { color: #ffffff; margin: 0; font-size: 1.2rem; font-weight: bold; }
        #viewVel { font-size: 3rem; font-weight: bold; line-height: 1; color: #f1c40f; }
        .unidade-kmh { color: #888; font-size: 12px; font-weight: bold; }

        /* Odómetro */
        .odo-box { margin-top: 10px; padding: 10px; border-top: 1px solid #333; background: rgba(0,0,0,0.2); border-radius: 10px; }
        .odo-label { font-size: 10px; color: #888; text-transform: uppercase; }
        .odo-val { font-size: 4.5rem; font-weight: bold; color: #f1c40f; margin: 0; cursor: pointer; font-family: monospace; }
        .odo-btns { display: flex; gap: 5px; justify-content: center; }
        .btn-mini { padding: 10px 5px; font-size: 12px; background: #333; margin-bottom: 0; width: auto; flex: 1; border: 1px solid #444; color: white; border-radius: 4px; }

        /* Roadbook / Planilha */
        .roadbook-container {
            margin-top: 15px;
            background: #000;
            border: 2px solid #444;
            border-radius: 8px;
            height: 250px;
            overflow-y: auto;
            display: block;
        }
        .item-planilha { display: flex; align-items: center; border-bottom: 1px solid #222; padding: 10px 5px; transition: background 0.3s; }
        .item-planilha.active { background: #2d3748; border-left: 6px solid #f1c40f; }
        .col-km { width: 22%; font-family: monospace; font-size: 1.1rem; color: #ffffff; font-weight: bold; text-align: left; }
        .col-tulipa { width: 28%; text-align: center; }
        .col-tulipa img { width: 55px; filter: invert(1); }
        .col-info { width: 50%; font-size: 12px; text-align: left; padding-left: 8px; color: #bbb; }
        .media-val { color: #f1c40f; font-weight: bold; display: block; font-size: 14px; }

        /* Status e Rodapé */
        .status-container { margin-top: 10px; padding: 8px; border-radius: 8px; background: rgba(0,0,0,0.3); }
        .status-gps { color: #2ecc71; font-weight: bold; font-size: 13px; }
        .status-offline { color: #f1c40f !important; }
        .btn-sair { background: transparent; color: #444; font-size: 11px; margin-top: 10px; text-decoration: underline; border: none; cursor: pointer; }
    </style>
</head>
<body>

    <div class="card">
        <div id="setup">
            <img src="https://raw.githubusercontent.com/racekrono/adv/refs/heads/main/Logo.png" class="logo">
            <input type="text" id="nome" placeholder="Nome do Piloto">
            <select id="categoria">
                <option>UTV</option><option>BAIANO 4x2</option><option>BAIANO 4x4</option>
                <option>INICIANTE 4x2</option><option>INICIANTE 4x4</option><option>ANTIGOS</option>
            </select>
            <input type="number" id="carro" placeholder="Nº do Carro">
            <button id="btnIniciar">INICIAR PROVA</button>
        </div>

        <div id="ativo" class="tracking">
            <div class="header-dados">
                <span id="viewCarro">Carro --</span>
                <div id="viewVel">0.0</div>
                <span class="unidade-kmh">KM/H</span>
            </div>

            <div class="odo-box">
                <span class="odo-label">Odômetro</span>
                <div id="displayOdo" class="odo-val" onclick="ajusteManualOdo()">0.000</div>
                <div class="odo-btns">
                    <button class="btn-mini" onclick="alterarOdo(-0.010)">-10m</button>
                    <button class="btn-mini" onclick="alterarOdo(-0.001)">-1m</button>
                    <button class="btn-mini" onclick="zerarOdo()" style="background:#b30000;">ZERAR</button>
                    <button class="btn-mini" onclick="alterarOdo(0.001)">+1m</button>
                    <button class="btn-mini" onclick="alterarOdo(0.010)">+10m</button>
                </div>
            </div>

            <div id="planilhaDigital" class="roadbook-container"></div>
            
            <div class="status-container">
                <div id="msgGps" class="status-gps">● CONECTANDO...</div>
            </div>
            <button class="btn-sair" onclick="encerrarSessao()">Sair</button>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBPJkehV9C1x0hiY5dQSwSRtVf5c4P2JGE",
            authDomain: "cronometro-rally.firebaseapp.com",
            databaseURL: "https://cronometro-rally-default-rtdb.firebaseio.com",
            projectId: "cronometro-rally",
            appId: "1:341731891354:web:d0c34265be68015e98a723"
        };
        const app = firebase.initializeApp(firebaseConfig);
        const db = firebase.database(app);

        let odoTotal = 0;
        let ultimaPos = null;
        let watchID = null;
        let listaPlanilha = [];

        // Sincroniza Planilha
        db.ref('configuracoes/planilha').on('value', snap => {
            const dados = snap.val();
            if (dados) {
                listaPlanilha = Object.values(dados);
                renderizarPlanilha();
            }
        });

        function renderizarPlanilha() {
            const container = document.getElementById('planilhaDigital');
            container.innerHTML = listaPlanilha.map((item, index) => `
                <div class="item-planilha" id="item-${index}">
                    <div class="col-km">${parseFloat(item.km).toFixed(3)}</div>
                    <div class="col-tulipa"><img src="${item.tulipa}"></div>
                    <div class="col-info">
                        <span class="media-val">${item.media || '--'}</span>
                        <span>${item.obs || ''}</span>
                    </div>
                </div>
            `).join('');
        }

        function alterarOdo(v) { odoTotal = Math.max(0, odoTotal + v); atualizarTelaOdo(); }
        function zerarOdo() { if(confirm("Zerar?")) { odoTotal = 0; atualizarTelaOdo(); } }

        function atualizarTelaOdo() {
            document.getElementById('displayOdo').innerText = odoTotal.toFixed(3);
            if (listaPlanilha.length > 0) {
                let indexAtivo = 0;
                for (let i = 0; i < listaPlanilha.length; i++) {
                    if (odoTotal >= listaPlanilha[i].km) indexAtivo = i;
                    else
