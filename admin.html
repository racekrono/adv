<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Painel Admin Rally - Oficial</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet.draw/1.0.4/leaflet.draw.css"/>
    <style>
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; height: 100%; width: 100%; background: #1a202c; font-family: sans-serif; display: flex; flex-direction: column; }
    
    #toolbar { 
        background: #2d3748; 
        display: flex; 
        flex-wrap: wrap; 
        padding: 10px; 
        gap: 15px; 
        z-index: 9999; 
        position: relative;
        border-bottom: 1px solid #4a5568;
    }

    .button-group {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        align-items: center;
        background: rgba(255,255,255,0.05);
        padding: 8px;
        border-radius: 8px;
    }

    #map { flex-grow: 1; width: 100%; background: #a0aec0; }

    button {
        padding: 8px 12px;
        background: #4a5568;
        color: white;
        border: none;
        border-radius: 4px;
        cursor: pointer;
        font-weight: bold;
        font-size: 11px;
    }

    button:hover { filter: brightness(1.2); }

    input, select {
        padding: 8px;
        border-radius: 4px;
        border: none;
        background: #1a202c;
        color: white;
        font-size: 11px;
    }

    .marker-label {
        background: #ed8936;
        border: 2px solid white;
        border-radius: 50%;
        color: white;
        font-weight: bold;
        text-align: center;
        line-height: 26px;
        width: 30px;
        height: 30px;
    }
    </style>
</head>
<body>

    <div id="toolbar">
        <div class="button-group">
            <input type="text" id="coordsInput" placeholder="Lat, Lng">
            <button onclick="adicionarPontoNaLinha()">📍 Add Ponto</button>
            <button onclick="finalizarLinhaManual()" style="background: #2b6cb0;">✏️ Criar Linha</button>
            <button onclick="limparTemporarios()">🗑️ Limpar</button>
        </div>

        <div class="button-group">
            <input type="text" id="cityInput" placeholder="Buscar Cidade...">
            <button onclick="buscar()">🔍</button>
            <button onclick="salvar()" style="background: #38a169;">💾 Salvar Trajeto</button>
            <button id="btnStatusProva" onclick="alternarStatusProva()">...</button>
            <button onclick="logoffGeral()" style="background: #742a2a;">🚫 Logoff Carros</button>
            <button onclick="excluirTodosCarros()" style="background: #e53e3e;">💀 Excluir Carros</button>
        </div>

        <div class="button-group">
            <button onclick="window.location.href='rastro.html'" style="background: #805ad5;">🗺️ Rastro</button>
            <button onclick="processarPenalidadesGeral()" style="background: #dd6b20;">🏁 Rodar Apuração</button>
            <button onclick="window.location.href='tempos.html'" style="background: #2c7a7b;">⏱️ Tempos de Prova</button>
            <button onclick="window.location.href='fotos.html'" style="background: #3182ce;">📸 Pontuação Fotos</button>
            <button onclick="window.location.href='ranking-geral.html'" style="background: #b7791f;">🏆 Ranking Final</button>
        </div>

        <div class="button-group">
            <select id="carSelector"><option value="">Carro...</option></select>
            <button onclick="excluirCarro()">🗑️</button>  
            <button onclick="resetar()" style="background: #000; color: red;">Reset Total</button>
        </div>
    </div>

    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet.draw/1.0.4/leaflet.draw.js"></script>
    <script src="https://unpkg.com/@turf/turf@6/turf.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>

    <script>
    const firebaseConfig = {
        apiKey: "AIzaSyBPJkehV9C1x0hiY5dQSwSRtVf5c4P2JGE",
        authDomain: "cronometro-rally.firebaseapp.com",
        databaseURL: "https://cronometro-rally-default-rtdb.firebaseio.com",
        projectId: "cronometro-rally",
        appId: "1:341731891354:web:d0c34265be68015e98a723"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let map, drawnItems, pontosTemporarios = [], linhaTemporaria;

    function initMap() {
        map = L.map('map').setView([-12.26, -38.96], 13);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
        
        drawnItems = new L.FeatureGroup().addTo(map);
        map.addControl(new L.Control.Draw({
            edit: { featureGroup: drawnItems },
            draw: { polyline: true, polygon: true, circle: true, rectangle: false, marker: false }
        }));

        linhaTemporaria = L.polyline([], {color: 'yellow', dashArray: '5, 5'}).addTo(map);

        map.on(L.Draw.Event.CREATED, (e) => {
            const layer = e.layer;
            if (e.layerType === 'polygon') {
                const vel = prompt("Velocidade Máxima do Radar:", "60");
                layer.feature = layer.feature || {type: "Feature", properties: {}};
                layer.feature.properties.velocidade = parseInt(vel) || 60;
            }
            drawnItems.addLayer(layer);
        });

        setTimeout(() => { map.invalidateSize(); }, 500);

        carregarTrajeto();
        rastrearCarros();
        atualizarSeletorCarros();
        monitorarStatusProva();
    }

    // --- LÓGICA DE APURAÇÃO (SUA FUNÇÃO ORIGINAL) ---
    window.processarPenalidadesGeral = async function() {
        if(!confirm("Deseja processar radares e penalidades de todos os carros agora?")) return;
        
        const percursoSnap = await db.ref('configuracoes/percurso').once('value');
        if(!percursoSnap.exists()) return alert("Trajeto não definido!");
        
        const radares = percursoSnap.val().features.filter(f => f.geometry.type === 'Polygon');
        const rastrosSnap = await db.ref('rastros').once('value');
        const rastros = rastrosSnap.val() || {};

        for (let carId in rastros) {
            let pontosPenalidade = 0;
            let excessos = {}; 

            for (let r of radares) {
                const velMax = r.properties.velocidade || 60;
                const poly = turf.polygon(r.geometry.coordinates);
                
                for (let pId in rastros[carId]) {
                    const p = rastros[carId][pId];
                    const pt = turf.point([p.lng, p.lat]);
                    
                    if (turf.booleanPointInPolygon(pt, poly)) {
                        if (p.vel > velMax) {
                            const radarId = r.id || JSON.stringify(r.geometry.coordinates[0][0]);
                            if(!excessos[radarId]) excessos[radarId] = [];
                            excessos[radarId].push(p.ts);
                        }
                    }
                }
            }

            for (let rid in excessos) {
                const tempos = excessos[rid].sort((a, b) => a - b);
                if (tempos.length > 0) {
                    const duracaoS = (tempos[tempos.length - 1] - tempos[0]) / 1000;
                    if (duracaoS > 10) {
                        const extra = Math.floor((duracaoS - 10) / 10);
                        pontosPenalidade += 500 + (extra * 500);
                    }
                }
            }
            await db.ref(`competidores/${carId}`).update({ penalidadeRadar: pontosPenalidade });
        }
        alert("Apuração concluída com sucesso!");
    };

    // --- NOVAS FUNÇÕES ---
    window.logoffGeral = function() {
        if (confirm("Encerrar sessão em todos os dispositivos?")) {
            const senha = prompt("Senha:");
            if (senha === "261291") {
                db.ref('configuracoes').update({ comandoEncerramento: Date.now(), provaAberta: false });
                alert("Logoff enviado!");
            }
        }
    };

    window.excluirTodosCarros = function() {
        if (confirm("Apagar todos os carros?")) {
            const senha = prompt("Senha:");
            if (senha === "261291") {
                db.ref('competidores').remove();
                db.ref('posicoes').remove();
                db.ref('rastros').remove();
                db.ref('tempos').remove();
                location.reload();
            }
        }
    };

    // --- OUTRAS FUNÇÕES ORIGINAIS ---
    function carregarTrajeto() {
        db.ref('configuracoes/percurso').once('value', snap => {
            if (snap.exists()) L.geoJSON(snap.val(), { onEachFeature: (f, l) => drawnItems.addLayer(l) });
        });
    }

    window.salvar = () => db.ref('configuracoes/percurso').set(drawnItems.toGeoJSON()).then(() => alert("Salvo!"));

    function rastrearCarros() {
        const markers = {};
        db.ref('posicoes').on('value', snap => {
            snap.forEach(child => {
                const id = child.key, p = child.val();
                if (markers[id]) markers[id].setLatLng([p.lat, p.lng]);
                else markers[id] = L.marker([p.lat, p.lng], {
                    icon: L.divIcon({ className: 'marker-label', html: id, iconSize: [30, 30] })
                }).addTo(map);
            });
        });
    }

    function atualizarSeletorCarros() {
        db.ref('competidores').on('value', snap => {
            const selector = document.getElementById('carSelector');
            selector.innerHTML = '<option value="">Carro...</option>';
            snap.forEach(c => selector.innerHTML += `<option value="${c.key}">Carro ${c.key}</option>`);
        });
    }

    function monitorarStatusProva() {
        db.ref('configuracoes/provaAberta').on('value', snap => {
            const btn = document.getElementById('btnStatusProva');
            btn.innerText = snap.val() ? "🔓 PROVA ABERTA" : "🔒 PROVA FECHADA";
            btn.style.background = snap.val() ? "#38a169" : "#e53e3e";
        });
    }

    window.alternarStatusProva = () => db.ref('configuracoes/provaAberta').once('value', s => db.ref('configuracoes/provaAberta').set(!s.val()));

    window.adicionarPontoNaLinha = function() {
        const val = document.getElementById('coordsInput').value.split(',');
        if (val.length === 2) {
            const lat = parseFloat(val[0]), lng = parseFloat(val[1]);
            pontosTemporarios.push([lat, lng]);
            linhaTemporaria.setLatLngs(pontosTemporarios);
            map.setView([lat, lng], 15);
        }
    };

    window.finalizarLinhaManual = function() {
        if (pontosTemporarios.length < 2) return;
        L.polyline(pontosTemporarios, {color: '#FF007F'}).addTo(drawnItems);
        pontosTemporarios = []; linhaTemporaria.setLatLngs([]);
    };

    window.limparTemporarios = () => { pontosTemporarios = []; linhaTemporaria.setLatLngs([]); };
    
    window.excluirCarro = () => {
        const id = document.getElementById('carSelector').value;
        if (id && confirm(`Excluir ${id}?`)) db.ref(`competidores/${id}`).remove();
    };

    window.resetar = () => { if(confirm("Reset?") && prompt("Senha:") === "261291") db.ref('/').remove().then(()=>location.reload()); };

    window.buscar = async (q = document.getElementById('cityInput').value) => {
        const res = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${q}`);
        const data = await res.json(); if (data[0]) map.setView([data[0].lat, data[0].lon], 14);
    };

    window.onload = initMap;
    </script>
</body>
</html>
