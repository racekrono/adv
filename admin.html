    #toolbar { 
        background: #2d3748; 
        display: flex; 
        flex-wrap: wrap; 
        padding: 10px;

        z-index: 9999;

    #map { flex-grow: 1; width: 100%; background: #a0aec0; }

    button {

        font-weight: bold;

    <script>
    const firebaseConfig = {
        apiKey: "AIzaSyBPJkehV9C1x0hiY5dQSwSRtVf5c4P2JGE",
        authDomain: "cronometro-rally.firebaseapp.com",
        databaseURL: "https://cronometro-rally-default-rtdb.firebaseio.com",
        projectId: "cronometro-rally",
        appId: "1:341731891354:web:d0c34265be68015e98a723"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let map, drawnItems;
    let pontosTemporarios = [];
    let linhaTemporaria;

    function initMap() {
        const osm = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png');
        const satelite = L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}');

        map = L.map('map', {
            center: [-12.26, -38.96],
            zoom: 13,
            layers: [osm]
        });

        const baseMaps = { "Ruas": osm, "Satélite": satelite };
        L.control.layers(baseMaps).addTo(map);

        drawnItems = new L.FeatureGroup();
        map.addLayer(drawnItems);

        const drawControl = new L.Control.Draw({
            edit: { featureGroup: drawnItems },
            draw: { 
                polyline: true, 
                polygon: true, 
                circle: true, // Habilitado para Checkpoints
                rectangle: false, 
                marker: false, 
                circlemarker: false 
            }
        });
        map.addControl(drawControl);

        linhaTemporaria = L.polyline([], {color: 'yellow', dashArray: '5, 5'}).addTo(map);

        map.on(L.Draw.Event.CREATED, function (event) {
            const layer = event.layer;
            layer.feature = layer.feature || {type: "Feature", properties: {}};
            
            if (event.layerType === 'polygon') {
                const vel = prompt("Velocidade Máxima do Radar (km/h):", "60");
                layer.feature.properties.velocidade = parseInt(vel) || 60;
                layer.feature.properties.tipo = 'radar';
            }
            
            if (event.layerType === 'circle') {
                layer.feature.properties.tipo = 'checkpoint';
                layer.feature.properties.radius = layer.getRadius(); // Salva o raio explicitamente
            }

            drawnItems.addLayer(layer);
        });

        carregarTrajeto();
        rastrearCarros();
        atualizarSeletorCarros();
        monitorarStatusProva();
    }

    // --- CORREÇÃO NO SALVAMENTO (Salva o Raio do Círculo) ---
    window.salvar = function() {
        const data = { type: "FeatureCollection", features: [] };
        
        drawnItems.eachLayer(layer => {
            const geojson = layer.toGeoJSON();
            geojson.properties = geojson.properties || {};
            
            // Se for um círculo, precisamos anexar o raio manualmente pois o GeoJSON padrão não suporta círculos
            if (layer instanceof L.Circle) {
                geojson.properties.radius = layer.getRadius();
                geojson.properties.tipo = 'checkpoint';
            }
            data.features.push(geojson);
        });

        db.ref('configuracoes/percurso').set(data).then(() => alert("Trajeto e Radares salvos com sucesso!"));
    };
